# Global environment variables for ec-test context
# Generated by 'brat context create ec-test'
# Customize as needed for your deployment

NODE_ENV: production
LOG_LEVEL: info
COMPOSE_PROJECT_NAME: bitbrat-ec-test
MESSAGE_BUS_DRIVER: nats
NATS_URL: nats://nats:4222
BUS_PREFIX: ec-test.
PERSISTENCE_DRIVER: postgres
PERSISTENCE_SNAPSHOT_MODE: all
PERSISTENCE_INCLUDE_RAW_PAYLOADS: true
PERSISTENCE_MAX_SNAPSHOT_BYTES: 1048576
PERSISTENCE_TTL_DAYS: 7
POSTGRES_HOST: postgres
POSTGRES_PORT: '5432'
POSTGRES_DB: bitbrat
POSTGRES_USER: bitbrat
POSTGRES_PASSWORD: bitbrat_dev_password
DATABASE_URL: postgresql://bitbrat:bitbrat_dev_password@postgres:5432/bitbrat
