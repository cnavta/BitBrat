# Twitch Integration (optional)
# Configure credentials in .secure.local - see .secure.local.example
TWITCH_BOT_USERNAME: ""
TWITCH_CHANNELS: ""

# Discord integration (disabled by default)
# See documentation/guides/discord-integration.md for setup
DISCORD_ENABLED: "false"
# DISCORD_GUILD_ID: "your-discord-guild-id"
# DISCORD_CHANNELS: "channel-id-1,channel-id-2"
DISCORD_USE_TOKEN_STORE: "false"

# Twilio Integration (disabled by default)
# Configure credentials in .secure.local if needed
TWILIO_ENABLED: "false"
DISCORD_ALLOW_ENV_FALLBACK: "true"
# Poll interval (ms) for token rotation checks when using token store
DISCORD_TOKEN_POLL_MS: "60000"