# Context Pack Service Configuration
# Analysis-stage service for semantic context enrichment via RAG
#
# OPTIONAL SERVICE: Disabled by default
# Requires vector database (Pinecone, Weaviate, ChromaDB)
# See env/local/global.yaml and documentation/guides/rag-setup.md for setup

# RAG Feature Flags (inherits from global.yaml by default)
RAG_CONTEXT_ENABLED: false
RAG_CONTEXT_MAX_RESULTS: 5
RAG_CONTEXT_MIN_SIMILARITY: 0.65
RAG_CONTEXT_TIMEOUT_MS: 5000
