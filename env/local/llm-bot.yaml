# ============================================================================
# LLM Bot Service Configuration
# ============================================================================
# Purpose: Conversational AI bot powered by language models
# Required: Yes (core platform service)
#
# Prerequisites:
#   - OPENAI_API_KEY in .secure.local (required for OpenAI provider)
#   - Or configure alternative provider (see Advanced Configuration below)
# ============================================================================

# === Essential Configuration ===

# LLM Provider (openai, ollama, vllm)
LLM_BOT_LLM_PROVIDER: openai

# Model to use
LLM_BOT_LLM_MODEL: gpt-4.1-mini

# Conversation Memory Limits
LLM_BOT_MEMORY_MAX_MESSAGES: 8
LLM_BOT_MEMORY_MAX_CHARS: 8000

# Optional: Customize bot personality
# LLM_BOT_SYSTEM_PROMPT: "You are a helpful AI assistant."

# === Advanced Configuration ===
# Most users won't need to modify these settings
# See documentation/reference/llm-bot-config.md for details

# Provider-Specific Settings
LLM_BOT_LLM_BASE_URL: "n/a"  # Only needed for Ollama/vLLM
OPENAI_MODEL: gpt-4.1-mini
OPENAI_TIMEOUT_MS: 300000
OPENAI_MAX_RETRIES: 3

# Instance Memory (per-user conversation state)
LLM_BOT_INSTANCE_MEM_MAX_KEYS: 1000
LLM_BOT_INSTANCE_MEM_MAX_MSGS: 32
LLM_BOT_INSTANCE_MEM_MAX_CHARS: 16000
LLM_BOT_INSTANCE_MEM_TTL_MS: 3600000

# Behavioral Controls
LLM_BOT_BEHAVIORAL_GUIDANCE_ENABLED: true
LLM_BOT_BEHAVIORAL_TOOL_FILTER_ENABLED: true
LLM_BOT_BEHAVIORAL_GATING_ENABLED: true
LLM_BOT_RISK_RESPONSE_MODE: refuse
LLM_BOT_TONE_STYLE_ENABLED: true

# Feature Flags
LLM_BOT_ENABLED: true
LLM_BOT_FF_LLM_PROMPT_LOGGING: true

# Internal Prompt Engineering
PROMPT_SUBHEADER_CONVERSATION_STATE: "Do not imitate prior assistant tone if it conflicts with current constraints."