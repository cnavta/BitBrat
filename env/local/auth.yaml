# ============================================================================
# Auth Service Configuration
# ============================================================================
# Purpose: User identity verification and session management
# Required: Only if using Twitch/Discord authentication
#
# All credentials are sourced from .secure.local (never commit these)
# See .secure.local.example for setup instructions
#
# Required secrets in .secure.local:
#   - TWITCH_CLIENT_ID (from https://dev.twitch.tv/console/apps)
#   - TWITCH_CLIENT_SECRET (from https://dev.twitch.tv/console/apps)
#   - OAUTH_STATE_SECRET (random string: openssl rand -hex 32)
# ============================================================================
