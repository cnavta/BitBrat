LOG_LEVEL: debug
MESSAGE_BUS_DRIVER: nats
BUS_PREFIX: "local."
ENV_PREFIX: ""
DOMAIN_PREFIX: ""
DOMAIN_SUFFIX: "localhost:3001"
PROJECT_ID: "bitbrat-local"
# Customize your bot's display name
BOT_NAME: "YourBot"
MCP_GATEWAY_URL: "http://tool-gateway.bitbrat.local:3000/sse"

# Docker Compose project name (Sprint 349: prevents stack conflicts)
COMPOSE_PROJECT_NAME: "bitbrat-local"

# Persistence Configuration (Platform-Agnostic: PostgreSQL)
# Sprint 343+: PostgreSQL is the default persistence backend
# Alternative: Firestore (legacy, deprecated - see infra.yaml)

# PERSISTENCE_DRIVER: Persistence backend selection
# Options: "postgres" (default, platform-agnostic) | "firestore" (legacy, GCP-specific, deprecated)
# Default: postgres (works with any PostgreSQL service: AWS RDS, GCP Cloud SQL, Azure, self-hosted)
PERSISTENCE_DRIVER: postgres

# DATABASE_URL: PostgreSQL connection string
# Format: postgresql://username:password@host:port/database
# Credentials are sourced from .secure.local (POSTGRES_USER, POSTGRES_PASSWORD)
# Local default: bitbrat user, bitbrat_dev_password, postgres container, bitbrat database
# Production: Use managed PostgreSQL (Cloud SQL, RDS, Azure PostgreSQL) with strong passwords
DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/bitbrat"

# PERSISTENCE_SNAPSHOT_MODE: What to snapshot for event replay
# Options: "all" (snapshot everything) | "selective" (only important events) | "none" (no snapshots)
# Default: "all" (useful for local debugging - see complete event history)
# Cost: More disk usage, slower writes
# When to change: Set to "selective" or "none" in production to reduce storage costs
PERSISTENCE_SNAPSHOT_MODE: all

# PERSISTENCE_INCLUDE_RAW_PAYLOADS: Store original event payloads
# When true: Stores raw JSON payloads for debugging (can contain PII)
# When false: Stores only metadata (smaller, privacy-friendly)
# Default: true (helpful for local debugging and understanding event structure)
# When to change: Set to false in production if privacy/compliance requires it
PERSISTENCE_INCLUDE_RAW_PAYLOADS: true

# PERSISTENCE_MAX_SNAPSHOT_BYTES: Maximum size per snapshot (1 MB = 1048576 bytes)
# Snapshots larger than this limit are truncated
# Default: 1 MB (reasonable for most events)
# When to change: Increase if you have legitimately large events (e.g., bulk data imports)
PERSISTENCE_MAX_SNAPSHOT_BYTES: 1048576

# PERSISTENCE_TTL_DAYS: Auto-delete events older than N days
# Default: 7 days (prevents disk bloat in long-running local stacks)
# When to change:
#   - Set to 0 or very high value (e.g., 3650) for permanent retention
#   - Set to 1 for aggressive cleanup (e.g., ephemeral test environments)
#   - Set to 30-90 for production (balance between history and storage costs)
PERSISTENCE_TTL_DAYS: 7

# Debug Users: Enable verbose logging for specific users (format: "platform:user-id,platform:username")
# Leave empty to disable debug logging for all users
DEBUG_USERS: ""

# Feature Flags: Platform Behavior
# These flags control core platform features and logging

# FF_LLM_PROMPT_LOGGING: Log all prompts sent to LLM providers
# Useful for: Debugging prompt engineering, understanding model behavior
# Cost: Increased log volume (can be verbose in production)
# Default: true (helpful for local development and troubleshooting)
FF_LLM_PROMPT_LOGGING: true

# ENABLE_EVENT_RESPONSES: Allow bot to respond to chat events
# When false: Bot processes events but doesn't send responses (useful for testing)
# When true: Bot responds normally to user messages
# Default: true (core platform behavior - disable only for specific testing scenarios)
ENABLE_EVENT_RESPONSES: true

# RAG (Retrieval-Augmented Generation) Context Feature
# Disabled by default - requires vector database setup (Pinecone, Weaviate, or local ChromaDB)
#
# To enable:
# 1. Set RAG_CONTEXT_ENABLED: true
# 2. Configure vector DB connection (see documentation/guides/rag-setup.md)
# 3. Seed initial context (npm run brat -- rag seed)
RAG_CONTEXT_ENABLED: false
RAG_CONTEXT_MAX_RESULTS: 5
RAG_CONTEXT_MIN_SIMILARITY: 0.65
RAG_CONTEXT_TIMEOUT_MS: 5000