# Global environment variables for agent-dev context
# Generated by 'brat context create agent-dev'
# Customize as needed for your deployment

NODE_ENV: production
LOG_LEVEL: info
COMPOSE_PROJECT_NAME: bitbrat-agent-dev
MESSAGE_BUS_DRIVER: nats
NATS_URL: nats://nats:4222
BUS_PREFIX: "agent-dev."
PERSISTENCE_DRIVER: postgres
POSTGRES_HOST: postgres
POSTGRES_PORT: '5432'
POSTGRES_DB: bitbrat
POSTGRES_USER: bitbrat
POSTGRES_PASSWORD: bitbrat_dev_password
DATABASE_URL: postgresql://bitbrat:bitbrat_dev_password@postgres:5432/bitbrat
