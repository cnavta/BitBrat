
services:
  nats:
    env_file:
      - .env.brat
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    networks:
      bitbrat-network:
        aliases:
          - nats.bitbrat.local
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - nats-data:/data

  nats-box:
    env_file:
      - .env.brat
    image: natsio/nats-box:latest
    depends_on:
      - nats
    environment:
      - NATS_URL=nats://nats:4222
    entrypoint: ["/bin/sh", "-c", "tail -f /dev/null"]
    networks:
      bitbrat-network: {}

  postgres:
    env_file:
      - .env.brat
    image: pgvector/pgvector:pg15
    networks:
      bitbrat-network:
        aliases:
          - postgres.bitbrat.local
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bitbrat}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-bitbrat_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-bitbrat}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bitbrat} -d ${POSTGRES_DB:-bitbrat}"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=vector"
      - "-c"
      - "max_connections=200"

  firebase-emulator:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: infrastructure/docker-compose/Dockerfile.emulator
    networks:
      bitbrat-network:
        aliases:
          - firebase.bitbrat.local
          - firestore.bitbrat.local
          - pubsub.bitbrat.local
    user: root
    working_dir: /data
    environment:
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-bitbrat-local}
      - GCLOUD_PROJECT=${FIREBASE_PROJECT_ID:-bitbrat-local}
      - GOOGLE_CLOUD_PROJECT=${FIREBASE_PROJECT_ID:-bitbrat-local}
      - GOOGLE_APPLICATION_CREDENTIALS=/var/secrets/google-app-creds.json
      - ONLY_EMULATORS=firestore,pubsub,ui
    volumes:
      - .:/workspace:ro
      - firebase-data-v2:/data
      - ${GOOGLE_APPLICATION_CREDENTIALS:?Set GOOGLE_APPLICATION_CREDENTIALS to a local JSON file}:/var/secrets/google-app-creds.json:ro
    ports:
      - "4000:4000"
      - "8080:8080"
      - "8085:8085"
      - "4400:4400"
      - "9150:9150"
      - "9299:9299"
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:4000 && curl -sf http://localhost:8080"]
      interval: 5s
      timeout: 5s
      retries: 30
    stop_signal: SIGINT
    stop_grace_period: 1m

networks:
  bitbrat-network:
    external: true
    name: bitbrat-network


volumes:
  nats-data:
    driver: local
  postgres-data:
    driver: local
  firebase-data-v2:
    driver: local
