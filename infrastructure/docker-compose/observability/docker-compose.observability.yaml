# BitBrat Observability Stack - Loki + Promtail
#
# Optional centralized logging for Docker Compose deployments.
# Provides unlimited log retention, indexed correlation ID lookups,
# and <100ms distributed trace queries.
#
# Usage:
#   docker compose -f docker-compose.yaml -f infrastructure/docker-compose/observability/docker-compose.observability.yaml up
#
# Features:
#   - Grafana Loki: Lightweight log aggregation with label-based indexing
#   - Promtail: Docker log scraper with JSON parsing
#   - 7-day retention (configurable)
#   - Index by: correlationId, traceId, service, level
#   - <100ms trace queries vs 2-5s with Docker logs
#
# Requirements:
#   - Docker Compose 2.0+
#   - ~70MB additional RAM (Loki: 50MB, Promtail: 20MB)
#   - ~100MB disk per day (with 7-day retention = ~700MB)

services:
  # ============================================================================
  # Loki: Log Aggregation and Storage
  # ============================================================================
  loki:
    image: grafana/loki:2.9.3
    container_name: loki.bitbrat.local
    hostname: loki.bitbrat.local

    ports:
      - "3100:3100"  # HTTP API
      - "9096:9096"  # gRPC (optional)

    command: -config.file=/etc/loki/local-config.yaml

    volumes:
      - ./infrastructure/docker-compose/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki

    networks:
      - bitbrat-network

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    labels:
      com.bitbrat.service: "loki"
      com.bitbrat.category: "observability"
      com.bitbrat.description: "Log aggregation and storage"

  # ============================================================================
  # Promtail: Log Collection and Shipping
  # ============================================================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail.bitbrat.local
    hostname: promtail.bitbrat.local

    command: -config.file=/etc/promtail/config.yml

    volumes:
      - ./infrastructure/docker-compose/observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/positions

    networks:
      - bitbrat-network

    depends_on:
      loki:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

    restart: unless-stopped

    labels:
      com.bitbrat.service: "promtail"
      com.bitbrat.category: "observability"
      com.bitbrat.description: "Log collection and shipping to Loki"

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  loki-data:
    driver: local
    labels:
      com.bitbrat.volume: "loki-data"
      com.bitbrat.description: "Loki log storage and indexes"

  promtail-positions:
    driver: local
    labels:
      com.bitbrat.volume: "promtail-positions"
      com.bitbrat.description: "Promtail read positions tracking"

# ==============================================================================
# Networks
# ==============================================================================
networks:
  bitbrat-network:
    external: true
