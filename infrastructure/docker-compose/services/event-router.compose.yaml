services:
  event-router:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: event-router
        SERVICE_ENTRY: dist/apps/event-router-service.js
        SERVICE_PORT: "3000"
    ports:
      - "${EVENT_ROUTER_HOST_PORT:-3003}:${SERVICE_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - event-router.bitbrat.local
