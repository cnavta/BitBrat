services:
  state-engine:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: state-engine
        SERVICE_ENTRY: dist/apps/state-engine.js
        SERVICE_PORT: "3000"
    ports:
      - "${STATE_ENGINE_HOST_PORT:-3001}:${SERVICE_PORT:-3000}"
    depends_on:
      - postgres
      - nats
      - tool-gateway
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - state-engine.bitbrat.local
