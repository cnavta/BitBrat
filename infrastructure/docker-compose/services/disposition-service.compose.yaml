services:
  disposition-service:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: disposition-service
        SERVICE_ENTRY: dist/apps/disposition-service.js
        SERVICE_PORT: "3000"
    ports:
      - "${DISPOSITION_SERVICE_HOST_PORT:-8080}:${SERVICE_PORT:-8080}"
    environment:
      - NODE_ENV=local
      - BITBRAT_ENV=local
      - PORT=${SERVICE_PORT:-8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVICE_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
      firebase-emulator:
        condition: service_healthy
    networks:
      bitbrat-network:
        aliases:
          - disposition-service.bitbrat.local

