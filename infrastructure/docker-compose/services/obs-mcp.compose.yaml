services:
  obs-mcp:
    env_file:
      - .env.brat
    image: us-central1-docker.pkg.dev/bitbrat-local/obs-mcp/obs-mcp:latest
    platform: linux/amd64
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT}
      - OBS_WEBSOCKET_URL=${OBS_WEBSOCKET_URL}
      - OBS_WEBSOCKET_SELF_SIGNED=${OBS_WEBSOCKET_SELF_SIGNED}
      - OBS_WEBSOCKET_PASSWORD=${OBS_WEBSOCKET_PASSWORD}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    ports:
      - "${OBS_MCP_HOST_PORT:-3001}:${SERVICE_PORT:-3000}"
    depends_on:
      - postgres
      - nats
      - tool-gateway
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - obs-mcp.bitbrat.local
