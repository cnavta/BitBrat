services:
  persistence:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: persistence
        SERVICE_ENTRY: dist/apps/persistence-service.js
        SERVICE_PORT: "3000"
    ports:
      - "${PERSISTENCE_HOST_PORT:-3001}:${SERVICE_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - persistence.bitbrat.local
