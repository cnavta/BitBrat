services:
  auth:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth
        SERVICE_ENTRY: dist/apps/auth-service.js
        SERVICE_PORT: "3000"
    environment:
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
    ports:
      - "${AUTH_HOST_PORT:-3001}:${SERVICE_PORT:-3000}"
    depends_on:
      - postgres
      - nats
      - tool-gateway
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - auth.bitbrat.local
