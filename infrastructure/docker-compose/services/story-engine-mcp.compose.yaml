services:
  story-engine-mcp:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: story-engine-mcp
        SERVICE_ENTRY: dist/apps/story-engine-mcp.js
        SERVICE_PORT: "3000"
    ports:
      - "${STORY_ENGINE_MCP_HOST_PORT:-8080}:${SERVICE_PORT:-8080}"
    environment:
      - NODE_ENV=local
      - BITBRAT_ENV=local
      - PORT=${SERVICE_PORT:-8080}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SERVICE_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
      tool-gateway:
        condition: service_healthy
    networks:
      bitbrat-network:
        aliases:
          - story-engine-mcp.bitbrat.local
