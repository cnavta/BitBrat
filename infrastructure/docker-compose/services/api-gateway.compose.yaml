services:
  api-gateway:
    env_file:
      - .env.brat
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
        SERVICE_ENTRY: dist/apps/api-gateway.js
        SERVICE_PORT: "3000"
    ports:
      - "${API_GATEWAY_HOST_PORT:-3002}:${SERVICE_PORT:-3000}"
    depends_on:
      - postgres
      - nats
      - tool-gateway
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      bitbrat-network:
        aliases:
          - api-gateway.bitbrat.local
