steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build llm-bot image'
    # Pilot (sprint-318): build llm-bot from the reusable Dockerfile.service via --build-args
    # instead of the former per-service Dockerfile.llm-bot.
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}'
      - '-f'
      - '${_DOCKERFILE}'
      - '--build-arg'
      - 'SERVICE_NAME=${_SERVICE_NAME}'
      - '--build-arg'
      - 'SERVICE_ENTRY=${_SERVICE_ENTRY}'
      - '--build-arg'
      - 'SERVICE_PORT=${_PORT}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push llm-bot image'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run (llm-bot)'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - llm-bot
      - --image=${_IMAGE}
      - --platform=managed
      - --region=${_REGION}
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=1
      - --set-env-vars=LOG_LEVEL=info,MESSAGE_BUS_DRIVER=${_MESSAGE_BUS_DRIVER}
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest
      - --set-env-vars=OPENAI_MODEL=${_OPENAI_MODEL},OPENAI_TIMEOUT_MS=${_OPENAI_TIMEOUT_MS},OPENAI_MAX_RETRIES=${_OPENAI_MAX_RETRIES}

substitutions:
  _REGION: us-central1
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/bitbrat/llm-bot:${SHORT_SHA}
  # Reusable standard service Dockerfile + derived build args (architecture.yaml entry:
  # src/apps/llm-bot-service.ts -> dist/apps/llm-bot-service.js).
  _DOCKERFILE: Dockerfile.service
  _SERVICE_NAME: llm-bot
  _SERVICE_ENTRY: dist/apps/llm-bot-service.js
  _PORT: '3000'
  _MESSAGE_BUS_DRIVER: pubsub
  _OPENAI_MODEL: gpt-5-mini
  _OPENAI_TIMEOUT_MS: '30000'
  _OPENAI_MAX_RETRIES: '2'

images:
  - '${_IMAGE}'

options:
  logging: CLOUD_LOGGING_ONLY
