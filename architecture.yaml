name: BitBrat Platform
description: >-
  The BitBrat Platform is an LLM powered event orchestration and execution engine aimed at Streamers. Uses
  Node/TypeScript, Twurple, Firestore, OpenAI. Deployed on Cloud Run.
project:
  name: BitBrat Platform
  version: 0.14.2
  status: experimental
  description: >
    A cloud-native microservices suite that listens to Twitch, Kick and other events and provides tools to react to
    them.
  owners:
    - chris@ix-n.com
llm_guidance:
  default_system_prompt: >
    You are an experienced Lead Engineer responsible for developing the BitBrat Platform. Follow the architecture.yaml
    specs strictly. Justify any architectural deviation clearly.
  glossary:
    routing_slip: >-
      An ordered list of processing steps that travels with a message; each worker updates its step and republishes (see
      references.routing_slip_schema).
    disposition: A short-term, TTL-bounded read of a user's behavior, computed by disposition-service.
    mcp: Model Context Protocol; MCP servers expose tools to the LLM and are proxied/secured by tool-gateway.
    egress: Delivery of an internal response back out to the originating platform (Twitch/Discord/Twilio).
    enrichment: Optional analysis that augments an event before reaction (query-analyzer, llm-bot).
    brat: The platform CLI/tooling under tools/brat (config, backup, setup).
    bit: >-
      A platform service unit under the Bit model. Every Bit speaks MCP, exposing a mandatory bit.* control plane (the
      Platform Ring) that Brat administers fleet-wide. The YAML services key is retained for back-compat (each service
      entry is conceptually a Bit). A Bit's optional profile declares its capability mixins (core, llm, mcp-server,
      gateway) and mcp.exposure controls whether it serves only the platform control plane (platform-only, the default)
      or also its domain tools (platform+domain). See documentation/architecture/bit-model-technical-architecture.md.
    platform_bit: >-
      A Bit that forms part of the core agent orchestration loop (perceive → plan → act → observe). Platform Bits are
      required for the minimal viable agent and provide infrastructure other Bits depend on. Examples: ingress-egress,
      event-router, llm-bot, reflex, tool-gateway, persistence.
    domain_bit: >-
      A Bit that extends the platform with optional, domain-specific capabilities or tools. Domain Bits can be removed
      without breaking core orchestration. Examples: obs-mcp (OBS control), image-gen-mcp (image generation),
      story-engine-mcp (storytelling), scheduler (periodic tasks).
  invariants:
    - Never import from or depend on ./deprecated in deliverables.
    - Every message must carry a correlationId (see messaging.envelope.required).
    - Bump the topic version (v<N>) on breaking payload changes; never mutate an existing version.
    - Consumers must be idempotent because delivery is at-least-once.
    - architecture.yaml is the canonical source of truth; service build args are derived from it.
  doc_pointers:
    flow: documentation/concepts/platform-flow.md
    messaging: documentation/reference/messaging-system.md
    schemas: documentation/schemas/
    backlog: documentation/reference/backlog-example.yaml
    execution-or-implementation-plan: documentation/reference/execution-implementation-plan-template.md
  build_contract: >
    Standard services build from the single reusable Dockerfile.service; per-service behavior is supplied as
    --build-args derived from this file (see defaults.services.build).
messaging:
  description: >
    The internal event bus that connects all services. NATS JetStream locally (Docker/dev) and Google Cloud Pub/Sub in
    production; the driver is selected at runtime via MESSAGE_BUS_DRIVER. Every message is an Envelope v1 and
    orchestration is decentralized via a routing slip that travels with the message. Delivery is at-least-once, so every
    consumer MUST be idempotent.
  reference: documentation/reference/messaging-system.md
  transport:
    driver_env: MESSAGE_BUS_DRIVER
    local: nats
    production: pubsub
    subject_prefix_env: BUS_PREFIX
    delivery: at-least-once
    tuning:
      pubsub_max_ack_extension_seconds_env: PUBSUB_MAX_ACK_EXTENSION_SECONDS
      pubsub_ack_deadline_seconds_env: PUBSUB_ACK_DEADLINE_SECONDS
      nats_ack_wait_seconds_env: NATS_ACK_WAIT_SECONDS
      dedupe_disable_env: MESSAGE_DEDUP_DISABLE
      dedupe_ttl_ms_env: MESSAGE_DEDUP_TTL_MS
      dedupe_max_env: MESSAGE_DEDUP_MAX
  conventions:
    topic_naming: internal.<domain>.<verb>.v<version>
    versioning: Bump v<N> on breaking payload changes; never mutate an existing version.
    per_instance: >
      A '.{instanceId}' suffix targets a single running instance. ingress-egress and api-gateway resolve {instanceId} at
      runtime via: K_REVISION || EGRESS_INSTANCE_ID || SERVICE_INSTANCE_ID || HOSTNAME || generated id.
  envelope:
    schema: documentation/schemas/envelope.v1.json
    required:
      - v
      - source
      - correlationId
    optional:
      - traceId
      - replyTo
      - timeoutAt
      - routingSlip
    routing_slip_schema: documentation/schemas/routing-slip.v1.json
  dlq:
    description: >
      Unrecoverable failures are routed to dead-letter topics with rich context and consumed by the persistence service
      for durable capture and later inspection. Retryable failures are re-published by the originating step with backoff
      (see routing-slip.v1.json) rather than dead-lettered.
    topics:
      - internal.deadletter.v1
      - internal.router.dlq.v1
  topics:
    internal.finalize.v1:
      description: Generic finalize signal that any service may publish to close out a message (defaults.topics.publishes).
      producers:
        - any-service
      consumers: []
      schema: documentation/schemas/envelope.v1.json
    internal.ingress.v1:
      description: Normalized inbound events from external platforms, entering the pipeline.
      producers:
        - ingress-egress
        - scheduler
        - api-gateway
      consumers:
        - event-router
        - persistence
      schema: documentation/schemas/envelope.v1.json
    internal.enriched.v1:
      description: Analysis/enrichment results returned to the router to advance the routing slip.
      producers:
        - query-analyzer
      consumers:
        - event-router
      schema: documentation/schemas/envelope.v1.json
    internal.query.analysis.v1:
      description: Fast pre-analysis requests dispatched by the router for routing/response hints.
      producers:
        - event-router
      consumers:
        - query-analyzer
      schema: documentation/schemas/envelope.v1.json
    internal.llmbot.v1:
      description: LLM reaction requests dispatched by the router to the headless LLM worker.
      producers:
        - event-router
      consumers:
        - llm-bot
      schema: documentation/schemas/envelope.v1.json
    internal.auth.v1:
      description: Authentication/authorization requests routed to the auth service.
      producers:
        - event-router
      consumers:
        - auth
      schema: documentation/schemas/envelope.v1.json
    internal.reflex.v1:
      description: >
        Deterministic event-driven behavior execution (Sprint 332). Reflexes are pattern-matched rules that execute MCP
        tools in <150ms, bypassing LLM analysis when triggered.
      producers:
        - event-router
      consumers:
        - reflex
      schema: documentation/schemas/envelope.v1.json
    internal.reflex.executed.v1:
      description: >
        Execution success events published by reflex service. Contains tool results, latency, and triggeredBy context
        for observability and future reactive systems.
      producers:
        - reflex
      consumers: []
      schema: documentation/schemas/reflex-executed-event.v1.json
    internal.reflex.failed.v1:
      description: >
        Execution failure events published by reflex service. Contains error details, latency, and triggeredBy context
        for observability and alerting.
      producers:
        - reflex
      consumers: []
      schema: documentation/schemas/reflex-failed-event.v1.json
    internal.story.enrich.v1:
      description: Collaborative-storytelling enrichment requests for the story-engine MCP server.
      producers:
        - event-router
      consumers:
        - story-engine-mcp
      schema: documentation/schemas/envelope.v1.json
    internal.user.disposition.observation.v1:
      description: Per-event user-behavior observations feeding short-term disposition analysis.
      producers:
        - event-router
      consumers:
        - disposition-service
      schema: documentation/schemas/envelope.v1.json
    internal.user.disposition.updated.v1:
      description: Emitted when a user's computed disposition snapshot changes (DISPOSITION_PUBLISH_UPDATES).
      producers:
        - disposition-service
      consumers: []
      schema: documentation/schemas/envelope.v1.json
    internal.state.mutation.v1:
      description: State-change commands applied by the state engine to global/user state.
      producers:
        - disposition-service
      consumers:
        - state-engine
      schema: documentation/schemas/envelope.v1.json
    internal.egress.v1:
      description: >
        Final responses for delivery back to the originating platform. Consumed broadcast plus a per-instance variant
        (internal.egress.v1.{instanceId}) addressing the connection-owning instance.
      producers:
        - event-router
        - scheduler
      consumers:
        - ingress-egress
      schema: documentation/schemas/envelope.v1.json
    internal.api.egress.v1:
      description: >
        Egress responses destined for the API gateway's WebSocket clients; consumed via the per-instance variant
        internal.api.egress.v1.{instanceId} owned by the serving instance.
      producers:
        - event-router
      consumers:
        - api-gateway
      schema: documentation/schemas/envelope.v1.json
    internal.persistence.snapshot.v1:
      description: Event snapshots for durable persistence/indexing (PERSISTENCE_SNAPSHOT_MODE).
      producers:
        - ingress-egress
        - api-gateway
      consumers:
        - persistence
      schema: documentation/schemas/envelope.v1.json
    internal.persistence.finalize.v1:
      description: Finalize signal instructing persistence to close out a stored event record.
      producers:
        - event-router
      consumers:
        - persistence
      schema: documentation/schemas/envelope.v1.json
    internal.scheduler.tick:
      description: Periodic timer tick that drives the scheduler's cron-style tasks.
      producers:
        - scheduler
      consumers:
        - scheduler
      schema: documentation/schemas/envelope.v1.json
    internal.deadletter.v1:
      description: Generic dead-letter topic for unrecoverable failures, captured durably.
      producers:
        - any-service
      consumers:
        - persistence
      schema: documentation/schemas/envelope.v1.json
    internal.router.dlq.v1:
      description: Event-router-specific dead-letter topic for unroutable/failed events.
      producers:
        - event-router
      consumers:
        - persistence
      schema: documentation/schemas/envelope.v1.json
dataflow:
  description: >
    Canonical event lifecycle (ingest -> route -> analysis/enrichment -> reaction -> egress): ingress-egress normalizes
    external platform events and publishes internal.ingress.v1; the event-router attaches a JsonLogic routing slip;
    analysis/enrichment services (query-analyzer, llm-bot, disposition-service, story-engine-mcp) process steps and
    publish internal.enriched.v1; the router advances the slip, drives reactive services (state-engine,
    disposition-service), and finally publishes internal.egress.v1, which ingress-egress (or api-gateway) delivers back
    out.
  reference: documentation/concepts/platform-flow.md
  stages:
    - id: ingest
      description: Normalize external platform events into Envelope v1 and publish internal.ingress.v1.
      services:
        - ingress-egress
        - api-gateway
        - scheduler
    - id: route
      description: Attach and advance the routing slip; dispatch each step to its topic.
      services:
        - event-router
    - id: analyze
      description: Optional analysis/enrichment steps that publish results to internal.enriched.v1.
      services:
        - query-analyzer
        - llm-bot
        - disposition-service
        - story-engine-mcp
    - id: react
      description: Apply state mutations and behavioral side effects.
      services:
        - state-engine
        - disposition-service
    - id: egress
      description: Translate internal responses back into platform-native delivery.
      services:
        - ingress-egress
        - api-gateway
    - id: persist
      description: Durable capture of events, snapshots, and dead letters.
      services:
        - persistence
conventions:
  env:
    description: >
      Variables listed under each service's env: are required at runtime. They are supplied by Cloud Run at deploy time,
      by a local .env in development, or auto-injected by the platform.
    sources:
      - gcp-secret-manager
      - dotenv
      - cloud-run-injection
    auto_injected:
      - name: K_REVISION
        source: cloud-run-injection
        description: >
          Cloud Run revision name, injected automatically when running on Cloud Run. Used as the default per-instance
          egress {instanceId} (see messaging.conventions.per_instance).
  secrets:
    description: >
      Names listed under each service's secrets: are resolved from Google Secret Manager and mounted/injected at deploy
      time. No secret VALUES are stored in this file.
    default_source: gcp-secret-manager
    catalog:
      MCP_AUTH_TOKEN:
        description: Bearer token authorizing service-to-MCP-gateway (tool-gateway) calls.
        source: gcp-secret-manager
        used_by:
          - auth
          - event-router
          - obs-mcp
          - scheduler
          - state-engine
          - disposition-service
          - tool-gateway
          - image-gen-mcp
          - stream-analyst-service
          - story-engine-mcp
      OPENAI_API_KEY:
        description: OpenAI API key for LLM analysis and image generation.
        source: gcp-secret-manager
        used_by:
          - query-analyzer
          - llm-bot
          - image-gen-mcp
      TWITCH_CLIENT_ID:
        description: Twitch application client id for OAuth and EventSub/IRC.
        source: gcp-secret-manager
        used_by:
          - oauth-flow
          - ingress-egress
          - auth
      TWITCH_CLIENT_SECRET:
        description: Twitch application client secret (pairs with TWITCH_CLIENT_ID).
        source: gcp-secret-manager
        used_by:
          - oauth-flow
          - ingress-egress
          - auth
      OAUTH_STATE_SECRET:
        description: HMAC secret protecting the OAuth state parameter against CSRF/replay.
        source: gcp-secret-manager
        used_by:
          - oauth-flow
      DISCORD_CLIENT_ID:
        description: Discord application client id (user-level OAuth, optional/future).
        source: gcp-secret-manager
        used_by:
          - oauth-flow
      DISCORD_CLIENT_SECRET:
        description: Discord application client secret.
        source: gcp-secret-manager
        used_by:
          - oauth-flow
      DISCORD_BOT_TOKEN:
        description: Discord bot token used by the ingress-egress Discord connection.
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      TWILIO_ACCOUNT_SID:
        description: Twilio account SID for Conversations integration.
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      TWILIO_AUTH_TOKEN:
        description: Twilio auth token (webhook validation + REST calls).
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      TWILIO_API_KEY:
        description: Twilio API key SID for scoped REST access.
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      TWILIO_API_SECRET:
        description: Twilio API key secret (pairs with TWILIO_API_KEY).
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      TWILIO_CHAT_SERVICE_SID:
        description: Twilio Conversations service SID.
        source: gcp-secret-manager
        used_by:
          - ingress-egress
      OBS_WEBSOCKET_PASSWORD:
        description: Password for the OBS WebSocket control connection.
        source: gcp-secret-manager
        used_by:
          - obs-mcp
references:
  architecture_schema: documentation/schemas/architecture.v1.json
  platform_flow: documentation/concepts/platform-flow.md
  event_router_rules: documentation/concepts/event-router-rules.md
  messaging_system: documentation/reference/messaging-system.md
  messaging_config: documentation/messaging-config.md
  envelope_schema: documentation/schemas/envelope.v1.json
  routing_slip_schema: documentation/schemas/routing-slip.v1.json
  firestore_docs: documentation/firestore/
  firestore_rules: firestore.rules
  firestore_indexes: firestore.indexes.json
extension_points:
  description: >
    BitBrat is extended by adding message-passing services, MCP tool servers, or Event Router rules. The `brat` CLI
    scaffolds new services; this file (architecture.yaml) is the canonical registry that drives standard builds and
    deploys. See references.* and documentation/tools/brat.md.
  add_service:
    summary: Scaffold and register a new Bit service.
    cli: brat bit create <name> [--profile <p>] [--exposure <e>] [--category <c>] [--register]
    steps:
      - Run the CLI to scaffold src/apps/<name>-service.ts, test, Dockerfile, and docker-compose config.
      - Use --register to auto-add to architecture.yaml, or manually register under `services:` (set active: true; choose category:, profile:, mcp.exposure:, kind:, stage:, env:, secrets:).
      - Profile options: core, gateway, llm, mcp-server (each scaffolds appropriate imports/setup).
      - Category options: platform (core orchestration), domain (optional extensions).
      - Generates per-service Dockerfile.<name> and docker-compose service definition.
    files_changed:
      - architecture.yaml
      - src/apps/<name>-service.ts
      - src/apps/<name>-service.test.ts
      - Dockerfile.<name>
      - infrastructure/docker-compose/services/<name>.compose.yaml
  add_mcp_tool:
    summary: Scaffold and register an MCP tool server.
    cli: brat bit create <name> --profile mcp-server [--category domain] [--register]
    steps:
      - >-
        Run the CLI with --profile mcp-server to scaffold an MCP server (automatically sets exposure to
        platform+domain).
      - >-
        Use --register to auto-add to architecture.yaml with kind: mcp-server, category: domain (typically), or manually
        register; it is proxied/secured by tool-gateway.
      - Template includes registerTool() examples and zod imports.
      - Existing examples: obs-mcp (Dockerfile.obs-mcp), image-gen-mcp, story-engine-mcp.
    files_changed:
      - architecture.yaml
      - src/apps/<name>-service.ts
      - src/apps/<name>-service.test.ts
      - Dockerfile.<name>
      - infrastructure/docker-compose/services/<name>.compose.yaml
  add_rule:
    summary: Add a JsonLogic rule so the event-router routes matching events through services.
    steps:
      - Author a JsonLogic rule (seeded via `brat setup` / the firestore:upsert tool).
      - The event-router matches it and attaches a routing slip directing the event through services.
    reference: documentation/concepts/event-router-rules.md
  see_also:
    cli_docs: documentation/tools/brat.md
    build_contract: defaults.services.build
    agent_loop: README.md
    collaboration_protocol: AGENTS.md
defaults:
  services:
    active: false
    category: platform
    implementation: cloud-run
    runtime:
      node: 24.x
    region: us-central1
    network: bitbrat-prod-vpc
    scaling:
      min: 1
      max: 1
    observability:
      log_export: cloud-logging
      metrics: cloud-monitoring
      tracing:
        enabled: false
        sampler_ratio: 0.1
    port: 3000
    profile: core
    mcp:
      exposure: platform-only
    build:
      dockerfile: Dockerfile.service
      source_of_truth: architecture.yaml
      build_args:
        SERVICE_NAME: 'the service key under services:'
        SERVICE_PORT: services.<name>.port (or defaults.services.port)
        SERVICE_ENTRY: services.<name>.entry with leading 'src/' -> 'dist/' and '.ts' -> '.js'
      entry_to_service_entry: src/<x>.ts -> dist/<x>.js (e.g. src/apps/llm-bot-service.ts -> dist/apps/llm-bot-service.js)
      per_service_override: >-
        A Dockerfile.<service> is honored as an explicit override (escape hatch), e.g. brat (builds from tools/) and
        obs-mcp (uses a prebuilt image:).
    health:
      - /healthz
      - /readyz
      - /livez
    topics:
      publishes:
        - internal.finalize.v1
    security:
      allowUnauthenticated: true
    env:
      - LOG_LEVEL
      - MESSAGE_BUS_DRIVER
      - NATS_URL
      - BUS_PREFIX
services:
  oauth-flow:
    category: domain
    profile: gateway
    mcp:
      exposure: platform-only
    active: true
    description: OAuth2 authentication service that handles Streaming Platform OAuth2 flow for bot and broadcaster accounts.
    kind: gateway
    external:
      - twitch
      - discord
    scaling_rationale: 'min: 0 — scales to zero when no OAuth flow is in progress; bursty, latency-tolerant.'
    entry: src/apps/oauth-service.ts
    scaling:
      min: 0
      max: 1
    paths:
      - /oauth/*
    secrets:
      - TWITCH_CLIENT_ID
      - TWITCH_CLIENT_SECRET
      - OAUTH_STATE_SECRET
      - DISCORD_CLIENT_ID
      - DISCORD_CLIENT_SECRET
    env:
      - DISCORD_REDIRECT_URI
      - DISCORD_OAUTH_SCOPES
      - DISCORD_OAUTH_PERMISSIONS
      - TWITCH_OAUTH_SCOPES
  ingress-egress:
    category: platform
    profile: gateway
    mcp:
      exposure: platform-only
    active: true
    description: >-
      Bridges external event sources/sinks (e.g., Twitch EventSub/IRC, Discord, Twilio) to and from internal topics,
      normalizing inbound events to internal.ingress.v1 and delivering internal.egress.v1 responses back to the
      originating platform.
    kind: pipeline-service
    stage:
      - ingest
      - egress
    external:
      - twitch
      - discord
      - twilio
    stateful: false
    scaling_rationale: >-
      Owns singleton external connections; uses a per-instance egress topic (internal.egress.v1.{instanceId}) so replies
      route back to the instance holding the connection.
    entry: src/apps/ingress-egress-service.ts
    topics:
      publishes:
        - internal.ingress.v1
        - internal.persistence.snapshot.v1
      consumes:
        - internal.egress.v1.{instanceId}
        - internal.egress.v1
    paths:
      - /_debug/twitch
      - /_debug/discord
      - /_debug/twilio
      - /webhooks/twilio
    secrets:
      - TWITCH_CLIENT_ID
      - TWITCH_CLIENT_SECRET
      - DISCORD_BOT_TOKEN
      - TWILIO_ACCOUNT_SID
      - TWILIO_AUTH_TOKEN
      - TWILIO_API_KEY
      - TWILIO_API_SECRET
      - TWILIO_CHAT_SERVICE_SID
    env:
      - TWITCH_BOT_USERNAME
      - TWITCH_CHANNELS
      - PERSISTENCE_SNAPSHOT_MODE
      - PERSISTENCE_INCLUDE_RAW_PAYLOADS
      - PERSISTENCE_MAX_SNAPSHOT_BYTES
      - PERSISTENCE_TTL_DAYS
      - DISCORD_ENABLED
      - TWILIO_ENABLED
      - K_REVISION
  auth:
    category: platform
    profile: gateway
    mcp:
      exposure: platform+domain
    active: true
    description: Authentication service that handles user authentication and authorization.
    kind: pipeline-service
    external:
      - twitch
    entry: src/apps/auth-service.ts
    topics:
      consumes:
        - internal.auth.v1
    secrets:
      - TWITCH_CLIENT_ID
      - TWITCH_CLIENT_SECRET
      - MCP_AUTH_TOKEN
  query-analyzer:
    category: platform
    profile: llm
    mcp:
      exposure: platform-only
    active: true
    description: Executes fast, efficient pre-analysis of incoming events to better route and respond
    kind: pipeline-service
    stage: analyze
    external:
      - openai
    entry: src/apps/query-analyzer.ts
    topics:
      consumes:
        - internal.query.analysis.v1
    env:
      - LLM_PROVIDER
      - LLM_MODEL
    secrets:
      - OPENAI_API_KEY
  event-router:
    category: platform
    profile: gateway
    mcp:
      exposure: platform+domain
    active: true
    description: Internal event routing service that reads from ingress channel(s) and assigns routing slips.
    kind: pipeline-service
    stage: route
    stateful: false
    entry: src/apps/event-router-service.ts
    topics:
      consumes:
        - internal.ingress.v1
        - internal.enriched.v1
    secrets:
      - MCP_AUTH_TOKEN
  llm-bot:
    category: platform
    profile: llm
    mcp:
      exposure: platform-only
    active: true
    description: Headless LLM worker that consumes bot request subjects and produces responses.
    kind: pipeline-service
    stage: analyze
    external:
      - openai
    stateful: false
    entry: src/apps/llm-bot-service.ts
    paths:
      - /_debug/mcp
    topics:
      consumes:
        - internal.llmbot.v1
    secrets:
      - OPENAI_API_KEY
    env:
      - OPENAI_MODEL
      - OPENAI_TIMEOUT_MS
      - OPENAI_MAX_RETRIES
      - LLM_BOT_MEMORY_MAX_MESSAGES
      - LLM_BOT_MEMORY_MAX_CHARS
      - LLM_BOT_BEHAVIORAL_GUIDANCE_ENABLED
      - LLM_BOT_BEHAVIORAL_TOOL_FILTER_ENABLED
      - LLM_BOT_BEHAVIORAL_GATING_ENABLED
      - LLM_BOT_RISK_RESPONSE_MODE
      - LLM_BOT_TONE_STYLE_ENABLED
      - LLM_BOT_SYSTEM_PROMPT
      - LLM_BOT_INSTANCE_MEM_MAX_KEYS
      - LLM_BOT_INSTANCE_MEM_MAX_MSGS
      - LLM_BOT_INSTANCE_MEM_MAX_CHARS
      - LLM_BOT_INSTANCE_MEM_TTL_MS
  persistence:
    category: platform
    profile: core
    mcp:
      exposure: platform-only
    active: true
    description: Persists and indexes events for later retrieval
    kind: pipeline-service
    stage: persist
    stateful: true
    owned_state: Firestore events collection (and dead-letter capture).
    entry: src/apps/persistence-service.ts
    topics:
      consumes:
        - internal.ingress.v1
        - internal.persistence.snapshot.v1
        - internal.persistence.finalize.v1
        - internal.deadletter.v1
        - internal.router.dlq.v1
    env:
      - PERSISTENCE_SNAPSHOT_MODE
      - PERSISTENCE_INCLUDE_RAW_PAYLOADS
      - PERSISTENCE_MAX_SNAPSHOT_BYTES
      - PERSISTENCE_TTL_DAYS
  obs-mcp:
    category: domain
    profile: mcp-server
    mcp:
      exposure: platform+domain
      requiredRoles:
        - reflex
        - admin
    active: true
    description: MCP server for controlling OBS
    kind: mcp-server
    external:
      - obs
    image: us-central1-docker.pkg.dev/bitbrat-local/obs-mcp/obs-mcp:latest
    env:
      - MCP_TRANSPORT
      - OBS_WEBSOCKET_URL
      - OBS_WEBSOCKET_SELF_SIGNED
    secrets:
      - OBS_WEBSOCKET_PASSWORD
      - MCP_AUTH_TOKEN
  scheduler:
    category: domain
    profile: mcp-server
    mcp:
      exposure: platform+domain
    active: true
    description: Scheduler service for periodic tasks
    kind: pipeline-service
    stage: ingest
    entry: src/apps/scheduler-service.ts
    topics:
      publishes:
        - internal.ingress.v1
        - internal.egress.v1
      consumes:
        - internal.scheduler.tick
    secrets:
      - MCP_AUTH_TOKEN
  api-gateway:
    category: platform
    profile: gateway
    mcp:
      exposure: platform+domain
    active: true
    description: API Gateway for handling incoming requests and routing them to appropriate services
    kind: gateway
    stage:
      - ingest
      - egress
    scaling_rationale: >-
      Serves WebSocket clients; uses a per-instance egress topic (internal.api.egress.v1.{instanceId}) so responses
      reach the instance owning the socket.
    entry: src/apps/api-gateway.ts
    topics:
      publishes:
        - internal.ingress.v1
        - internal.persistence.snapshot.v1
      consumes:
        - internal.api.egress.v1.{instanceId}
        - internal.egress.v1
    env:
      - PERSISTENCE_SNAPSHOT_MODE
      - PERSISTENCE_INCLUDE_RAW_PAYLOADS
      - PERSISTENCE_MAX_SNAPSHOT_BYTES
      - PERSISTENCE_TTL_DAYS
      - API_GATEWAY_ALLOW_ANONYMOUS_WS
  state-engine:
    category: platform
    profile: mcp-server
    mcp:
      exposure: platform+domain
    active: true
    description: State engine for managing application state
    kind: pipeline-service
    stage: react
    stateful: true
    owned_state: Firestore state and mutation_log collections.
    entry: src/apps/state-engine.ts
    topics:
      consumes:
        - internal.state.mutation.v1
    secrets:
      - MCP_AUTH_TOKEN
  disposition-service:
    category: platform
    profile: core
    mcp:
      exposure: platform-only
    active: true
    description: Determines the short term disposition of users
    kind: pipeline-service
    stage: react
    stateful: true
    owned_state: Short-term, TTL-bounded user disposition snapshots (DISPOSITION_SNAPSHOT_TTL_MS).
    entry: src/apps/disposition-service.ts
    topics:
      consumes:
        - internal.user.disposition.observation.v1
      publishes:
        - internal.state.mutation.v1
        - internal.user.disposition.updated.v1
    secrets:
      - MCP_AUTH_TOKEN
    env:
      - DISPOSITION_ENABLED
      - DISPOSITION_WINDOW_MS
      - DISPOSITION_MAX_EVENTS
      - DISPOSITION_MIN_EVENTS
      - DISPOSITION_SNAPSHOT_TTL_MS
      - DISPOSITION_PUBLISH_UPDATES
      - DISPOSITION_PROMPT_INJECTION_ENABLED
      - DISPOSITION_MODERATION_ASSIST_ENABLED
  tool-gateway:
    category: platform
    profile: gateway
    mcp:
      exposure: platform+domain
    active: true
    description: MCP Proxy for centralized MCP tool management and security
    kind: gateway
    entry: src/apps/tool-gateway.ts
    secrets:
      - MCP_AUTH_TOKEN
  image-gen-mcp:
    category: domain
    profile: mcp-server
    mcp:
      exposure: platform+domain
    active: true
    description: MCP server for on-demand image generation using OpenAI DALL-E 3.
    kind: mcp-server
    external:
      - openai
    entry: src/services/image-gen-mcp/index.ts
    secrets:
      - OPENAI_API_KEY
      - MCP_AUTH_TOKEN
    env:
      - MCP_TRANSPORT
      - GCS_BUCKET_NAME
      - IMAGE_GEN_RATE_LIMIT_MS
  stream-analyst-service:
    category: domain
    profile: llm
    mcp:
      exposure: platform+domain
    active: true
    description: Analyzes incoming events and provides summary capabilities
    kind: pipeline-service
    stage: analyze
    entry: src/apps/stream-analyst-service.ts
    port: 3010
    secrets:
      - MCP_AUTH_TOKEN
  story-engine-mcp:
    category: domain
    profile: mcp-server
    mcp:
      exposure: platform+domain
    active: true
    description: Provides tools that enable on-demand collaborative storytelling
    kind: mcp-server
    stage: analyze
    entry: src/apps/story-engine-mcp.ts
    topics:
      consumes:
        - internal.story.enrich.v1
    secrets:
      - MCP_AUTH_TOKEN
  reflex:
    category: platform
    profile: mcp-server
    mcp:
      exposure: platform+domain
    active: true
    description: The Reflex bit is responsible for matching and orchestrating repeated deterministic behavior in a low-cost manner
    kind: mcp-server
    entry: src/apps/reflex-service.ts
    port: 3000
    stage: analyze
    env:
      - REFLEX_CACHE_POLL_INTERVAL_MS  # PostgreSQL polling interval (default: 10s)
  context-pack:
    profile: core
    mcp:
      exposure: platform-only
    active: true
    description: 'Analysis-stage service for semantic context enrichment via RAG (Sprint 338)'
    kind: pipeline-service
    stage: analysis
    entry: src/apps/context-pack-service.ts
    port: 3000
infrastructure:
  target: gcp
  resources:
    firestore:
      type: document-database
      implementation: cloud-firestore
      description: >
        Primary (and only supported) persistence layer. Backs event storage/indexing, application and user state, the
        state mutation log, and command lookup. Security rules live in firestore.rules and composite indexes in
        firestore.indexes.json.
      docs: documentation/firestore/
      rules: firestore.rules
      indexes: firestore.indexes.json
      collections:
        events: Persisted/indexed inbound events (channel, eventType, ingressAt); written by persistence.
        stream_observers: Stream observer registrations (active, trigger.type).
        state: Global and per-user application state managed by state-engine.
        mutation_log: Append-only log of state mutations.
        commands: Command definitions (name, aliases) used for command lookup.
    default-content-bucket:
      type: object-store
      implementation: cloud-storage
      description: Static assets for the default website.
      access_policy: private
    bitbrat-media-gen:
      type: object-store
      implementation: cloud-storage
      description: Ephemeral storage for generated images.
      access_policy: public-preview
      lifecycle:
        rules:
          - action: Delete
            age: 2
    main-load-balancer:
      type: load-balancer
      implementation: global-external-application-lb
      name: bitbrat-platform-lb
      ip: bitbrat-platform-ip
      cert: bitbrat-${ENV}-cert
      https_redirect: true
      description: Main external entry point and router for the application
      routing:
        default_bucket: default-content-bucket
        default_domain: ${DOMAIN_PREFIX}${ENV_PREFIX}${DOMAIN_SUFFIX:-bitbrat.ai}
        rules:
          - path_prefix: /assets
            bucket: default-content-bucket
          - path_prefix: /oauth
            service: oauth-flow
          - path_prefix: /ws/v1
            service: api-gateway
          - path_prefix: /_debug/ingress/twitch
            rewrite_prefix: /_debug/twitch
            service: ingress-egress
          - path_prefix: /_debug/ingress/config
            rewrite_prefix: /_debug/config
            service: ingress-egress
          - path_prefix: /_debug/ingress/twilio
            rewrite_prefix: /_debug/twilio
            service: ingress-egress
          - path_prefix: /_debug/ingress/discord
            rewrite_prefix: /_debug/discord
            service: ingress-egress
          - path_prefix: /_debug/llm/mcp
            rewrite_prefix: /_debug/mcp
            service: llm-bot
          - path_prefix: /webhooks/twilio
            service: ingress-egress
    internal-load-balancer:
      type: load-balancer
      implementation: regional-internal-application-lb
      name: bitbrat-internal-lb
      ip: bitbrat-internal-ip
      description: >
        Internal load balancer for service-to-service communication. Resolution is per-service by HOST, not by path:
        each service is reachable at its own internal hostname under routing.default_domain (e.g. llm-bot.bitbrat.local)
        and every rule therefore matches the whole namespace with `path_prefix: /`. The `path_prefix: /` entries are
        intentional (each backend owns its full path space on its own host); they are not ambiguous path routing.
      routing:
        default_domain: bitbrat.local
        rules:
          - path_prefix: /
            service: llm-bot
          - path_prefix: /
            service: auth
          - path_prefix: /
            service: oauth-flow
          - path_prefix: /
            service: ingress-egress
          - path_prefix: /
            service: event-router
          - path_prefix: /
            service: persistence
          - path_prefix: /
            service: obs-mcp
          - path_prefix: /
            service: scheduler
deploymentDefaults:
  maxConcurrentDeployments: 3
  region: us-central1
  cloud-run:
    platform: managed
    minInstances: 1
    maxInstances: 1
    cpu: '1'
    memory: 512Mi
    billing: instance
  global-external-application-lb:
    loadBalancingScheme: EXTERNAL_MANAGED
deploymentTargets:
  local:
    type: docker-engine
    host: unix:///var/run/docker.sock
    env: local
  staging:
    type: docker-engine
    host: ssh://root@bitbrat.lan
    env: staging
    remoteDir: /opt/BitBratPlatform
    maxConcurrent: 3
    gateway:
      url: http://bitbrat.lan:3017
      authToken: ${MCP_AUTH_TOKEN}
networking:
  cloud_nat:
    enabled: false
    rationale: Outbound public traffic uses the Cloud Run default egress path for best latency.
  vpc_connectors:
    purpose: Reach private RFC1918 ranges only.
    service_egress: PRIVATE_RANGES_ONLY
  subnets:
    private_ip_google_access: true
    psc_restricted_vip: false
