    - [DOC-011, DOC-006]  # CLAUDE.md can be done with README
    - [DOC-021, DOC-022, DOC-023]  # All tutorials can be parallel

# Success Criteria
success_criteria:
  documentation:
    - All active services categorized in architecture.yaml
    - 3 new concept pages created
    - 2 new tutorials created
    - 1 new reference page created
    - All diagrams updated with dual paths
    - README reflects current architecture
    - CLAUDE.md updated for LLMs

  quality:
    - 100% of internal links functional
    - Terminology consistency >95%
    - Fresh reader can explain Platform vs Domain
    - Fresh reader can explain dual execution paths
    - Fresh reader can create a reflex
    - Zero architectural inaccuracies
    - CHANGELOG updated

  validation:
    - All phases completed
    - All P0 and P1 tasks completed
    - All acceptance criteria met
    - Fresh eyes review passed
    - Cross-reference audit clean

# Risks
risks:
  - id: RISK-001
    description: Architecture changes during sprint
    probability: medium
    impact: high
    mitigation: Freeze architecture decisions at sprint start; defer to next sprint

  - id: RISK-002
    description: Scope creep
    probability: high
    impact: medium
    mitigation: Strict adherence to backlog; maintain out-of-scope list; timebox tasks

  - id: RISK-003
    description: Terminology debates
    probability: medium
    impact: medium
    mitigation: Get stakeholder sign-off on Phase 1 definitions first

  - id: RISK-004
    description: Fresh eyes reviewer unavailable
    probability: low
    impact: low
    mitigation: Use AI assistant to simulate fresh reader; self-review with time gap

# Notes for LLM Agents
llm_guidance:
  task_selection: Always complete dependencies before starting a task
  validation: Run brat config validate after architecture.yaml changes
  cross_references: Update all related docs when changing terminology
  examples: Use real platform services in all examples
  diagrams: Keep mermaid diagrams simple and readable
  style: Follow existing documentation style and tone
  commits: One commit per task with clear message referencing task ID
