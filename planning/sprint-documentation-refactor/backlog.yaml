# Phase 1: Foundation (Architecture & Core Concepts)
phase_1_foundation:
  name: Foundation - Architecture & Core Concepts
  description: Establish authoritative definitions and update canonical sources
  effort_hours: 13
  dependencies: []
  tasks:
    - id: DOC-001
      title: Update architecture.yaml with category field
      priority: P0
      status: pending
      effort_hours: 1
      dependencies: []
      assignee: technical-writer
      deliverables:
        - architecture.yaml with category: platform|domain for all active services
        - Updated llm_guidance.glossary with category definitions
        - Comments explaining categorization rationale
      acceptance_criteria:
        - All active services have category field
        - Glossary defines platform_bit and domain_bit
        - Comments explain each categorization decision
      validation:
        - Run: npm run brat -- config validate
        - Verify all services parse correctly
        - Check glossary is comprehensive

    - id: DOC-002
      title: Create Platform vs Domain Bits concept page
      priority: P0
      status: pending
      effort_hours: 3
      dependencies: [DOC-001]
      assignee: technical-writer
      deliverables:
        - documentation/concepts/platform-vs-domain-bits.md
      acceptance_criteria:
        - Clear definitions with examples
        - Table listing all bits with categorization rationale
        - Decision criteria for choosing category
        - Cross-references to bit-model.md and capability-profiles.md
      outline:
        - Introduction - Why this distinction matters
        - Platform Bits definition & characteristics
        - Domain Bits definition & characteristics
        - Current categorization table
        - Decision criteria & examples
        - Gray areas & evolution
        - Relationship to profiles and exposure

    - id: DOC-003
      title: Create Reflex Deterministic Execution concept page
      priority: P0
      status: pending
      effort_hours: 4
      dependencies: []
      assignee: technical-writer
      deliverables:
        - documentation/concepts/reflex-deterministic-execution.md
      acceptance_criteria:
        - Clear explanation of deterministic execution model
        - Performance benchmarks documented (<150ms)
        - Decision tree for reflex vs LLM
        - Code examples of reflex definitions
        - Cross-references to platform-flow.md and event-router-rules.md
      outline:
        - Introduction - What reflexes are
        - Architecture - Pattern matching, MCP tool execution
        - Performance characteristics
        - When to use reflexes vs LLM
        - Reflex lifecycle
        - Integration with Event Router
        - Examples
        - Limitations & trade-offs

    - id: DOC-004
      title: Create Dual Execution Paths concept page
      priority: P0
      status: pending
      effort_hours: 3
      dependencies: [DOC-003]
      assignee: technical-writer
      deliverables:
        - documentation/concepts/dual-execution-paths.md
      acceptance_criteria:
        - Side-by-side flow diagrams
        - Performance and cost comparison tables
        - Clear guidance on when to use each path
        - Examples of routing rules selecting each path
      outline:
        - Introduction - Two paths through the platform
        - Deterministic path (Reflex) - flow, characteristics
        - LLM-based path (Traditional) - flow, characteristics
        - Routing decision points
        - Performance comparison table
        - Cost comparison table
        - Use case matrix
        - Shared infrastructure

    - id: DOC-005
      title: Update Bit Model concept page
      priority: P0
      status: pending
      effort_hours: 2
      dependencies: [DOC-002]
      assignee: technical-writer
      deliverables:
        - Updated documentation/concepts/bit-model.md
      acceptance_criteria:
        - Clear distinction between profile and category
        - Examples from both Platform and Domain categories
        - No confusion between orthogonal concepts
      changes:
        - Add "Platform vs Domain Categorization" section
        - Clarify profile is capability, category is role
        - Add examples from both categories
        - Update "Declaring a Bit" section
        - Add cross-reference to platform-vs-domain-bits.md

