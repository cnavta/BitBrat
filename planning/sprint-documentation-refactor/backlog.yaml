  total_tasks: 27
  p0_tasks: 8
  p1_tasks: 12
  p2_tasks: 7
  p3_tasks: 0

  effort_by_phase:
    phase_1: 13 hours
    phase_2: 11 hours
    phase_3: 10 hours
    phase_4: 11 hours
    phase_5: 11 hours
    phase_6: 9 hours

  critical_path:
    - DOC-001  # architecture.yaml
    - DOC-002  # Platform vs Domain concept
    - DOC-006  # README architecture
    - DOC-020  # Cross-reference audit
    - DOC-024  # Terminology consistency
    - DOC-026  # Fresh eyes review
    - DOC-027  # CHANGELOG

  parallel_opportunities:
