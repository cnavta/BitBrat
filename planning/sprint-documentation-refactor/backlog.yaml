# Documentation Refactor Backlog
# Sprint: Platform vs Domain Bits Architecture
# Created: 2026-07-07
# Status: Active

metadata:
  sprint: documentation-refactor
  start_date: 2026-07-07
  estimated_completion: 2026-07-21
