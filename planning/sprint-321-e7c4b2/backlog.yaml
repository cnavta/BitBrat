  notes: |
    Trackable Prioritized YAML Backlog for letting an MCP server configuration's `env` and `args`
    values reference environment variables available to the tool-gateway container.
    Derived from execution-plan.md (Phases 0-4 / Gates G0-G4) and grounded in:
      - src/common/mcp/types.ts (McpServerConfig.env / .args)
      - src/common/mcp/client-manager.ts#connectServer (consumption point; lines ~167-189)
      - src/common/mcp/registry-watcher.ts (Firestore `mcp_servers` -> onServerActive)
      - existing `${VAR}` / `${VAR:-default}` interpolation (src/services/twitch-oauth.ts#interpolateEnv).
    Primary goal: secret hygiene (reference container-provided secrets instead of storing them in Firestore).
    STATUS: APPROVED — implementation complete (REQ-002).
    RESOLVED DECISIONS (user, REQ-002): (1) implement on the canonical `env` field; (2) unresolved refs
    => empty-string substitution + a single `mcp.config.env_ref.unresolved` warning listing missing names;
    (3) resolve env/args BEFORE computing connectionSignature() (rotation triggers a reconnect).

sprint:
  id: sprint-321-e7c4b2
  start: 2026-06-23
  end: null
  wip_limit: 3
  goal: "Let MCP server config `env`/`args` values reference the tool-gateway's environment variables (e.g. ${OPENAI_API_KEY}), resolved at connection time, so secrets are not stored in Firestore — reusing the platform's ${VAR}/${VAR:-default} syntax, never logging resolved values, and preserving reconnect idempotency."

