# ============================================================================
# PHASE 3: Supporting Materials & Quality (P1/P2)
# Goal: Consistency, discoverability, maintainability
# Effort: 4 hours
# ============================================================================

phase_3_supporting_materials:
  name: Supporting Materials & Quality
  description: Troubleshooting, CHANGELOG, cross-references, decision guide
  effort_hours: 4
  dependencies: [phase_1_high_visibility, phase_2_developer_docs]
  tasks:

    # ------------------------------------------------------------------------
    # Task 3.1: Create Troubleshooting Guide
    # ------------------------------------------------------------------------
    - id: DOC-301
      title: Create troubleshooting guide
      priority: P1
      status: completed
      effort_hours: 1.5
      dependencies: [DOC-107]
      assignee: technical-writer
      file: documentation/guides/coding-with-brat-code.md
      section: Troubleshooting section
      deliverables:
        - Comprehensive troubleshooting section
        - Common issues covered
        - Resolution steps
        - Error messages explained
      acceptance_criteria:
        - Agent detection issues covered
        - MCP connection issues covered
        - Preference file issues covered
        - Agent-specific issues covered
        - Clear resolution steps
      issues:
        agent_not_detected:
          symptoms:
            - "No coding agents detected on your system"
          causes:
            - Agent not installed
            - Agent not in PATH
            - Version too old
          resolutions:
            - Install agent (link to installation section)
            - Add agent to PATH
            - Update agent version
        mcp_connection_failure:
          symptoms:
            - "Failed to connect to tool-gateway"
            - "MCP authentication failed"
          causes:
            - Docker not running
            - tool-gateway not accessible
            - MCP_AUTH_TOKEN not set
          resolutions:
            - Start Docker (npm run local)
            - Check tool-gateway health
            - Set MCP_AUTH_TOKEN
        preference_file_errors:
          symptoms:
            - "Failed to load ~/.bratrc"
            - "Invalid YAML in preference file"
          causes:
            - Corrupted .bratrc
            - Invalid YAML syntax
          resolutions:
            - Delete ~/.bratrc (will be recreated)
            - Fix YAML syntax
            - Reset: rm ~/.bratrc
        agent_specific:
          claude_code:
            - API key missing (ANTHROPIC_API_KEY)
            - Config file conflicts (.claude/config.json)
          aider:
            - Model selection issues
            - API key for selected provider
          continue:
            - TBD (pending verification)
          openhands:
            - TBD (pending verification)
      validation:
        - All issues from Sprint 339 retro covered
        - Resolution steps tested

