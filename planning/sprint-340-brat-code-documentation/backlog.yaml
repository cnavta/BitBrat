# ============================================================================

risks:
  - id: RISK-301
    description: Scope creep - adding features not in Sprint 339
    probability: medium
    impact: medium
    mitigation: |
      - Document only what was delivered in Sprint 339
      - Use Sprint 339 verification report as authoritative source
      - Defer any "nice to have" features to future sprints

  - id: RISK-302
    description: Breaking changes to brat code during sprint
    probability: low
    impact: high
    mitigation: |
      - Coordinate with development team
      - Freeze `brat code` changes during documentation sprint
      - Tag Sprint 339 commit as reference

  - id: RISK-303
    description: Inconsistent terminology across docs
    probability: low
    impact: medium
    mitigation: |
      - Use Sprint 339 docs as authoritative terminology source
      - Task 3.3 explicitly audits terminology
      - Maintain glossary

  - id: RISK-304
    description: Link rot after future refactors
    probability: medium
    impact: low
    mitigation: |
