      content: |
        ## 5.5 (Recommended) Explore with AI Assistance

        Before starting the full Docker stack, explore BitBrat with AI:

        npm run brat -- code

        If you have Claude Code, Aider, or another agent installed:
        - Auto-configures agent with BitBrat project context
