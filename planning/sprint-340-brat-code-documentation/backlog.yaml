        - Use cases for brat code, brat chat, direct IDE
        - Flowchart or comparison table
      content:
        comparison_table:
          headers: [Approach, Best For, Strengths, Limitations]
          rows:
            - approach: "brat code"
              best_for: "Exploring codebase, understanding architecture, AI-assisted development"
              strengths: "Full project context, MCP tool access, interactive exploration"
              limitations: "Requires coding agent installed, agent-specific limitations"
            - approach: "brat chat"
              best_for: "Testing platform behavior, validating rules, end-to-end event flow"
              strengths: "Tests real platform, validates routing, observes reactions"
              limitations: "Requires platform running, focused on runtime behavior"
            - approach: "Direct IDE"
              best_for: "Traditional development, specific file edits, debugging"
              strengths: "Full IDE features, debugger, git integration"
              limitations: "No AI assistance, manual context gathering"
        decision_flowchart: |
          Start
          ├─ Want to understand architecture? → brat code
          ├─ Want to test platform behavior? → brat chat
          ├─ Want to implement feature?
          │  ├─ Need AI assistance? → brat code
          │  └─ Know exactly what to do? → Direct IDE
          └─ Want to debug runtime issue? → Direct IDE + brat chat
      validation:
        - Decision criteria clear
        - Use cases realistic

