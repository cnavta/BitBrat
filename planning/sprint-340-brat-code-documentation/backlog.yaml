        - Examples for common use cases
        - Feature highlights (auto-detection, MCP, preference memory)
      acceptance_criteria:
        - Comprehensive command reference
        - All flags documented (--list, --agent, --project-root)
        - Examples cover: interactive mode, specific agent, flag pass-through
        - Link to detailed guide
      content: |
        #### `brat code`
        Launch a coding agent with BitBrat project context automatically configured.

        Features:
        - Auto-Detection: Discovers Claude Code, Aider, Continue, OpenHands
        - Zero-Config: Auto-loads CLAUDE.md, architecture.yaml, AGENTS.md, README.md
        - MCP Integration: Auto-configures MCP servers (Claude Code)
        - Preference Memory: Saves choice to ~/.bratrc
        - First-Run Welcome: Guided introduction on first use

        Options:
        --list, -l: List detected agents
        --agent <name>, -a: Launch specific agent
        --project-root <path>, -p: Override project root

        Examples:
        npm run brat -- code                    # Interactive selection
        npm run brat -- code --list             # List agents
        npm run brat -- code --agent claude-code  # Launch Claude Code
        npm run brat -- code -- --model opus    # Pass flags to agent
      validation:
        - All examples tested and working
        - Link to guide resolves

