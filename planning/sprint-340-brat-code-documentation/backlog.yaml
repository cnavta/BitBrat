        ## Explore interactively with `brat code` (~2 minutes)

        The fastest way to understand BitBrat is to let it explain itself:

        1. Install a coding agent:
           npm install -g @anthropic-ai/claude-code

        2. Launch with context:
           npm install
           npm run brat -- code

        3. First run auto-prompts: "Explain the BitBrat project to me"
           Provides interactive architecture tour with full codebase reference.

        This gives guided walkthrough of agent loop, dual execution paths,
