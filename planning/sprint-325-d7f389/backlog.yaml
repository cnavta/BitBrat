      - "callAll(tool, args) fans out across discovered Bits (read-only) and returns a per-Bit result set"
      - "Gate GB met: lists Bits incl. a platform-only Bit and calls a Bit-qualified bit.* over either transport against a mocked gateway/registry; fail-closed without a token"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:50:00-04:00
        note: "Done. fleet-client.ts discover() merges fabric qualified ids + optional registry (platform-only Bits appear); list() alias; call(bit,tool) builds mcp:<bit>/<tool>; callAll() bounded Queue fan-out, partial-failure tolerant. FirestoreRegistryReader reads mcp_servers. Gate GB met; 11/11 fleet tests green."

  # ---------------- Phase C — brat fleet command surface ----------------
