        note: "Done. Read ops with --all use FleetClient.callAll (bounded orchestration/queue.ts), render a per-Bit table/--json array, and tolerate an unreachable Bit. Fleet-wide drain/shutdown/flags set are NOT implied by --all: they require --confirm and run sequentially with per-Bit logging. Tested."

