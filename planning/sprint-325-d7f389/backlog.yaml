meta:
  backlog_id: bl-204-brat-fleet-mcp-client
  updated_at: 2026-06-26T18:30:00Z
  status_values: [todo, in_progress, blocked, done]
  priority_values: [P0, P1, P2, P3]
  effort_values: [S, M, L]
  source: planning/sprint-325-d7f389/implementation-plan.md
  design: documentation/architecture/bl-204-brat-fleet-mcp-client-technical-architecture.md
  approval_required: true
  notes: |
    Trackable Prioritized YAML Backlog for BL-204 — "Brat as a Fleet MCP Client" (carried forward from
    sprint-324, Phase 1 / Gate G1). Items use a sprint-local BL2-* id space and additionally carry the
    parent backlog id (BL-204) for traceability. Each item maps to a TA design section (§N) and a plan
    Phase (A/B/C/V) with its exit Gate (GA/GB/GC/GV).

    Binding decisions (already ACCEPTED upstream):
      - ADR-003 ACCEPTED: fabric-through-tool-gateway is the default path; direct-connect is a documented
        break-glass behind an explicit flag.
      - OQ3 ACCEPTED (PoR): a resolvable bearer token is REQUIRED to engage; absent => fail closed
        (refuse, non-zero exit) + posture warning. Resolution: MCP_AUTH_TOKEN env -> environment-target
        secret (GCP Secret Manager / .secure.local / ssh://-synced .env.brat).
      - OQ4 ACCEPTED (PoR): direct-connect break-glass behind `brat fleet --direct <bit>`; explicit,
        single-Bit, audited (fleet.break_glass), never combined with --all.
      - Addressing (TA §4.2): Option A chosen — gateway-side Bit-qualified aggregation (mcp:<bit>/bit.*)
        derived from the registry key (Bit name) / toolPrefix, reusing originServer already tracked.

    Grounded, verified facts:
      - Brat CLI flat router: tools/brat/src/cli/index.ts (parseArgs, parseKeyValueFlags, logger, --env).
        Existing groups: docker, backup, chat, bootstrap, setup, trigger.
      - Reused as-is: src/common/mcp/{client-manager,registry-watcher,bridge,rbac}.ts; the
        @modelcontextprotocol/sdk Client + SSEClientTransport wrappers.
      - tool-gateway (src/apps/tool-gateway.ts) aggregates the fleet, serves /sse + POST /message and a
        REST mirror (GET /v1/tools, POST /v1/tools/:id), records originServer + holds each McpServerConfig
        (with toolPrefix). McpBridge.translateTool currently flattens ids to mcp:<toolName> (the gap).
      - Bounded fan-out concurrency primitive: tools/brat/src/orchestration/queue.ts.
      - Gateway tests live under tests/apps/.

    Scope: tools/brat/** (brat fleet surface + tools/brat/src/fleet/ client module) PLUS one additive
    read-path/aggregation change in src/apps/tool-gateway.ts (Bit-qualified addressing). NOT any Bit's
    domain logic; NOT the bit.* toolset (shipped sprint-324); NO architecture.yaml behavioral change (Law #2).

    Deployment-target parity (owner approval condition): identical behavior across GCP (Cloud Run / PubSub /
    Firestore), Local Docker (Compose / NATS), Remote Docker (ssh://). Discovery uses the registry
    self-published external URL; the bus backend is off the synchronous MCP call path. Asserted under both
    MESSAGE_BUS_DRIVER=pubsub and =nats per the BL-500 harness (BL2-401).

    STATUS: PUBLISHED (AGENTS.md §2.8). All items BL2-100..500 are DONE; build green; full Jest suite
    978 passed / 0 failed; new suites + pubsub/nats parity wired into validate_deliverable.sh. PR #250
    opened (see publication.yaml). Awaiting owner review/merge + explicit "Sprint complete." to close.
    WIP limit = 3.

sprint:
  id: sprint-325-d7f389
  start: 2026-06-26
  end: null
  wip_limit: 3
  goal: "Make Brat a fleet MCP client: a `brat fleet` command group that enumerates the fleet and drives the universal bit.* control plane on one Bit or all, defaulting to the fabric-through-tool-gateway path with a documented, audited --direct break-glass; plus the one additive piece of platform code — per-Bit (Bit-qualified) addressing in tool-gateway. Fail-closed RBAC, read-only --all fan-out with --confirm-gated mutations, and parity across GCP / Local Docker / Remote Docker. Consumer-only — no bit.* or architecture.yaml change."

items:
  # ---------------- Phase A — gateway per-Bit addressing (the one new platform affordance) ----------------
  - id: BL2-100
    parent: BL-204
    title: "Expose Bit-qualified discovery ids for platform (bit.*) tools in tool-gateway aggregation (mcp:<bit>/bit.*)"
    phase: A
    section: "§4.2 (Option A), §2.1"
    gate: GA
    priority: P0
    status: done
    effort: M
    owner: agent
    deps: []
    blocked_reason: null
    acceptance:
      - "tool-gateway aggregation assigns platform (bit.*) tools a Bit-qualified discovery id (e.g. mcp:<bit>/bit.health) derived from the registry key (Bit name) / McpServerConfig.toolPrefix, reusing the originServer already tracked per tool"
      - "displayName/description of each bit.* tool is unchanged; only the addressable id is qualified"
      - "ListTools / GET /v1/tools enumerate WHICH Bit owns WHICH bit.* tool (no more last-writer-wins collision)"
      - "Domain tools (already distinctly named) are unaffected — no id change, no behavior change"
      - "Change is additive and read-path only: no bit.* tool definition change, no architecture.yaml change (Law #2)"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:36:00-04:00
        note: "Done. McpBridge.translateTool now qualifies platform (bit/bit.*) ids as mcp:<serverName>/<name> (serverName=registry key) via qualifyToolId(); displayName + domain ids unchanged; upstream execute still calls the unqualified name. Verified by tests/apps/tool-gateway-bit-addressing.spec.ts."

  - id: BL2-101
    parent: BL-204
    title: "Make Bit-qualified ids invocable through the gateway (MCP CallTool + REST POST /v1/tools/:id) without RBAC/domain regressions"
    phase: A
    section: "§4.2, §5"
    gate: GA
    priority: P0
    status: done
    effort: M
    owner: agent
    deps: [BL2-100]
    blocked_reason: null
    acceptance:
      - "CallTool on mcp:<bit>/bit.* routes to the correct upstream Bit and returns its result"
      - "POST /v1/tools/:id accepts the qualified id and proxies to the same upstream"
      - "RBAC is still enforced at discovery AND invocation for qualified ids (RbacEvaluator + getRequestContext)"
      - "Existing domain-tool aggregation + invocation tests pass unchanged (no regression)"
      - "Gate GA met: per-Bit bit.* is enumerable and invocable; domain tools unaffected"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:36:00-04:00
        note: "Done. No gateway code change needed: CallTool + REST resolve by registry id, so qualified ids invoke the correct upstream. REST mirror requires URL-encoding the '/' in the id (client responsibility). Existing tool-gateway-rest + mcp-rbac suites pass unchanged (no regression); new addressing test asserts two Bits' bit.info no longer collide and each is individually invocable."

  # ---------------- Phase B — fleet client module (Brat side) ----------------
  - id: BL2-200
    parent: BL-204
    title: "Define FleetClient interface + rbac-context (SessionContext build + fail-closed bearer-token resolution)"
    phase: B
    section: "§4.3, §6.1, OQ3"
    gate: GB
    priority: P1
    status: done
    effort: M
    owner: agent
    deps: [BL2-101]
    blocked_reason: null
    acceptance:
      - "tools/brat/src/fleet/fleet-client.ts declares the FleetClient interface: discover() / list() / call(bit, tool, args) / callAll(tool, args)"
      - "tools/brat/src/fleet/rbac-context.ts builds SessionContext (roles/agentName/userId) and resolves the bearer token in order: MCP_AUTH_TOKEN env -> environment-target secret (GCP Secret Manager / .secure.local / ssh://-synced .env.brat)"
      - "No resolvable token => fail closed: the command refuses (non-zero exit), never a silent unauthenticated call; emits a posture warning (OQ3)"
      - "No secrets embedded in code; tokens resolved at runtime only (TA §6.6)"
      - "Unit tests cover token-present and token-absent (fail-closed + posture warning) paths"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:50:00-04:00
        note: "Done. tools/brat/src/fleet/types.ts (FleetClient/FleetTransport/RegistryReader ifaces) + rbac-context.ts (resolveToken env->.secure.local/.env.brat/.env.local; resolveIdentity fails closed with PermissionError exit=4 + fleet.auth.posture_warning). Tested."

  - id: BL2-201
    parent: BL-204
    title: "Implement gateway-transport (DEFAULT): MCP SSE client -> tool-gateway /sse with GET /v1/tools + POST /v1/tools/:id REST fallback"
    phase: B
    section: "§4.3, §5 (fabric)"
    gate: GB
    priority: P1
    status: done
    effort: M
    owner: agent
    deps: [BL2-200]
    blocked_reason: null
    acceptance:
      - "tools/brat/src/fleet/transports/gateway-transport.ts connects to the gateway via the @modelcontextprotocol/sdk Client + SSEClientTransport wrappers (as McpClientManager does), with x-mcp-token / MCP_AUTH_TOKEN auth"
      - "ListTools returns the Bit-qualified ids from BL2-100; CallTool invokes mcp:<bit>/bit.* and forwards identity via _meta:{userRoles,userId}"
      - "REST fallback (GET /v1/tools, POST /v1/tools/:id) is used when SSE is unavailable"
      - "Transport reuses platform SDK wrappers rather than re-implementing transport (TA §4.3 'Reuse')"
      - "Unit tests drive the transport against a mocked gateway"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:50:00-04:00
        note: "Done. transports/gateway-transport.ts reuses SDK Client+SSEClientTransport (injectable clientFactory); maps gateway qualified ids; forwards _meta:{userRoles,userId}; REST fallback GET /v1/tools + POST /v1/tools/:id (URL-encoded id); Forbidden surfaced, not retried. Tested."

  - id: BL2-202
    parent: BL-204
    title: "Implement direct-transport (BREAK-GLASS): MCP SSE client -> a single Bit's registry-published MCP URL"
    phase: B
    section: "§4.3, §5 (direct-connect)"
    gate: GB
    priority: P1
    status: done
    effort: S
    owner: agent
    deps: [BL2-200]
    blocked_reason: null
    acceptance:
      - "tools/brat/src/fleet/transports/direct-transport.ts connects to ONE Bit's external MCP /sse URL looked up from the Firestore mcp_servers registry, with MCP_AUTH_TOKEN sent to the Bit directly"
      - "Both transports satisfy a single shared transport interface so FleetClient is transport-agnostic"
      - "Direct transport targets exactly one named Bit (no aggregation, no fan-out)"
      - "Unit tests drive the transport against a mocked single-Bit MCP endpoint + mocked registry lookup"
    updated_at: 2026-06-26
    log:
      - at: 2026-06-26T17:50:00-04:00
        note: "Done. transports/direct-transport.ts targets ONE Bit (label direct:<bit>), resolves its registry URL, strips the mcp:<bit>/ qualifier before calling upstream, no fan-out. Tested incl. missing-URL ConfigurationError."

  - id: BL2-203
    parent: BL-204
    title: "Implement FleetClient.discover()/list()/call()/callAll() over the chosen transport (gateway + optional registry read)"
    phase: B
    section: "§4.3, §9 (discovery/invocation)"
    gate: GB
    priority: P1
    status: done
    effort: M
    owner: agent
