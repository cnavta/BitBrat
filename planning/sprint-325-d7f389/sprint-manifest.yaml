title: "BL-204 — Brat as a Fleet MCP Client"
goal: "Make Brat a fleet MCP client: a new `brat fleet` command group that enumerates the fleet and drives the universal `bit.*` control plane across one Bit or all Bits, defaulting to the fabric-through-tool-gateway path (one auth/RBAC/discovery chokepoint) with a documented, audited `--direct <bit>` break-glass; add the one additive piece of platform code needed — per-Bit (Bit-qualified) addressing in `tool-gateway` so identically-named `bit.*` tools are individually targetable; fail-closed RBAC; read-only `--all` fan-out with `--confirm`-gated mutations; identical behavior across GCP / Local Docker / Remote Docker. Consumer-only — no `bit.*` toolset change, no `architecture.yaml` behavioral change (Law #2)."
