  source: planning/sprint-333-dev-mcp-server/execution-plan.md
  design: planning/sprint-333-dev-mcp-server/technical-architecture.md
  approval_required: true
  notes: |
    Prioritized Trackable YAML Backlog for Sprint 333: Dev MCP Server Implementation.

    This sprint implements a local development MCP server integrated into the brat CLI that provides
    unified access to BitBrat development tooling across all deployment targets (local Docker, remote
    Docker, GCP Cloud Run).

    CORE DELIVERABLE: `brat dev-mcp start` command exposing 13 Phase 1 tools via MCP stdio transport.

    GUIDING CONSTRAINTS:
    - Read-only posture: Every tool is read-only or dry-run (idempotent)
    - Fail-closed security: No token → refuse to operate
    - Target awareness: All tools work on local, SSH, and GCP targets
    - Code reuse priority: Maximize reuse of existing fleet/, backup/, config/ code
    - Test-driven development: Unit + integration + E2E tests

    PHASES:
    - Phase 0: Foundation & Infrastructure (MCP server skeleton, target manager)
    - Phase 1: Config & Validation Tools (4 tools, offline-capable)
    - Phase 2: Basic Fleet Tools (2 tools, fleet enumeration/inspection)
    - Phase 3: Persistence Abstraction Tools (3 tools, Firestore queries)
    - Phase 4: Integration & Validation (E2E tests, docs, validation script)
    - Phase 5: Publication & Close-Out (commit, PR, sprint artifacts)

    OUT OF SCOPE (deferred to Sprint 334):
    - SSE transport, fleet.call, fleet.logs, fleet.trace, db.watch, dev utilities

    STATUS: PRE-SPRINT (AGENTS.md Rule S1). Awaiting explicit "Start sprint" approval.

