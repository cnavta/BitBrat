sprint:
  id: sprint-336-4b1f5a8-loki-observability
  number: 336
  name: Loki + Promtail Centralized Logging
  status: in_progress
  start_date: 2026-07-11
  target_end_date: 2026-07-15
  branch: feature/sprint-336-4b1f5a8-loki-observability

goal: |
  Implement Grafana Loki + Promtail as an optional centralized logging backend
  for Docker Compose deployments to solve fundamental log buffer limitations,
  enable reliable distributed tracing, and achieve <100ms correlation ID lookups
  across the entire BitBrat fleet.

problem_statement: |
  Current Docker log-based observability has critical limitations:
  - Buffer limited to 2000 lines (~34 events worth of logs)
  - Correlation ID traces fail for events older than buffer window
  - No log persistence across container restarts
  - Log spam from one Bit affects trace completeness across fleet
  - Sequential queries across 14 Bits take 2-5 seconds
  - Cannot investigate issues from more than ~30 minutes ago

  This makes distributed tracing unreliable and debugging historical
  issues nearly impossible in local/staging environments.

proposed_solution: |
  Deploy Grafana Loki + Promtail as optional Docker Compose services:
  - Loki: Lightweight log aggregation with label-based indexing
  - Promtail: Docker log scraper with JSON parsing pipeline
  - Index by: correlationId, traceId, service, level
  - Enable unlimited log retention (7 days default, configurable)
  - Maintain backward compatibility via auto-fallback to Docker logs
  - Achieve <100ms trace queries via indexed correlation IDs

scope:
  in_scope:
    - Loki + Promtail Docker Compose configuration
    - Promtail JSON log parsing and label extraction
    - LokiClient HTTP query implementation
    - LogRetriever Loki integration with auto-fallback
    - fleet.trace performance optimization
    - Validation scripts and integration tests
    - Setup and troubleshooting documentation

  out_of_scope:
    - Grafana dashboard creation (future sprint)
    - Alert rule configuration (future sprint)
    - Production Loki deployment (future sprint)
    - OpenTelemetry integration (future sprint)
    - Log-based metrics extraction (future sprint)
    - Removing existing Docker log support

