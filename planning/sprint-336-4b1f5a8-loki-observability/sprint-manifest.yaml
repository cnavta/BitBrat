success_criteria:
  must_have:
    - Loki + Promtail start successfully via docker compose
    - Promtail extracts correlationId, traceId, service, level labels
    - LogRetriever auto-detects Loki and uses it when available
    - LogRetriever falls back to Docker logs when Loki unavailable
    - fleet.trace completes in <100ms with Loki (vs 2-5s with Docker)
    - Logs persist across container restarts
    - 7-day log retention (vs ~34 events with Docker)
    - Zero breaking changes to existing functionality
    - All tests pass
    - Documentation complete and accurate

  nice_to_have:
    - Grafana integration (future sprint)
    - Alert rules configured (future sprint)
    - Log volume metrics per service
    - Automatic old log cleanup working

