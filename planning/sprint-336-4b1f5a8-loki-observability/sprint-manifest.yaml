risks:
  - id: risk-1
    name: Label Cardinality Explosion
    description: Too many unique label values could degrade Loki performance
    likelihood: low
    impact: medium
    mitigation: Limit to 4 labels only (correlationId, traceId, service, level)
    status: monitoring

  - id: risk-2
    name: Promtail Missing Logs
    description: Promtail might miss logs during high-volume periods
    likelihood: low
    impact: high
    mitigation: Validation script checks coverage; fallback to Docker logs
    status: monitoring

  - id: risk-3
    name: Disk Space Exhaustion
    description: 7-day retention could fill disk in high-volume scenarios
    likelihood: low
    impact: medium
    mitigation: Retention policy configurable; volume size monitoring
    status: monitoring

  - id: risk-4
    name: Port Conflicts
    description: Loki port 3100 might conflict with existing services
    likelihood: low
    impact: low
    mitigation: Port configurable via environment variable
    status: monitoring

  - id: risk-5
    name: Performance Degradation
    description: Loki/Promtail might impact container performance
    likelihood: low
    impact: low
    mitigation: Resource limits defined; performance benchmarking
    status: monitoring

