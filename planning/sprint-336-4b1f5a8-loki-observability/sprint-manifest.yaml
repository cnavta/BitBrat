notes: |
  Sprint 336 focuses on adding optional centralized logging infrastructure
  to solve critical observability limitations in local/staging environments.

  Key principles:
  - Optional and additive (zero breaking changes)
  - Graceful degradation (auto-fallback to Docker logs)
  - Performance-focused (<100ms trace queries)
  - Developer-friendly (docker compose up and it works)

  This sprint delivers immediate value for local development and staging
  while laying foundation for future production observability improvements.

  Follow-up sprints may include:
  - Grafana dashboard creation
  - Alert rule configuration
  - Production Loki deployment strategy
  - OpenTelemetry integration
  - Log-based metrics extraction
