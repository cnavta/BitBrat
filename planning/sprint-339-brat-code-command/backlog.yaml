  # ============================================================================

  - id: BL-339-001
    title: "Create CodingAgentPlugin interface and base types"
    priority: P0
    status: pending
    effort: M
    owner: ai
    deps: []

    description: |
      Define the core plugin interface that all coding agent plugins must implement.
      Create supporting TypeScript types for detection results, project context, and agent config.

    acceptance_criteria:
      - CodingAgentPlugin interface exported from base-plugin.ts
      - Interface includes methods: detect(), prepareConfig(), launch(), preflight?()
      - Supporting types defined: AgentDetectionResult, ProjectContext, AgentConfig, PreflightResult
      - All types have comprehensive JSDoc documentation
      - Interface allows for agent-specific extensions

    deliverables:
      - tools/brat/src/cli/code/plugins/base-plugin.ts
      - tools/brat/src/cli/code/types.ts (if types warrant separate file)

    log: []

