  - id: BL-339-008
    title: "Create main CLI handler (brat code)"
    priority: P0
    status: pending
    effort: L
    owner: ai
    deps:
      - BL-339-002
      - BL-339-003
      - BL-339-004
      - BL-339-005
      - BL-339-006
      - BL-339-007

    description: |
      Main entry point for 'brat code' command. Orchestrates the full flow:
      discover → select → prepare → launch.

    acceptance_criteria:
      - Command registered with Commander.js as 'brat code'
      - Supports flags: --list, --select, --agent=<name>, --dry-run
      - Flow: 1) Discover agents, 2) Select agent, 3) Load project context, 4) Prepare config, 5) Launch
