    acceptance_criteria:
      - AgentRegistry class with singleton pattern
      - Methods: register(plugin), getPlugin(id), getAllPlugins(), getByName(name)
      - Plugins can be registered at module load time
      - Registry validates plugin conformance to interface
      - Helpful error messages if plugin not found

    deliverables:
