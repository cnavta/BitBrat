# Sprint 339 Backlog: `brat code` Command - Unified Coding Agent Launcher
# Format: Trackable YAML backlog for LLM-assisted development
# Convention: BL-339-XXX (Backlog item IDs)

meta:
  backlog_id: sprint-339-backlog
  sprint_id: 339
  sprint_title: "brat code - Unified Coding Agent Launcher"
  created: 2026-07-13
  status: planning
  version: 1

  priority_values:
    P0: Critical path for MVP
    P1: Important for completeness
    P2: Nice to have / future enhancement

  effort_values:
    S: "< 2 hours"
    M: "2-4 hours"
    L: "4-8 hours"
    XL: "> 8 hours"

sprint:
  start_date: 2026-07-13
  target_end: 2026-08-03
  duration_weeks: 3
  wip_limit: 3

  goal: |
    Deliver a production-ready `brat code` command that auto-detects, configures, and launches
    CLI coding agents with full BitBrat project context. Support Claude Code (P0), Aider (P1),
    and provide extensible plugin architecture for future agents.

  references:
    - planning/sprint-339-brat-code-command/technical-architecture.md
    - planning/sprint-339-brat-code-command/execution-plan.md
    - CLAUDE.md
    - AGENTS.md

items:
