      - loadProjectContext(rootDir) returns ProjectContext object
      - Loads architecture.yaml and parses to ArchitectureYaml type
      - Reads CLAUDE.md, AGENTS.md, README.md contents (if present)
      - Extracts git branch via 'git rev-parse --abbrev-ref HEAD'
