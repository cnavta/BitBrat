      - --select forces re-selection even if preference exists
      - --agent=<name> bypasses selection
      - --dry-run shows prepared config but doesn't launch
      - Pass-through support: 'brat code -- --model opus' passes flags to agent
      - Helpful error messages for all failure modes
      - Exits with code 0 on success, non-zero on failure

    deliverables:
