        tasks:
          - Create generateServiceConfigs function
          - For each service, check if env/local/{service}.yaml exists
          - If exists, copy and adjust for context
          - If not exists, generate from architecture.yaml env list
          - Apply default value rules (see config-defaults.ts)
          - Add YAML header comments
          - Write file to env/{context}/{service}.yaml
