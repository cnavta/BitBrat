# Context Creation Automation Backlog
# Format: YAML-based task tracking
# Created: 2026-07-20
# Sprint: 352 (proposed)
# Reference: Post-context creation checklist from agent-dev deployment debugging

project:
  name: Context Creation Automation
  goal: Automate service-specific configuration generation in `brat context create`
  duration_estimate: 3-5 days
  priority: P0
  background: >
    During agent-dev context debugging, discovered that `brat context create` only generates
    global.yaml and infra.yaml, but not service-specific YAML files. This caused 6 services to fail
    with missing environment variable errors. Manual creation of 7 service-specific YAML files was
    required to get all containers green. This backlog automates that process.

metrics:
  automation_coverage_target: 100% # All active services get config files
  config_accuracy_target: 100% # All required env vars from architecture.yaml present
  manual_steps_eliminated: 7 # Number of manual file creations eliminated
  deployment_success_rate: 100% # Contexts deploy without env var errors

discovered_issues:
  - issue: Service-specific YAML files not auto-generated
    impact: 6 services failed with missing env vars (llm-bot, persistence, ingress-egress, disposition-service, query-analyzer, reflex, api-gateway)
    root_cause: brat context create only generates global.yaml and infra.yaml
    current_workaround: Manual copying from env/local/ with context-specific adjustments

  - issue: Environment variable interpolation not working
    impact: POSTGRES_PASSWORD placeholder ${POSTGRES_PASSWORD} not replaced from .secure.{context}
    root_cause: Docker Compose doesn't interpolate from .secure files
    current_workaround: Use explicit password values matching postgres container defaults

  - issue: No validation of required env vars
    impact: Silent failures, containers restart loop, hard to diagnose
    root_cause: No cross-check between architecture.yaml requirements and generated configs
    current_workaround: Manual checking of docker logs after deployment

  - issue: No PostgreSQL seed data script
    impact: routing_rules table empty (0 rows), event-router cannot route events; personalities table empty (0 rows), no bot personalities
    root_cause: brat setup only seeds Firestore, not PostgreSQL
    current_workaround: Manual SQL inserts or no routing (system non-functional)

epics:
  - id: epic-1
