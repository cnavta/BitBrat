      - No regressions
      - Seed data populated correctly

risks:
  - id: risk-1
    name: Breaking Existing Contexts
    likelihood: medium
    impact: high
    mitigation: Backwards compatibility checks, only affect new contexts, comprehensive testing
    contingency: Rollback mechanism, preserve old behavior with flag

  - id: risk-2
    name: Incomplete Default Rules
    likelihood: medium
    impact: medium
    mitigation: Copy from local as baseline, extensive testing, validation checks
    contingency: Manual override, document missing defaults

  - id: risk-3
    name: Secret Interpolation Complexity
    likelihood: low
    impact: medium
    mitigation: Use explicit values approach (simpler), document limitations
    contingency: Fallback to manual secret management

  - id: risk-4
    name: Context-Specific Edge Cases
    likelihood: medium
    impact: low
    mitigation: Test with all context types, allow manual overrides
    contingency: Document manual adjustment procedures

  - id: risk-5
    name: Seed Data Backend Divergence
    likelihood: medium
    impact: medium
    mitigation: Single source of truth (seed data definitions), comprehensive testing on both backends
    contingency: Manual SQL/Firestore seeding if unified approach fails

  - id: risk-6
    name: PostgreSQL Schema Mismatch
    likelihood: low
    impact: high
    mitigation: Test seed data against latest schema, validate JSONB structure
    contingency: Update seed writer to match schema changes

