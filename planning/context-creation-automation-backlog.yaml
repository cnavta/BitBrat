          - Read architecture.yaml during context create
          - Extract services.*.active === true
          - For each active service, extract services.*.env array
          - For each active service, extract services.*.secrets array
          - Build service metadata map (name -> {env, secrets, profile, category})
          - Handle missing/undefined env/secrets gracefully
          - Log discovered services and var counts
        dependencies: []
        files:
          - action: update
            path: tools/brat/src/context/create.ts
            method: createContext or new parseActiveServices helper
        tasks:
          - Import YAML parser (already available)
          - Read architecture.yaml
          - Parse services section
          - Filter for active: true
          - Extract env arrays per service
          - Extract secrets arrays per service
          - Build metadata map
          - Add logging
          - Handle edge cases (no env, no secrets)

