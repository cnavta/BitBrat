  updated_at: 2026-06-26T20:15:00-04:00
  status_values: [todo, in_progress, blocked, done]
  priority_values: [P0, P1, P2, P3]
  effort_values: [S, M, L]
  source: planning/sprint-326-b8f1a2/implementation-plan.md
  design: "scratch: If_we_wanted_to_up_the_version_of_the_pl.md (attached to issue)"
  approval_required: true
  notes: |
    Trackable Prioritized YAML Backlog for "Integrated Version Handling". Goal: make architecture.yaml
    `project.version` the single source of truth and add one idempotent, dry-run-able release tool
    (`brat release` / `npm run release`) that bumps architecture.yaml + package.json (+ lockfile sync),
    rolls CHANGELOG `[Unreleased]`, optionally git-tags, and is wired into validate_deliverable.sh and the
    Sprint Publish phase.

    Each item maps to a plan Phase (A/B/C/D/V) and its exit Gate (GA/GB/GC/GD/GV).

    Binding constraints:
      - SINGLE SOURCE OF TRUTH = architecture.yaml project.version (AGENTS.md §0 + runtime source
        src/common/base-server.ts:1120,1167).
      - Law #2: tool changes ONLY project.version in architecture.yaml and re-validates after writing; never
        touches behavioral architecture.
      - Bump type is an ARGUMENT (patch|minor|major|explicit x.y.z); never guessed. Pre-1.0 SemVer.
      - Idempotent + --dry-run (CI-safe inside validate_deliverable.sh).

    Grounded facts:
      - Versions today (in lockstep, hand-maintained): architecture.yaml=0.7.0, package.json=0.7.0,
        package-lock.json=0.7.0. CHANGELOG.md has `## [Unreleased]` (Keep-a-Changelog/SemVer).
      - Brat CLI flat router: tools/brat/src/cli/index.ts; groups: docker|backup|chat|bootstrap|setup|
        trigger|fleet. infrastructure/scripts/ holds Node helpers w/ co-located tests.
      - sprint-323 validate_deliverable.sh has a version-consistency assertion to generalize.

    STATUS: IN-PROGRESS — owner approved the plan/backlog ("Documentation approved. Start sprint."). Implementing
    Phase A→V. WIP limit = 3.

