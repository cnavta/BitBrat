  notes: |
    Trackable Prioritized YAML Backlog for the new `brat backup` Firestore config
    export/import command. Derived from the Technical Architecture document (§4 registry,
    §5 file format/serializer, §6 CLI surface, §7 cross-cutting, §8 tests) and execution-plan.md.
    Phase 5 (BL-011) folds in the deployment-target-aware emulator import path discussed during
    the planning gate (TA §7.1/§7.2 refinement): importing into the local/staging docker stacks,
    which run the Firestore emulator rather than real GCP.
    STATUS: APPROVED 2026-06-22 — implementation in progress (REQ-003).

sprint:
  id: sprint-319-740b5b
  start: 2026-06-22
  end: null
  wip_limit: 3
  goal: "Introduce a `brat backup` command that exports/imports JSON backups of the platform's core configuration Firestore collections (excluding events and all other log-based collections), so core configuration can be transferred to a blank instance."

