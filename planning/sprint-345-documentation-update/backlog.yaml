    title: "Restructure README opening for LLM-first readability (lines 1-50)"
    description: |
      Optimize README opening for LLM evaluators while maintaining human readability:
      - REMOVE outdated WARNING block with Firestore/GCP constraints
      - RESTRUCTURE to follow LLM-first pattern (definition → status → substance)
      - Critical info in first 100 words (what, why, how)
      - Dense, scannable structure (tables > prose, diagrams near definitions)
      - Precise technical language (no marketing fluff)
    files:
      - README.md
    acceptance_criteria:
      - WARNING block completely removed
      - Line 1-3: Concise definition of BitBrat (1-2 sentences, exact technical terms)
      - Line 4-6: Brief experimental status (no tech constraints, no bullet lists)
      - Line 7-30: Core concepts table (agent loop stages, key abstractions with definitions)
      - Line 31+: Architecture diagram before long-form narrative
      - LLM can extract "What is BitBrat?" from first 100 words
      - LLM can identify core components from first section
      - No ambiguous pronouns without clear antecedents
      - Tables and structured data prioritized over prose paragraphs
      - Platform-agnostic messaging from opening line
      - Human readable but optimized for LLM information extraction
    estimated_minutes: 45
    actual_minutes: 45
    status: completed
    completed_date: "2026-07-18"
    notes: |
      - Removed 9-line WARNING box (old lines 2-11)
      - Created concise definition + experimental status (lines 3, 5)
      - Created Core Concepts table with 5-stage flow + key abstractions (lines 11-32)
      - Added Platform-Agnostic Architecture section (lines 34-36)
      - Consolidated duplicate sections (removed redundant agent loop table, Core Agent Concepts table)
      - All acceptance criteria met

