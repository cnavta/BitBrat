id: sprint-279-e5f6g7
title: "Support accountType metadata in Egress"
goal: "Update Twitch and Discord egress processes to recognize the 'accountType' metadata property to identify the correct egress path (bot or broadcaster)."
owner: "Junie"
createdAt: "2026-04-10T23:43:00Z"
status: "complete"
links:
  pr: "https://github.com/cnavta/BitBrat/pull/195"
  branch: "feature/sprint-279-e5f6g7-egress-account-type"
notes: |
  This sprint introduces a generic metadata property 'accountType' in the Egress object.
  Both Twitch and Discord connectors should be updated to use this property to decide the appropriate egress path.
  If the accountType is not recognized or not found, an error should be logged and the event persistence should be finalized.
