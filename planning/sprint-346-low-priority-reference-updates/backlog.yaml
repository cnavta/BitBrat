    priority: P2
    phase: phase-2
    title: "Update miscellaneous documentation (Category 8)"
    description: |
      Update 24 miscellaneous documentation files:
      - Tools, guides, reference, observability, root docs
      - Prioritize active guides (mcp-*, brat-fleet) over historical docs
      - Update messaging docs to show NATS as default
      - Preserve bug fix documentation accuracy (historical context)
      - Add notes to roadmap docs clarifying current state vs future plans
