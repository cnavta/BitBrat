# Sprint 346: Low-Priority Reference Updates - Task Backlog
#
# Priority Levels:
#   P0: Critical (blocks users)
#   P1: High (actively used docs)
#   P2: Medium (reference/tutorial docs)
#   P3: Low (historical/design docs)
#
# Status: pending | in_progress | completed | blocked | deferred

sprint:
  id: sprint-346
  name: "Low-Priority Reference Updates"
  start_date: "2026-07-18"
  estimated_hours: 4.5
  role: "Technical Writer"
  parent_sprint: "sprint-345"

phases:
  - id: phase-1
    name: "Medium-Priority Core Documentation"
    estimated_hours: 2.25
    description: "Update actively used tutorials, technical architecture, and service docs"

  - id: phase-2
    name: "Low-Priority Historical Documentation"
    estimated_hours: 2.0
    description: "Update architecture/design docs and miscellaneous documentation"

  - id: phase-3
    name: "Validation & Cleanup"
    estimated_hours: 0.5
    description: "Consistency review, cross-reference validation, LLM-friendliness check"

tasks:
