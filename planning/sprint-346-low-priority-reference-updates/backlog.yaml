      - documentation/bitbrat_state_memory_architecture.md (10 Firestore refs)
      - documentation/llm_graph_mutation_architecture.md (1 Firestore ref, 1 GCP ref)
      - documentation/sessi-implementation-gap-analysis.md (3 Firestore refs)
      - documentation/technical-architecture/agent-centric-logging-v1.md (0 Firestore refs, 1 GCP ref)
    acceptance_criteria:
