      - Backend-agnostic language used throughout
      - Architectural concepts preserved
      - GCP refs updated to platform-agnostic (NATS default, cloud buses as options)
      - Evolution from Firestore → PostgreSQL noted where relevant
    estimated_minutes: 60
    status: pending
    firestore_refs: 31
    gcp_refs: 9

