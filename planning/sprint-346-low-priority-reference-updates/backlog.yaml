    priority: P2
    phase: phase-2
    title: "Update architecture/design documents (Category 7)"
    description: |
      Update 10 architecture and design documents:
      - Add "HISTORICAL DESIGN DOCUMENT" preambles where appropriate
      - Update to backend-agnostic language while preserving design intent
      - Note evolution from Firestore → PostgreSQL where relevant
      - Preserve architectural concepts (often backend-agnostic)
      - Update GCP refs to platform-agnostic messaging
    files:
      - documentation/architecture/reactive-agent-loop-technical-overview.md (1 Firestore ref)
      - documentation/architecture/acp-integration-evaluation.md (4 Firestore refs, 1 GCP ref)
      - documentation/architecture/bit-model-technical-architecture.md (3 Firestore refs)
