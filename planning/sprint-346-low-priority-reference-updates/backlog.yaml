  # PHASE 1: MEDIUM-PRIORITY CORE DOCUMENTATION
  # ============================================================================

  - id: P1-T1
    priority: P1
    phase: phase-1
    title: "Update tutorial files (Category 4)"
    description: |
      Update 4 tutorial files with backend-agnostic patterns:
      - Change Firestore API examples to DocumentStore API
      - Update code snippets to show PostgreSQL or generic patterns
      - Preserve tutorial flow and learning objectives
      - Add notes where Firestore-specific features are shown
    files:
      - documentation/tutorials/lurk-command.md (3 Firestore refs)
      - documentation/tutorials/lurk-command-part-2.md (8 Firestore refs)
      - documentation/tutorials/creating-a-domain-mcp-server.md (6 Firestore refs)
      - documentation/tutorials/creating-a-reflex.md (3 Firestore refs)
    acceptance_criteria:
      - All tutorial code examples use DocumentStore API (backend-agnostic)
      - PostgreSQL shown as default in examples
      - Firestore mentioned as legacy alternative (if at all)
      - Tutorial learning objectives preserved
      - Code snippets syntactically correct
    estimated_minutes: 60
    actual_minutes: 45
    status: completed
    completed_date: "2026-07-18"
    firestore_refs: 20
    gcp_refs: 0
    notes: |
      - lurk-command.md: Updated Step 2 with PostgreSQL/Firestore examples, troubleshooting section
      - lurk-command-part-2.md: Updated all 8 firestore:upsert commands with PostgreSQL examples first
      - creating-a-domain-mcp-server.md: Updated Resource Management and Database Integration sections
      - creating-a-reflex.md: Updated Step 3 with PostgreSQL/Firestore database loading examples
      - All code examples show PostgreSQL first, Firestore as legacy alternative
      - Tutorial flow and learning objectives preserved

  - id: P1-T2
    priority: P1
    phase: phase-1
    title: "Update technical architecture docs (Category 5)"
    description: |
      Update 3 technical architecture files with backend-agnostic language:
      - Change "Firestore" → "database" or "persistence backend"
      - Update storage terminology: "collection or table"
      - Preserve architectural concepts (remain valid regardless of backend)
      - Add notes clarifying current vs historical implementation
    files:
      - documentation/technical-architecture/user-context-v1.md (5 Firestore refs)
      - documentation/technical-architecture/mcp-auto-discovery.md (10 Firestore refs)
      - documentation/technical-architecture/image-gen-mcp-prompt-logging.md (12 Firestore refs)
    acceptance_criteria:
      - All "Firestore" refs replaced with backend-agnostic terms
      - Storage paths: "collection or table depending on backend"
      - Architectural concepts preserved (backend-agnostic)
      - Diagrams updated if showing Firestore-specific storage
      - Notes added clarifying current PostgreSQL default
    estimated_minutes: 45
    actual_minutes: 30
    status: completed
    completed_date: "2026-07-18"
    firestore_refs: 27
    gcp_refs: 0
    notes: |
      - user-context-v1.md: Updated section headers, references to backend-agnostic (5 refs)
      - mcp-auto-discovery.md: Updated all 10 refs to "database" terminology
      - image-gen-mcp-prompt-logging.md: Added "HISTORICAL DESIGN DOCUMENT" preamble
      - All architectural concepts preserved
      - Backend-agnostic language throughout

  - id: P1-T3
    priority: P1
    phase: phase-1
    title: "Update service documentation (Category 6)"
    description: |
      Update 3 service documentation files with backend-agnostic language:
      - Change "Firestore" → "database"
      - Update storage paths: "collection or table depending on backend"
      - Preserve operational procedures (valid for both backends)
    files:
      - documentation/services/image-gen-mcp.md (3 Firestore refs)
      - documentation/services/state-engine/technical-overview.md (7 Firestore refs)
      - documentation/services/state-engine/runbook.md (5 Firestore refs)
    acceptance_criteria:
      - All "Firestore" refs replaced with "database"
      - Storage paths clarified as backend-agnostic
      - Operational procedures remain valid for PostgreSQL and Firestore
      - No loss of technical detail
    estimated_minutes: 30
    status: pending
    firestore_refs: 15
    gcp_refs: 0

  # ============================================================================
