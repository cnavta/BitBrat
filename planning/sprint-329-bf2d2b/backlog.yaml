  backlog_id: sprint-329-bf2d2b-scheduler-full-event-topic
  updated_at: 2026-06-28
  status: complete   # owner approved (OD-1/OD-2 Plan of Record + G4 no-back-compat), said "Start sprint" (REQ-002), and closed with "Sprint complete." (REQ-003); all items done
  status_values: [todo, in_progress, blocked, done]
