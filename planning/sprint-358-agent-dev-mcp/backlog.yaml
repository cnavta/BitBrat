    priority: P0
    estimate_hours: 3
    status: todo
    assignee: null
    description: >
      Modify ContextResolver to check .brat/ephemeral-contexts.yaml before architecture.yaml,
      enabling transparent discovery of agent-dev contexts without polluting the main config file.
    acceptance_criteria:
      - ContextResolver.getRawContext() checks ephemeral file first
      - Ephemeral contexts override architecture.yaml on name collision
      - ContextResolver.listContexts() merges both sources
      - Missing .brat/ directory handled gracefully (no error)
      - No breaking changes to existing context resolution
      - Unit tests verify ephemeral context loading
      - Integration test: Create ephemeral context, verify ContextResolver finds it
    dependencies: []
    files:
      - action: modify
        path: tools/brat/src/context/context-resolver.ts
        changes:
          - Add loadEphemeralContexts() method
          - Update getRawContext() to check ephemeral first
          - Update listContexts() to merge both sources
    tests:
      - type: unit
        file: tools/brat/src/context/context-resolver.test.ts
        cases:
          - Load ephemeral contexts from file
          - Merge permanent + ephemeral contexts
          - Prioritize ephemeral over permanent on collision
          - Handle missing .brat/ephemeral-contexts.yaml
          - Handle malformed YAML in ephemeral file
      - type: integration
        description: Create ephemeral context and verify ContextResolver finds it
    implementation_notes: |
      Add this method to ContextResolver:

      ```typescript
      private loadEphemeralContexts(): Record<string, ExecutionContext> {
        const ephemeralPath = path.join(this.repoRoot, '.brat', 'ephemeral-contexts.yaml');
        if (!fs.existsSync(ephemeralPath)) {
          return {};
        }

        try {
          const content = fs.readFileSync(ephemeralPath, 'utf8');
          const parsed = yaml.load(content) as any;
          return parsed?.executionContexts || {};
        } catch (error) {
          this.logger?.warn('Failed to load ephemeral contexts', { error });
          return {};
        }
      }

      async getRawContext(name: string): Promise<ExecutionContext | null> {
        // Check ephemeral first (higher priority)
        const ephemeral = this.loadEphemeralContexts();
        if (ephemeral[name]) {
          return ephemeral[name];
        }

        // Fall back to architecture.yaml
        const arch = this.loadArchitecture();
        return arch.executionContexts?.[name] || null;
      }
      ```

