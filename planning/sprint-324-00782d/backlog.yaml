meta:
  backlog_id: bit-model-universal-mcp-control-plane
  updated_at: 2026-06-26T13:14:00Z
  status_values: [todo, in_progress, blocked, done]
  priority_values: [P0, P1, P2, P3]
  effort_values: [S, M, L]
  source: planning/bit-model/execution-plan.md
  design: documentation/architecture/bit-model-technical-architecture.md
  approval_required: true
  notes: |
    Trackable Prioritized YAML Backlog for the Bit model & universal MCP control plane
    (Architect design doc, Phases 0-3 / §8; ADRs §9). Each item maps to a design section (§N),
    a plan Phase (R/0/1/2/3/V), and a Gate (GR/G0/G1/G2/G3/GV).
    ADR decisions (owner-accepted this issue):
      - ADR-001 ACCEPTED, conditioned on existing MCP_AUTH_TOKEN + common/mcp/rbac.ts restrictions.
      - ADR-002 ACCEPTED (composition / mixins).
      - ADR-003 ACCEPTED (tool-gateway fabric default; direct-connect break-glass).
      - ADR-004 ACCEPTED (keep services: key; soft-introduce "Bit").
    Grounded, verified facts:
      - extends McpServer (8): auth, api-gateway, event-router, scheduler, state-engine,
        tool-gateway, stream-analyst, obs-mcp, story-engine-mcp, image-gen-mcp.
      - extends BaseServer (6): llm-bot, query-analyzer, persistence, disposition, oauth, ingress-egress
        (the §6.3 behavioral-change set — they gain an MCP endpoint).
      - registerTool(name, desc, schema, handler, { scopes }) already carries the RBAC scope hook.
      - Reusable commons: src/common/{mcp,llm,prompt-assembly,resources,feature-flags.ts,logging.ts}; tools/brat.
    Scope: core platform only (src/common/**, base abstraction, Brat control surface). NOT domain logic.
    Open-question resolutions (owner-accepted this issue, all Plan of Record):
      - OQ1 ACCEPTED (PoR): retire BaseServer=Bit alias + McpServer shim at the Phase 3 exit gate.
      - OQ2 ACCEPTED (PoR): ship exactly profile values [core | llm | mcp-domain | gateway]; absent => core.
      - OQ3 ACCEPTED (PoR): MCP_AUTH_TOKEN required for auth to engage; absent => current behavior (auth off)
        logged as a posture warning; holds across GCP Secret Manager, local .secure.local/.env.local, and
        the ssh://-synced .env.brat for remote Docker.
      - OQ4 ACCEPTED (PoR): documented direct-connect break-glass behind an explicit CLI flag
        (e.g. brat fleet --direct <bit>); fabric-through-tool-gateway stays the default.
    Deployment-target parity (owner approval condition): the implementation MUST keep working on ALL three
      current targets with none left behind:
      - GCP: Cloud Run / PubSub / Firestore via Cloud Build (infrastructure/deploy-cloud.sh, cloudbuild.*.yaml).
      - Local Docker: Compose (infrastructure/docker-compose/docker-compose.local.yaml, npm run local), NATS bus.
      - Remote Docker: ssh:// brat docker targets (DOCKER_HOST=ssh://), .env.brat synced to the remote host.
      The bit.* surface, registry self-publish, MCP_AUTH_TOKEN auth, and mcp.exposure defaults must behave
      identically regardless of messaging backend (PubSub vs NATS) or host (Cloud Run / local / remote ssh).
      No GCP-only or Compose-only assumption may be baked into the base abstraction; asserted by BL-500.
    STATUS: PLANNING APPROVED, PRE-SPRINT (AGENTS.md Rule S1). Plan approved (conditioned on deployment-target
    parity); all four open questions resolved (PoR). No sprint started, no branch, no code changed. This
    backlog awaits an explicit "Start sprint." (§2.2) before any implementation begins.

sprint:
  id: sprint-324-00782d
  start: 2026-06-26
  end: null
  wip_limit: 3
  goal: "Promote MCP from a per-service subclass decision (extends McpServer vs extends BaseServer) into the base abstraction so every Bit speaks MCP, expose a mandatory bit.* control plane Brat administers fleet-wide, and codify the duplicated LLM scaffolding into composable profiles — additively, behavior-preserving, and reversible, scoped to the core platform only."

