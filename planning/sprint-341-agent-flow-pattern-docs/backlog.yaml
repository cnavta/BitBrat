    label: "Critical - Must Have"
    description: "Agent-first standards + core pattern docs + terminology migration"
    must_complete: true
    target: "100%"

  p1:
    label: "High Priority - Should Have"
    description: "Reinforces pattern in existing docs, adds hands-on tutorial"
    target_completion: "100%"

  p2:
    label: "Medium Priority - Nice to Have"
    description: "Polished API reference, visual diagrams"
    target_completion: "66%"

  p3:
    label: "Low Priority - Future Enhancement"
    description: "Deferred to future sprints; video, interactive examples"
