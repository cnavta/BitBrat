  title: "Agent Flow Pattern Documentation (Agent-First)"
  branch: "feature/agent-flow-pattern-docs"
  status: "IN_PROGRESS"
  owner: "Technical Writer"
  created: "2026-07-14"
  updated: "2026-07-14"
  started: "2026-07-14"
  primary_audience: "AI Coding Agents (Claude, GPT, etc.)"
  secondary_audience: "Human Developers"

# New conceptual framework:
# - Previous: perceive → plan → act → observe
# - New: Attention → Contextualization → Analysis → Reaction → Introspection
terminology_migration:
  old_term: "analysis stage"
  new_term: "contextualization stage"
  rationale: "Contextualization better reflects the purpose: reestablishing context (auth, env) BEFORE analysis"
  scope: "Complete migration - documentation AND code (clean cut, no backward compatibility)"
  approach: "Clean cut - update everything at once, no dual support"

