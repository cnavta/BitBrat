# Sprint 341: Agent Flow Pattern Documentation (Agent-First + Terminology Migration)
# Trackable, prioritized backlog for documenting the canonical enrich-and-next pattern
# Primary audience: AI coding agents | Secondary audience: Human developers

sprint:
