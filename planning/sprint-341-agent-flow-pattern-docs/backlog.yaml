      - section: "## Common Development Patterns"
        action: "Add new subsection (before or after 'Creating a New Bit')"
        title: "### Building Agent-Flow Bits: The Enrich-and-Next Pattern"
        content: |
          **RULE: This is THE canonical pattern for bits that participate in agent orchestration.**

          ```typescript
          // File: src/apps/your-enrichment-bit.ts
          import { Bit } from '../common/base-server';
          import { InternalEventV2 } from '../types/events';
          import { randomUUID } from 'crypto';

          export class YourEnrichmentBit extends Bit {
            async setup(): Promise<void> {
              // Subscribe to events during contextualization or analysis stage
              await this.onMessage<InternalEventV2>('internal.your-topic.v1', async (event, attrs, ctx) => {

                // 1. ENRICH: Add your contribution to the event
                event.annotations.push({
                  kind: 'your-annotation-kind',
                  value: 'your-data',
                  source: this.name,
                  id: randomUUID(),
                  createdAt: new Date().toISOString()
                });

                // 2. NEXT: Advance the routing slip
                await this.next(event);

                // 3. ACKNOWLEDGE: Required
                await ctx.ack();
              });
            }
          }
          ```

          **RULES: next() vs complete()**
          - **RULE: Use `next(event)` by default** — advances to next routing step (or egress if slip empty)
          - **RULE: Use `complete(event)` ONLY when intentionally short-circuiting** — skips remaining routing slip
          - **RULE: If unsure, use `next()`**

          **RULES: Enrichment**
          - **ALWAYS add annotations** for context, analysis results, or metadata
          - **ALWAYS set `source: this.name`** for provenance tracking
          - **NEVER modify payload** unless you own the event type
          - **NEVER forget `ctx.ack()`** — events will stall

          **Examples:**
          - `auth` (src/apps/auth-service.ts): Enriches user identity → `next()`
          - `llm-bot` (src/apps/llm-bot-service.ts): Enriches response candidates → `next()`
          - `query-analyzer` (src/apps/query-analyzer-service.ts): Enriches routing hints → `next()`

          See [Agent Flow Patterns](./documentation/concepts/agent-flow-patterns.md) for full details.

