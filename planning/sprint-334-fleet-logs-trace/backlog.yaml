# ============================================================================
# Phase 1: Log Retrieval Infrastructure (P0)
# ============================================================================

phase_1_infrastructure:
  name: "Log Retrieval Infrastructure"
  priority: P0
  estimated_duration: "2 days"
  description: "Build core log retrieval components for Cloud Run and Docker"

  tasks:
    - id: P1-T01
      name: "Create LogRetriever class with core architecture"
      priority: P0
      estimated_hours: 3
      status: completed
      completed_date: 2026-07-10
      description: |
        Create tools/brat/src/dev-mcp/log-retriever.ts with:
        - LogRetriever class with constructor
        - LogRequest and LogResponse type definitions
        - DeploymentType enum ('cloud-run' | 'docker')
        - Main getLogs() method signature
      acceptance_criteria:
        - File exists with proper TypeScript structure
        - Types defined in types.ts and imported
        - Class methods stubbed with TODO comments
        - No compilation errors
      files:
        - tools/brat/src/dev-mcp/log-retriever.ts (new)
        - tools/brat/src/dev-mcp/types.ts (modified)
      notes: |
        All acceptance criteria met. Created comprehensive type definitions including
        DeploymentType, LogLevel, LogFormat, TraceFormat, LogRequest, LogEntry, LogResponse,
        TraceRequest, TimelineEntry, and TraceTimeline.

    - id: P1-T02
      name: "Implement deployment type resolver"
      priority: P0
      estimated_hours: 4
      status: completed
      completed_date: 2026-07-10
      depends_on: [P1-T01]
      description: |
        Implement resolveBitDeployment() method:
        - Query mcp_servers registry via FirestoreRegistryReader
        - Parse Bit URL to determine deployment type
        - Detect Cloud Run: https://*.run.app or https://*.a.run.app
        - Detect Docker: http://localhost:* or http://*.bitbrat.local:*
        - Handle missing Bit gracefully
        - Write unit tests
      acceptance_criteria:
        - Method correctly identifies Cloud Run URLs
        - Method correctly identifies Docker URLs
        - Throws clear error for unknown URL patterns
        - Throws clear error for missing Bits
        - Unit tests cover all scenarios
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-retriever.ts (modified)
        - tools/brat/src/dev-mcp/__tests__/log-retriever.test.ts (new)
      notes: |
        All acceptance criteria met. Implemented resolveBitDeployment() with full error handling.
        Created 9 comprehensive unit tests covering all URL patterns (Cloud Run, Docker, localhost),
        missing Bits, missing URLs, unknown types, and case-insensitivity. All tests passing.

    - id: P1-T03
      name: "Implement Cloud Run log retriever"
      priority: P0
      estimated_hours: 6
      status: completed
      completed_date: 2026-07-10
      depends_on: [P1-T01]
      description: |
        Implement getCloudRunLogs() method:
        - Initialize @google-cloud/logging client
        - Build Cloud Logging filter from LogRequest
        - Map log levels to Cloud Logging severity levels
        - Parse time ranges (ISO timestamps + duration strings)
        - Handle correlationId filtering
        - Execute query with pagination
        - Return raw log entries
        - Write unit tests with mocked Cloud Logging API
      acceptance_criteria:
        - Method constructs correct filter strings
        - Level mapping correct (error->ERROR, warn->WARNING, etc.)
        - Time range parsing works for ISO and duration strings
        - Queries respect limit parameter (default 100, max 1000)
        - Handles API errors gracefully
        - Unit tests with mocked API responses
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-retriever.ts (modified)
        - tools/brat/src/dev-mcp/__tests__/log-retriever.test.ts (modified)
        - package.json (modified)
      dependencies:
        - npm: "@google-cloud/logging@^11.0.0"
      notes: |
        All acceptance criteria met. Implemented getCloudRunLogs() with full Cloud Logging API integration.
        Added helper methods: mapLevelToSeverity(), severityToLevel(), parseSince().
        parseSince() supports both ISO timestamps and duration strings (1h, 30m, 5s, ms).
        Added @google-cloud/logging@^11.0.0 to package.json and installed.
        11 tests passing. Integration tests deferred to Phase 2 (fleet.logs tool implementation).

    - id: P1-T04
      name: "Implement Docker log retriever"
      priority: P0
      estimated_hours: 5
      status: in_progress
      started_date: 2026-07-10
      depends_on: [P1-T01]
      description: |
        Implement getDockerLogs() method:
        - Use DockerOrchestrator to execute docker compose logs
        - Build command args (--tail, --since, --until)
        - Parse docker compose log output
        - Extract JSON logs from output
        - Apply client-side filters (level, correlationId)
        - Handle plain text fallback for non-JSON logs
        - Write unit tests with mocked DockerOrchestrator
      acceptance_criteria:
        - Method constructs correct docker compose commands
        - Parses JSON logs correctly
        - Handles plain text logs gracefully
        - Applies level filtering correctly
        - Applies correlationId filtering correctly
        - Handles docker command failures
        - Unit tests with mocked orchestrator
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-retriever.ts (modified)
        - tools/brat/src/dev-mcp/__tests__/log-retriever.test.ts (modified)

    - id: P1-T05
      name: "Create log parser utilities"
      priority: P0
      estimated_hours: 4
      status: pending
      depends_on: [P1-T04]
      description: |
        Create tools/brat/src/dev-mcp/log-parser.ts with:
        - parseDockerLogs() - Parse docker compose output
        - parseJsonLog() - Parse single JSON log entry
        - parseTimeDuration() - Parse duration strings (1h, 30m, 5s)
        - parseIsoTimestamp() - Validate ISO timestamps
        - filterByLevel() - Filter logs by level array
        - filterByCorrelation() - Filter logs by correlation ID
        - Write comprehensive unit tests
      acceptance_criteria:
        - All parsers handle edge cases gracefully
        - Duration parsing supports h/m/s/ms suffixes
        - JSON parsing handles malformed input
        - Filters work with empty arrays
        - Unit tests cover success and failure paths
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-parser.ts (new)
        - tools/brat/src/dev-mcp/__tests__/log-parser.test.ts (new)

    - id: P1-T06
      name: "Create log formatter utilities"
      priority: P0
      estimated_hours: 4
      status: pending
      depends_on: [P1-T03, P1-T04]
      description: |
        Create tools/brat/src/dev-mcp/log-formatter.ts with:
        - formatText() - Human-readable text format
        - formatJson() - Structured JSON format
        - formatRaw() - Unmodified raw format
        - formatTimeline() - Timeline format for traces
        - Helper methods for timestamp formatting
        - Write unit tests for each formatter
      acceptance_criteria:
        - Text format is human-readable with timestamps and levels
        - JSON format is valid JSON with proper structure
        - Raw format returns unmodified log entries
        - Timeline format shows relative timestamps
        - All formatters handle empty log arrays
        - Unit tests cover all formats
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-formatter.ts (new)
        - tools/brat/src/dev-mcp/__tests__/log-formatter.test.ts (new)

    - id: P1-T07
      name: "Wire up LogRetriever main method and integration"
      priority: P0
      estimated_hours: 3
      status: pending
      depends_on: [P1-T02, P1-T03, P1-T04, P1-T05, P1-T06]
      description: |
        Complete LogRetriever.getLogs() method:
        - Resolve deployment type
        - Route to appropriate retriever (Cloud Run or Docker)
        - Apply formatters
        - Handle errors with clear messages
        - Return MCP-formatted response
        - Write integration test
      acceptance_criteria:
        - Method routes correctly based on deployment type
        - Errors are caught and formatted properly
        - Response follows MCP protocol structure
        - Integration test covers both deployment types
        - Tests pass
      files:
        - tools/brat/src/dev-mcp/log-retriever.ts (modified)
        - tools/brat/src/dev-mcp/__tests__/log-retriever.test.ts (modified)

