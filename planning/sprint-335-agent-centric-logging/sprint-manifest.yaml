sprint:
  id: sprint-335-23602df-agent-centric-logging
  number: 335
  name: Agent-Centric Logging Implementation
  status: active
  start_date: 2026-07-10
  target_end_date: 2026-07-22
  branch: feature/sprint-335-23602df-agent-centric-logging

goal: |
  Implement AsyncLocalStorage-based automatic correlationId propagation to solve the 60% missing
  correlationId problem and enable reliable fleet observability. Deliver 100% correlationId coverage
  with zero developer burden.

scope:
  in_scope:
    - Event context infrastructure (AsyncLocalStorage)
    - Enhanced Logger with automatic context injection
    - BaseServer message handler integration
    - HTTP middleware for API routes
    - Unit and integration tests
    - Staged deployment to staging → production
    - Documentation updates

  out_of_scope:
    - Removing all manual correlationId passing (cleanup sprint)
    - Stage-level policy logging (depends on policy engine)
    - Enhanced context fields beyond correlationId/traceId/sessionId
    - Learning and introspection integration

deliverables:
  - src/common/event-context.ts
  - Enhanced src/common/logging.ts
  - Updated src/common/base-server.ts (message and HTTP handlers)
  - Comprehensive unit tests (>95% coverage)
  - Integration tests (>90% coverage)
  - End-to-end fleet trace validation test
  - Staging validation script
  - Documentation updates
  - Production deployment

success_criteria:
  must_have:
    - 100% of logs include correlationId when event context is available
    - fleet.trace returns complete timelines for test events
    - No performance degradation (AsyncLocalStorage overhead < 1%)
    - All existing tests pass
    - Backward compatible with existing services

  nice_to_have:
    - sessionId and userId in logs where available
    - Stage annotations in routing slip logs
    - HTTP request correlation works end-to-end

technical_architecture: documentation/technical-architecture/agent-centric-logging-v1.md
