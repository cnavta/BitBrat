  # =========================================================================
  # PHASE 3: EVENT FLOW INTEGRATION
  # =========================================================================

  # Task Group 3.1: Message Handling

  - id: BL-332-040
    title: "Implement message handler with complete()/next() pattern"
    description: |
      Update reflex-service.ts to handle internal.reflex.v1 messages.
      Implement 3 paths: match→complete, no-match→next, error→complete.
    phase: "3.1"
    priority: critical
    status: done
    estimatedHours: 4
    dependencies: [BL-332-014, BL-332-023, BL-332-032]
    tags: [event-flow, routing, core]
    acceptanceCriteria:
      - Subscribes to internal.reflex.v1
      - No match: calls next() to continue routing slip
      - Match: calls complete() to skip remaining analysis
      - Error: calls complete() in degraded mode (never blocks)
      - Structured logging at all decision points
      - Tracks end-to-end latency (<150ms target)

  - id: BL-332-041
    title: "Implement event enrichment"
