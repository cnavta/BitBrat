    phase: "1.3"
    priority: critical
    status: done
    estimatedHours: 1.5
    dependencies: [BL-332-011, BL-332-020]
    tags: [orchestration, candidate, templating]
    acceptanceCriteria:
      - Interpolates {{event.path}} placeholders with event field values
      - Interpolates {{result.path}} placeholders with tool result values
      - Uses field accessor for nested path traversal
      - Builds InternalCandidate object with source, text, confidence, metadata
      - Handles missing fields gracefully
      - Returns candidate object

  - id: BL-332-023
    title: "Implement tool executor"
    description: |
      Create tool-executor.ts to invoke MCP tools via tool-gateway.
      HTTP POST with MCP_AUTH_TOKEN, timeout protection, error handling.
    phase: "1.3"
    priority: critical
    status: done
    estimatedHours: 2
    dependencies: [BL-332-001]
    tags: [orchestration, mcp, http]
    acceptanceCriteria:
      - POSTs to tool-gateway /mcp/invoke endpoint
      - Includes Authorization header with MCP_AUTH_TOKEN
      - Respects timeout (default 5000ms)
      - Throws error on non-2xx status
      - Returns tool result

  - id: BL-332-024
    title: "Implement reflex executor"
    description: |
      Create reflex-executor.ts to orchestrate full reflex execution.
      Build parameters, execute tool, build candidate if template defined, track latency, update statistics.
    phase: "1.3"
    priority: critical
    status: done
    estimatedHours: 3
    dependencies: [BL-332-021, BL-332-022, BL-332-023]
    tags: [orchestration, execution]
    acceptanceCriteria:
      - Builds parameters using parameter builder
      - Executes tool via tool executor
      - Builds candidate if candidateTemplate is defined
      - Includes candidate in execution result
      - Tracks latency (start/end timestamps)
      - Updates reflex statistics (successCount, errorCount)
      - Returns success/failure result with candidate
      - Logs execution at INFO level (includes candidateGenerated flag)

