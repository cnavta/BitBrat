  # Task Group 1.1: Data Model & Types

  - id: BL-332-001
    title: "Define Reflex TypeScript interfaces"
    description: |
      Create comprehensive TypeScript type definitions for Reflex data model in src/types/reflex.ts.
      Include Reflex, ReflexCondition, PatternMatch, ToolInvocation interfaces with JSDoc comments.
      Include candidateTemplate optional field for response generation.
    phase: "1.1"
    priority: critical
    status: done
    estimatedHours: 1
    dependencies: []
    tags: [types, foundation]
    acceptanceCriteria:
      - All interfaces defined with proper types
      - candidateTemplate field included as optional string
      - JSDoc comments with examples added
      - Exports all types for use in other modules
      - Types compile without errors

  - id: BL-332-002
    title: "Define execution event interfaces"
    description: |
      Create TypeScript interfaces for reflex execution events in src/types/reflex-events.ts.
      Include ReflexExecutedEvent, ReflexFailedEvent, ReflexTriggeredBy with version literals.
    phase: "1.1"
    priority: critical
    status: done
    estimatedHours: 0.5
    dependencies: []
    tags: [types, events, foundation]
    acceptanceCriteria:
      - ReflexExecutedEvent interface matches schema from architecture
      - ReflexFailedEvent interface matches schema from architecture
      - Version literals set to '1'
      - All exports defined

  - id: BL-332-003
    title: "Create Firestore schema validator"
    description: |
      Add Firestore security rules for 'reflexes' collection.
      Add indexes for 'active' and 'priority' fields for query optimization.
    phase: "1.1"
    priority: high
    status: done
    estimatedHours: 0.5
    dependencies: [BL-332-001]
    tags: [firestore, schema, security]
    acceptanceCriteria:
      - Security rules validate required fields
      - Indexes created for active and priority
      - Rules documented in firestore.rules

  # Task Group 1.2: Matching Engine

  - id: BL-332-010
    title: "Implement pattern matcher"
    description: |
      Create pattern-matcher.ts with support for 5 match types: exact, contains, prefix, suffix, regex.
      Include ReDoS protection using safe-regex library. Target <10ms performance.
    phase: "1.2"
    priority: critical
    status: done
    estimatedHours: 3
    dependencies: [BL-332-001]
    tags: [matching, performance, security]
    acceptanceCriteria:
      - All 5 match types implemented
      - ReDoS protection using safe-regex
      - Throws error on unsafe regex patterns
      - Performance <10ms for pattern matching
      - Comprehensive error messages

  - id: BL-332-011
    title: "Implement field accessor"
    description: |
      Create field-accessor.ts to extract values from events using JSONPath-like syntax.
      Support nested object traversal (e.g., message.text, identity.user.id).
    phase: "1.2"
    priority: critical
    status: done
    estimatedHours: 2
    dependencies: [BL-332-001]
    tags: [matching, utilities]
    acceptanceCriteria:
      - Supports nested path access with dot notation
      - Returns undefined for missing paths
      - Handles null/undefined gracefully
      - Unit tests for edge cases

  - id: BL-332-012
    title: "Implement condition evaluator"
    description: |
      Create condition-evaluator.ts to evaluate reflex conditions (eventTypes, channels, platforms, userRoles, minAuthLevel).
      Use AND logic - all conditions must match.
    phase: "1.2"
    priority: critical
    status: done
    estimatedHours: 2
    dependencies: [BL-332-001]
    tags: [matching, conditions]
    acceptanceCriteria:
      - Evaluates all condition types
      - AND logic (all must match)
      - Returns true if no conditions specified
      - Handles missing event fields

  - id: BL-332-013
    title: "Implement reflex matcher"
    description: |
      Create reflex-matcher.ts to determine if a single reflex matches an event.
      Combine condition evaluation and pattern matching.
    phase: "1.2"
    priority: critical
    status: done
    estimatedHours: 1
    dependencies: [BL-332-010, BL-332-011, BL-332-012]
    tags: [matching, orchestration]
    acceptanceCriteria:
      - Evaluates conditions first (early exit)
      - Applies pattern matching if conditions pass
      - Returns boolean match result
      - Logs match attempts at debug level

  - id: BL-332-014
    title: "Implement reflex selector"
    description: |
      Create reflex-selector.ts to find the first matching reflex from a list.
      Filter active reflexes, sort by priority, return first match.
    phase: "1.2"
    priority: critical
    status: done
    estimatedHours: 1
    dependencies: [BL-332-013]
    tags: [matching, priority]
    acceptanceCriteria:
      - Filters only active reflexes
      - Sorts by priority ascending (lower = higher priority)
      - Returns first match (Phase 1 behavior)
      - Returns empty array if no matches
      - Logs selection process

  # Task Group 1.3: Orchestration Engine

  - id: BL-332-020
    title: "Implement template interpolator"
