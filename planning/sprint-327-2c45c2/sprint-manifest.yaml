notes: |
  Role for this sprint: Lead Technical Writer (documentation deliverables only — AGENTS.md §6 note on
  documentation/discovery sprints; validation lints/link-checks/structure rather than building code).

  Source of truth for the changes being documented (all COMPLETE):
    - sprint-324-00782d "The Bit Model & Universal MCP Control Plane": BaseServer -> Bit; MCP control plane
      folded into the base abstraction (every Bit speaks MCP); mandatory `bit.*` toolset (bit.info,
      bit.health/readiness, bit.config.get/describe, bit.flags.get/set, bit.log.level, bit.drain,
      bit.shutdown) + `bit.llm.*`; capability profiles (Eventing/Resources/McpClient/Llm) via
      applyProfiles(); additive architecture.yaml fields `profile:` + `mcp.exposure:`; `bit:` glossary;
      McpServer is now a thin compat shim; BaseServer alias retired.
    - sprint-325-d7f389 "Brat as a Fleet MCP Client (BL-204)": new `brat fleet` command group driving the
      `bit.*` plane fleet-wide through the tool-gateway fabric (default), with `--direct` break-glass,
      `--all` read-only fan-out, `--confirm`-gated mutations, `--target` deployment-target resolution,
      Bit-qualified addressing in tool-gateway.
    - sprint-326-b8f1a2 "Integrated Version Handling": architecture.yaml `project.version` is the single
      source of truth; `brat release <patch|minor|major|x.y.z>` (+ `npm run release`) bumps the three files
      in lockstep and rolls the CHANGELOG (already reflected in README + AGENTS.md).

