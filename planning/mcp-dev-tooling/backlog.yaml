meta:
  backlog_id: mcp-dev-tooling-easy-wins
  updated_at: 2026-06-26T22:57:00Z
  status_values: [todo, in_progress, blocked, done]
  priority_values: [P0, P1, P2, P3]
  effort_values: [S, M, L]
  source: planning/mcp-dev-tooling/execution-plan.md
  design: documentation/architecture/bl-204-brat-fleet-mcp-client-technical-architecture.md
  approval_required: true
  notes: |
    Trackable Prioritized YAML Backlog for the MCP dev-tooling "easy wins" — the
    read/observe/validate/plan quadrant of the dev-tooling assessment. Each item wraps something that
    ALREADY exists (a brat --json subcommand, an already-MCP bit.* read tool, or a pure repo/registry read)
    as a typed MCP tool so an agent stops brittle-parsing human-formatted CLI output, without gaining any
    mutating command.
    The unifying rule (binding for every item):
      - Read-only / idempotent only; anything that writes is exposed ONLY as its --dry-run / plan half.
      - Gateway-mediated (ADR-003 chokepoint); no second path around the fabric; never self-authorize;
        RBAC is server-authoritative (tools only forward identity, the gateway + Bit decide).
      - Fail-closed: no resolvable MCP_AUTH_TOKEN => refuse to run; absent token logged as a posture warning.
      - Redaction preserved: config/registry reads return server-side-redacted values and token hashes only.
      - Typed I/O over CLI parsing: every tool has an explicit input/output JSON schema.
    Easy wins covered (assessment -> backlog):
      1. brat config show / config validate / doctor as typed MCP reads (zero blast radius)  -> BL-200..202
      2. Drive the bit.* READ plane (info/health/readiness/config.*/flags.get) over MCP       -> BL-210..211
      3. fleet list enumeration as a typed MCP read                                           -> BL-212
      4. release --dry-run planning tool (CI-safe, idempotent)                                -> BL-300
      5. infra plan / deploy --dry-run planning halves (mutating halves EXCLUDED)             -> BL-301
      6. Read-only Firestore / registry snapshot reads (token hashes, never plaintext)        -> BL-400
    EXCLUDED (stay human-initiated, --confirm-gated, single-target, audited): bit.flags.set, bit.log.level,
      bit.drain, bit.shutdown (bit:operate); brat setup, infra apply, deploy services --all,
      cloud-run shutdown, fleet ... --direct break-glass, release --tag. Asserted unreachable by BL-500.
    DEFERRED (high value, NOT an easy win — net-new structured logs + correlation-trace reads): BL-D01.
    Deployment-target parity (GCP Cloud Run/PubSub/Firestore, Local Docker Compose/NATS, Remote Docker
      ssh://) is required of every tool and asserted by BL-500; discovery uses the registry-published URL
      and the bus backend is off the synchronous read path.
    STATUS: PRE-SPRINT (AGENTS.md Rule S1). Plan drafted, approval pending; exposing a new operator surface
      over MCP is itself an ADR + sprint item (Phase R / BL-002). No sprint started, no branch, no code
      changed. This backlog awaits an explicit "Start sprint." (§2.2) before any implementation begins.

