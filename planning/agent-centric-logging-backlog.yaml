          - Extract traceId, sessionId, userId if present
          - Build EventContext object
          - Wrap handler execution with context
          - Maintain existing message handler behavior
          - Handle missing correlationId gracefully
          - Preserve error handling and acknowledgment
        dependencies:
          - epic-1
        files:
          - action: update
            path: src/common/base-server.ts
            method: onMessage
            lines: 500-600
        tasks:
          - Import runWithEventContext and EventContext
          - Locate onMessage method
          - Create wrappedHandler function
          - Extract correlationId from data
          - Extract traceId from data
          - Extract sessionId from data
          - Extract userId from data.identity.user
          - Build EventContext object
          - Wrap original handler with runWithEventContext
          - Verify error handling preserved
          - Verify acknowledgment preserved
          - Test with and without correlationId

