risks:
  - id: risk-1
    name: Context Propagation Bugs
    likelihood: medium
    impact: high
    mitigation: Extensive tests, staged rollout, feature flag
    contingency: Rollback mechanism, disable wrapping

  - id: risk-2
    name: Performance Degradation
    likelihood: low
    impact: medium
    mitigation: Benchmark, monitor, set SLO <1%
    contingency: Optimize or disable if >2%

  - id: risk-3
    name: OpenTelemetry Interaction
    likelihood: medium
    impact: medium
    mitigation: Test both paths, OTel precedence
    contingency: Prioritize OTel, EventContext fallback

  - id: risk-4
    name: Memory Leaks
    likelihood: low
    impact: high
    mitigation: Memory profiling, monitoring
    contingency: Fix leak or rollback

success_criteria:
  must_have:
    - 100% logs include correlationId when context available
    - fleet.trace returns complete timelines
    - Performance overhead < 1%
    - All existing tests pass
    - Backward compatible

  nice_to_have:
    - sessionId and userId in logs
    - Stage annotations in routing logs
    - HTTP request correlation end-to-end
