      - All Epic 1 stories done
      - Unit tests passing
      - No breaking changes

  - name: Core Integration Complete
    date: Day 5
    criteria:
      - Epic 1 and Epic 2 done
      - Message handlers auto-inject context
      - Integration tests passing

  - name: HTTP Integration Complete
    date: Day 6
    criteria:
      - Epic 3 done
      - HTTP requests auto-inject context
      - End-to-end tests passing

  - name: Staging Validated
    date: Day 9
    criteria:
      - Deployed to staging
