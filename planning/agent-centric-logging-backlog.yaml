            path: src/common/base-server.ts
        tasks:
          - Add null/undefined checks
          - Add try-catch around context extraction
          - Add fallback for missing fields
          - Add debug logging for missing correlationId
          - Test with malformed messages
          - Verify no exceptions thrown

