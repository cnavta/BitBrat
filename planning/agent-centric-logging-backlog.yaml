        name: Enhance Logger with EventContext
        priority: P0
        estimate_hours: 3
        status: done
        assignee: claude
        completed_at: 2026-07-10
        description: Update Logger.base() to automatically inject EventContext fields
        acceptance_criteria:
          - Logger imports and uses getEventContext
          - correlationId added when present
          - traceId, sessionId, userId added when present
          - stage field added when present
          - Backward compatible (works without context)
          - Does not override OTel fields
          - Handles exceptions gracefully
        dependencies:
          - story-1.1
        files:
          - action: update
            path: src/common/logging.ts
            lines: 96-109
        tasks:
          - Import getEventContext
          - Add event context retrieval in base() method
          - Add correlationId injection
          - Add traceId injection (if not from OTel)
          - Add sessionId injection
          - Add userId injection
          - Add stage injection
          - Add requestId injection
          - Add exception handling
          - Verify OTel fields take precedence

