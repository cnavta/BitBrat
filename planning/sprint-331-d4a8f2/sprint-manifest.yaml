title: "Modernize Bit creation with brat bit create command"
goal: >
  Replace the current `brat service bootstrap` command with a modern `brat bit create` command
  that reflects current BitBrat nomenclature (Bit vs service), offers comprehensive configuration
  options (kind, profile, MCP exposure), and makes Bit lifecycle management integral to the brat
  CLI tooling.
