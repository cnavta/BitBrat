  - id: BL-331-407
    title: "Update CHANGELOG.md with breaking changes"
    description: |
      Add comprehensive entry to CHANGELOG.md documenting the breaking change,
      removed commands, and new command introduction.
    priority: 4
    phase: 4
    estimated_hours: 0.33
    status: pending
    dependencies: [BL-331-401, BL-331-402, BL-331-403, BL-331-404]
    acceptance_criteria:
      - CHANGELOG.md updated with sprint changes
      - Breaking changes clearly marked
      - Migration guidance provided
      - New command documented
      - Version number updated (if applicable)
    implementation_notes: |
      Location: CHANGELOG.md

      Add entry (adjust version as appropriate):

      ## [0.8.0] - 2026-07-03

      ### BREAKING CHANGES
      - **Removed**: `brat service bootstrap` command (replaced by `brat bit create`)
      - **Removed**: Legacy `infrastructure/scripts/bootstrap-service.js` script

      ### Added
      - **New**: `brat bit create` command for modern Bit creation
        - Supports `--profile` (core, gateway, llm, mcp-domain)
        - Supports `--exposure` (platform-only, platform+domain, none)
        - Supports `--kind` (pipeline-service, gateway, mcp-server)
        - Supports `--register` to auto-register in architecture.yaml
        - Comprehensive validation and error messages

      ### Migration Guide
      Old command:
      ```bash
      npm run brat -- service bootstrap --name my-service --mcp
      ```

      New command:
      ```bash
      npm run brat -- bit create my-service --profile mcp-domain --kind mcp-server
      ```

      For more details, see `CLAUDE.md` or run `npm run brat -- bit create --help`.

      ### Changed
      - Bit creation now uses modern nomenclature and comprehensive options
      - All documentation updated to reflect new command
    verification:
      - file: "CHANGELOG.md updated"
      - content: "Comprehensive and accurate"

