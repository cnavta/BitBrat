  - id: BL-331-106
    title: "Create command group entry point (brat bit)"
    description: |
      Implement tools/brat/src/cli/bit.ts as the command group entry point.
      Route subcommands (currently only 'create'), provide help text for the
      command group, and handle unknown subcommands gracefully.
    priority: 1
    phase: 1
    estimated_hours: 1
    status: complete
    completed_at: "2026-07-03T04:05:00Z"
    dependencies: [BL-331-105]
    acceptance_criteria:
      - cmdBit() function routes 'create' subcommand
      - Help text displays when no subcommand provided
      - Help text displays with --help flag
      - Unknown subcommands show error + help text
      - Exports cmdBit for use by main CLI
    implementation_notes: |
      Location: tools/brat/src/cli/bit.ts

      Structure:
      export async function cmdBit(
        cmd: string[],
        rest: string[],
        flags: Record<string, any>
      ): Promise<void> {
        const [subcommand] = cmd.slice(1); // cmd[0] is 'bit'

        if (!subcommand || flags.help) {
          printBitHelp();
          return;
        }

        if (subcommand === 'create') {
          await cmdBitCreate(cmd, rest, flags);
          return;
        }

        console.error(`Unknown subcommand: ${subcommand}`);
        printBitHelp();
        process.exit(2);
      }

      Help text:
      - Brief description of command group
      - List of subcommands (create)
      - Future subcommands noted (list, describe, validate)
    verification:
      - command: "brat bit"
        expected: "Help text displayed"
      - command: "brat bit --help"
        expected: "Help text displayed"
      - command: "brat bit create --help"
        expected: "Create command help displayed"

