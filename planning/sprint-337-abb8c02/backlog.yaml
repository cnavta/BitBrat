---
sprint:
  id: sprint-337-abb8c02
  title: Automated GitHub Releases via CI/CD
  start_date: 2026-07-11
  lead: Claude Code
  status: planning

epic:
  id: BL-337-001
  title: Replace local --github-release flag with automated CI/CD workflow
  description: >
    Implement GitHub Actions automation to create releases when PRs with version
    bumps are merged to main, replacing the flawed local --github-release approach

backlog:
  # Phase 1: Core Infrastructure
  - id: BL-337-100
    title: Create version detection script
    priority: critical
    status: completed
    phase: 1
    description: >
      Create scripts/detect-version-change.sh that compares architecture.yaml
      project.version between current commit and parent commit
    acceptance_criteria:
      - Script exits 0 if version changed, 1 if unchanged
      - Handles edge cases (no architecture.yaml, malformed YAML)
      - Works with git history (HEAD vs HEAD~1)
      - Outputs detected version numbers to stdout
    estimated_effort: 30min
    dependencies: []
    deliverables:
      - scripts/detect-version-change.sh

  - id: BL-337-101
    title: Create basic changelog extraction script
    priority: critical
    status: completed
    phase: 1
    description: >
      Create scripts/extract-changelog.sh that parses CHANGELOG.md and extracts
      the release notes for a specific version (basic extraction, no LLM yet)
    acceptance_criteria:
      - Accepts version as argument (e.g., "0.11.0")
      - Extracts content between ## [VERSION] and next ## heading
      - Handles missing version gracefully (returns empty/null)
      - Preserves markdown formatting
      - Removes date suffix from heading (e.g., "## [0.11.0] - 2026-07-11" → content only)
    estimated_effort: 30min
    dependencies: []
    deliverables:
      - scripts/extract-changelog.sh

  - id: BL-337-102
    title: Create basic GitHub Actions workflow scaffold
    priority: critical
    status: completed
    phase: 1
    description: >
      Create .github/workflows/auto-release.yml scaffold that triggers on push to main
      and detects version changes (LLM integration added in Phase 2)
    acceptance_criteria:
      - Triggers only on push to main branch
      - Uses detect-version-change.sh to check if version bumped
      - Skips if version unchanged (exit gracefully)
      - Sets up Node.js 24 environment
      - Installs dependencies if needed
      - Validates workflow syntax
      - Uses GITHUB_TOKEN for authentication
    estimated_effort: 30min
    dependencies:
      - BL-337-100
    deliverables:
      - .github/workflows/auto-release.yml (scaffold)

  # Phase 2: LLM Integration
  - id: BL-337-200
    title: Create LLM release notes generator (Node.js)
    priority: critical
    status: completed
    phase: 2
    description: >
      Create scripts/llm-release-notes.js that uses OpenAI API to generate
      intelligent, categorized release notes from git commits
    acceptance_criteria:
      - Accepts version and previous version as arguments
      - Integrates with OpenAI API (GPT-4o-mini)
      - Parses git log between version tags
      - Generates structured release notes with categories (Features, Fixes, Breaking Changes)
      - Creates "Highlights" summary section
      - Handles API failures gracefully (returns null/error)
      - Uses environment variable OPENAI_API_KEY
      - Outputs GitHub-flavored markdown
      - Includes cost-efficient prompting strategy
    estimated_effort: 60min
    dependencies: []
    deliverables:
      - scripts/llm-release-notes.js
      - package.json (add openai dependency)

  - id: BL-337-201
    title: Integrate LLM generator with workflow
    priority: critical
    status: completed
    phase: 2
    description: >
      Update GitHub Actions workflow to use LLM release notes generator
    acceptance_criteria:
      - Workflow calls llm-release-notes.js with version info
      - Falls back to extract-changelog.sh if LLM fails
      - Combines CHANGELOG content with LLM-generated Highlights
      - Configures OPENAI_API_KEY secret from GitHub Secrets
      - Handles empty/missing CHANGELOG with full LLM generation
      - Logs LLM usage for debugging
      - Creates git tag with LLM-enhanced notes
      - Creates GitHub Release with formatted notes
    estimated_effort: 45min
    dependencies:
      - BL-337-102
      - BL-337-200
    deliverables:
      - .github/workflows/auto-release.yml (complete)

  - id: BL-337-202
    title: Add git log parsing utility
    priority: high
    status: completed
    phase: 2
    description: >
      Create helper function/module for intelligent git commit parsing
    acceptance_criteria:
      - Parses git log between two tags/commits
      - Extracts commit messages, types (feat/fix/etc), and scopes
      - Filters out merge commits and noise
      - Groups commits by type for categorization
      - Handles conventional commit format
      - Returns structured data for LLM processing
    estimated_effort: 30min
    dependencies:
      - BL-337-200
    deliverables:
      - scripts/parse-git-log.js or inline in llm-release-notes.js

  # Phase 3: Release Creation & Edge Cases
  - id: BL-337-300
    title: Add workflow error handling and edge cases
    priority: high
    status: completed
    phase: 3
    description: >
      Enhance workflow with robust error handling, duplicate detection, and edge case handling
    acceptance_criteria:
      - Check if tag already exists before creating
      - Handle case where CHANGELOG has no entry for version
      - Handle LLM API failures gracefully
      - Add workflow notifications on failure
      - Validate version format (SemVer)
      - Log all steps clearly for debugging
      - Prevent duplicate releases
    estimated_effort: 30min
    dependencies:
      - BL-337-201
    deliverables:
      - Updated .github/workflows/auto-release.yml

  - id: BL-337-301
    title: Add workflow permissions and security
    priority: high
    status: completed
    phase: 3
    description: >
      Configure minimal required permissions for workflow security
    acceptance_criteria:
      - Workflow uses minimal permissions (contents:write for tags/releases)
      - Uses GITHUB_TOKEN for releases (not PAT)
      - OPENAI_API_KEY configured as GitHub secret
      - Follows GitHub Actions security best practices
      - Secrets not logged or exposed
    estimated_effort: 15min
    dependencies:
      - BL-337-201
    deliverables:
      - Updated .github/workflows/auto-release.yml

  # Phase 4: Documentation Updates
  - id: BL-337-400
    title: Update CLAUDE.md to remove --github-release references
    priority: high
    status: completed
    phase: 4
    description: >
      Remove all mentions of --github-release flag and update with CI/CD + LLM approach
    acceptance_criteria:
      - Remove --github-release from version management section
      - Add section explaining automated release workflow with LLM enhancement
      - Document OPENAI_API_KEY secret requirement
      - Update developer workflow guidance
      - Keep --tag flag documentation (still useful for local testing)
    estimated_effort: 15min
    dependencies:
      - BL-337-201
    deliverables:
      - CLAUDE.md

  - id: BL-337-401
    title: Update README.md with automated release workflow
    priority: high
    status: completed
    phase: 4
    description: >
      Update README.md versioning section to reflect GitHub Actions automation with LLM
    acceptance_criteria:
      - Remove --github-release flag references
      - Document new automated workflow with LLM features
      - Explain PR → merge → LLM-enhanced auto-release flow
      - Provide examples and best practices
      - Document secret setup (OPENAI_API_KEY)
    estimated_effort: 15min
    dependencies:
      - BL-337-201
    deliverables:
      - README.md

  - id: BL-337-402
    title: Create workflow usage documentation
    priority: medium
    status: completed
    phase: 4
    description: >
      Create documentation/guides/automated-releases.md explaining the workflow
    acceptance_criteria:
      - Explains trigger conditions (version bump on main)
      - Shows example CHANGELOG format
      - Documents LLM enhancement features
      - Explains Highlights generation and categorization
      - Troubleshooting common issues (LLM failures, API limits)
      - How to manually trigger if needed
      - How to verify release was created
      - How to configure OPENAI_API_KEY secret
    estimated_effort: 30min
    dependencies:
      - BL-337-201
    deliverables:
      - documentation/guides/automated-releases.md

  # Phase 5: Testing & Validation
  - id: BL-337-500
    title: Test version detection script
    priority: critical
    status: pending
    phase: 5
    description: >
      Create unit tests for detect-version-change.sh script
    acceptance_criteria:
      - Test version changed scenario
      - Test version unchanged scenario
      - Test missing architecture.yaml
      - Test malformed YAML
      - All tests pass
    estimated_effort: 20min
    dependencies:
      - BL-337-100
    deliverables:
      - scripts/__tests__/detect-version-change.test.sh or inline tests

  - id: BL-337-501
    title: Test changelog extraction script
    priority: critical
    status: pending
    phase: 5
    description: >
      Create unit tests for extract-changelog.sh script
    acceptance_criteria:
      - Test extraction with valid version
      - Test extraction with missing version
      - Test extraction with multiple versions
      - Test markdown formatting preservation
      - All tests pass
    estimated_effort: 20min
    dependencies:
      - BL-337-101
    deliverables:
      - scripts/__tests__/extract-changelog.test.sh or inline tests

  - id: BL-337-502
    title: Test LLM release notes generator
    priority: critical
    status: pending
    phase: 5
    description: >
      Create tests for llm-release-notes.js with mocked OpenAI API
    acceptance_criteria:
      - Mock OpenAI API responses
      - Test with various git commit patterns
      - Test categorization logic (features, fixes, breaking)
      - Test Highlights generation
      - Test fallback when API fails
      - Test with empty commit log
      - All tests pass
    estimated_effort: 30min
    dependencies:
      - BL-337-200
    deliverables:
      - scripts/__tests__/llm-release-notes.test.js

  - id: BL-337-503
    title: Validate GitHub Actions workflow syntax
    priority: critical
    status: pending
    phase: 5
    description: >
      Ensure workflow YAML is valid and follows best practices
    acceptance_criteria:
      - Workflow passes GitHub Actions linter
      - actionlint (if available) passes
      - YAML syntax is valid
      - All referenced actions use pinned versions
      - Secrets properly configured
    estimated_effort: 10min
    dependencies:
      - BL-337-201
    deliverables:
      - Validated .github/workflows/auto-release.yml

  - id: BL-337-504
    title: Add workflow validation to validate_deliverable.sh
    priority: high
    status: completed
    phase: 5
    description: >
      Update validate_deliverable.sh to include workflow validation
    acceptance_criteria:
      - Checks that auto-release.yml exists
      - Validates YAML syntax
      - Validates helper scripts are executable
      - Runs script tests (if created)
      - Checks for required secrets documentation
      - Documented in script output
    estimated_effort: 15min
    dependencies:
