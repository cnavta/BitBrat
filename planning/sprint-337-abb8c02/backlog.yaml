    description: |
      Create a utility to verify GitHub CLI (gh) is installed and accessible.

      Implementation:
      - Use 'which gh' (Unix) or 'where gh' (Windows)
      - Return boolean: true if found, false otherwise
      - Cache result to avoid repeated checks

      Location: tools/brat/src/release/release.ts or new utils file
    priority: P0
    phase: 2
    estimated_hours: 0.5
    dependencies: []
    acceptance_criteria:
      - Function returns true when gh is installed
      - Function returns false when gh is not installed
      - Works on macOS, Linux, Windows
      - Result is cached for performance
    files:
      - tools/brat/src/release/release.ts
    status: pending
    assigned_to: null
    completed: false

  - id: TASK-005
    title: "Add createGitHubRelease() function"
    description: |
      Implement async function to create GitHub release via gh CLI.

      Signature:
      async function createGitHubRelease(
        version: string,
        notes: string,
        dryRun: boolean
      ): Promise<boolean>

      Process:
      1. Check if gh is installed (use TASK-004)
      2. If dryRun: log what would be created, return true
      3. Execute: gh release create v<version> --title "v<version>" --notes "<notes>"
      4. Return true on success (exit code 0), false otherwise
    priority: P0
    phase: 2
    estimated_hours: 1.5
    dependencies:
      - TASK-004
    acceptance_criteria:
      - Function exported from release.ts
      - Correctly constructs gh CLI command
      - Handles success and failure cases
      - Dry-run logs without executing
      - Returns boolean status
    files:
      - tools/brat/src/release/release.ts
    status: pending
    assigned_to: null
    completed: false

  - id: TASK-006
    title: "Implement dry-run support for GitHub release"
    description: |
      Ensure createGitHubRelease() respects --dry-run flag:
      - Log exact gh command that would be executed
      - Show what release notes would be used
      - Do NOT call gh CLI in dry-run mode
      - Return true (simulated success)
    priority: P0
    phase: 2
    estimated_hours: 0.5
    dependencies:
      - TASK-005
    acceptance_criteria:
