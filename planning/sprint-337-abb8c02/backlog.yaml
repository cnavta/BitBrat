backlog:
  # ============================================================================
  # PHASE 1: Release Notes Extraction (Foundational)
  # ============================================================================

  - id: TASK-001
    title: "Add extractReleaseNotes() function to changelog.ts"
    description: |
      Implement a pure function that extracts release notes for a specific
      version from a Keep-a-Changelog formatted CHANGELOG.md file.

      Function signature:
      export function extractReleaseNotes(content: string, version: string): string

      Algorithm:
      1. Find section: ## [<version>] - <date>
      2. Extract all content until next ## [ header or EOF
      3. Strip leading/trailing whitespace
      4. If not found or empty, return default: "Release <version>"
    priority: P0
    phase: 1
    estimated_hours: 1.5
    dependencies: []
    acceptance_criteria:
      - Function exported from changelog.ts
      - Correctly extracts notes from well-formed CHANGELOG
      - Returns default message when section not found
      - Preserves markdown formatting in extracted notes
    files:
      - tools/brat/src/release/changelog.ts
    status: pending
    assigned_to: null
    completed: false

  - id: TASK-002
    title: "Write unit tests for extractReleaseNotes()"
    description: |
      Create comprehensive test suite for release notes extraction covering:
      - Standard Keep-a-Changelog format
      - Missing CHANGELOG.md (error handling)
      - Missing version section (default fallback)
      - Empty version section (default fallback)
      - Multiple versions (extract correct one)
      - Whitespace handling
      - Markdown preservation
    priority: P0
    phase: 1
    estimated_hours: 1.0
    dependencies:
      - TASK-001
    acceptance_criteria:
      - New test file created
      - All edge cases covered
      - Tests pass with 100% coverage of new function
    files:
