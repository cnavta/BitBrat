# Sprint 349: Environment Unification - Trackable Backlog
# Sprint ID: sprint-349-environment-unification
# Start Date: 2026-07-19
# Status: Planning

metadata:
  sprint_id: sprint-349-environment-unification
  start_date: 2026-07-19
  estimated_duration_days: 12
  priority: P0
  status: planning

# Epic-level summary
epic:
  title: Environment Unification
  description: |
    Unify BitBrat's fragmented environment handling under a single Execution Context
    abstraction. Eliminate --env vs --target confusion, enable self-service environment
    creation, and provide automatic discovery of gateway URLs and persistence config.
  goals:
    - Eliminate user confusion (--context replaces --env/--target)
    - Enable self-service environment creation (brat context create)
    - Centralize context resolution (single ContextResolver)
    - Auto-discover gateway URLs and persistence config
    - Preserve backward compatibility (3-sprint deprecation period)

# Phases organize related tasks
phases:
  - id: phase-1
    name: Schema & Core Infrastructure
    duration_days: 2
    priority: P0
    description: Establish foundational types, schemas, and migration tooling
    depends_on: []

  - id: phase-2
    name: ContextResolver Library
    duration_days: 2
    priority: P0
    description: Centralized context resolution with auto-discovery
    depends_on: [phase-1]

  - id: phase-3
    name: CLI Unification
    duration_days: 3
    priority: P0
    description: Update all commands to use ContextResolver and --context flag
    depends_on: [phase-2]

  - id: phase-4
    name: Context Management Commands
    duration_days: 3
    priority: P1
    description: Full CRUD for execution contexts + validation/health checks
    depends_on: [phase-2]  # Can start during phase-3

  - id: phase-5
    name: Documentation & Polish
    duration_days: 2
    priority: P1
    description: Comprehensive documentation, migration guide, examples
    depends_on: [phase-3, phase-4]

