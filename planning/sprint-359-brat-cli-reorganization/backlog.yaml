  - id: BASE-001
    title: "Create BratCommand base class"
    description: |
      Create tools/brat/src/oclif-commands/base.ts extending oclif Command.
      Integrate pino logger, context resolver, dependency injection.
      Provide shared utilities for all brat commands.
    phase: 1
    priority: P0
    story_points: 5
    status: not_started
    dependencies: [INFRA-005]
    assignee: null
    acceptance_criteria:
      - "tools/brat/src/oclif-commands/base.ts created"
      - "Extends Command from @oclif/core"
      - "Integrates createLogger() from orchestration/logger.ts"
      - "Provides getContext() returning execution context"
      - "Provides getDeps() for dependency injection"
      - "Exposes logger as this.logger (pino instance)"
      - "Handles --context flag parsing"
      - "Handles --verbose/-v flag for log level"
      - "TypeScript compiles without errors"
    validation_commands:
      - "npm run build"
      - "grep -A 20 'export abstract class BratCommand' tools/brat/src/oclif-commands/base.ts"
    reference: "See oclif-migration-guide.md section 'Base Command Pattern'"
    notes: |
      Critical patterns to preserve:
      1. Pino logging with metadata
      2. Context resolution (local, staging, prod)
      3. Dependency injection for testability

  - id: BASE-002
    title: "Implement context resolution in BratCommand"
    description: |
      Integrate ContextResolver into BratCommand.init().
      Support --context flag, BITBRAT_CONTEXT env var, ~/.bratrc.
      Cache resolved context for command lifecycle.
    phase: 1
    priority: P0
    story_points: 3
    status: not_started
    dependencies: [BASE-001]
    assignee: null
    acceptance_criteria:
      - "BratCommand.init() resolves context using ContextResolver"
      - "--context flag registered as global flag"
      - "BITBRAT_CONTEXT environment variable honored"
      - "~/.bratrc read as fallback"
      - "Default context is 'local' if none specified"
      - "Resolved context available via this.context"
      - "Context resolution logged at debug level"
      - "Invalid context throws error with helpful message"
    validation_commands:
      - "BITBRAT_CONTEXT=staging node dist/tools/brat/src/oclif-entry.js config show"
      - "node dist/tools/brat/src/oclif-entry.js config show --context staging"
    reference: "See context/context-resolver.ts for existing implementation"

  - id: BASE-003
    title: "Implement logger integration in BratCommand"
    description: |
      Integrate pino logger into BratCommand with --verbose flag support.
      Set log level based on --verbose (debug) vs default (info).
      Ensure structured logging with correlation IDs.
    phase: 1
    priority: P0
    story_points: 2
    status: not_started
    dependencies: [BASE-001]
    assignee: null
    acceptance_criteria:
      - "BratCommand.init() creates pino logger via createLogger()"
      - "--verbose/-v flag registered as global flag"
      - "Log level 'debug' if --verbose, else 'info'"
      - "Logger available as this.logger throughout command"
      - "Logger outputs JSON in production, pretty in dev"
      - "Logger includes command name in metadata"
      - "No console.log() calls in BratCommand"
    validation_commands:
      - "node dist/tools/brat/src/oclif-entry.js config show --verbose 2>&1 | grep -i debug"
      - "node dist/tools/brat/src/oclif-entry.js config show 2>&1 | grep -v debug"
    reference: "See orchestration/logger.ts for createLogger() implementation"

  - id: BASE-004
    title: "Implement dependency injection pattern in BratCommand"
    description: |
      Create getDeps() method supporting optional dependency overrides.
      Enable constructor injection for testability.
      Preserve existing FleetDeps, OrchestratorDeps patterns.
    phase: 1
    priority: P0
    story_points: 3
    status: not_started
    dependencies: [BASE-001]
    assignee: null
    acceptance_criteria:
      - "BratCommand has protected getDeps<T>() method"
      - "Supports optional deps parameter in constructor"
      - "Default deps created if none provided"
      - "Deps cached for command lifecycle"
      - "FleetDeps, OrchestratorDeps interfaces preserved"
      - "Test utilities provide mock deps"
      - "Example test demonstrates DI pattern"
    validation_commands:
      - "npm test -- --testPathPattern=oclif-commands.*base"
    reference: "See oclif-migration-guide.md section 'Dependency Injection Pattern'"
    notes: |
      Example:
      class FleetListCommand extends BratCommand {
        async run() {
          const deps = this.getDeps<FleetDeps>();
          const client = deps.createMcpClient(...);
        }
      }

  - id: BASE-005
    title: "Create BratCommand unit tests"
    description: |
      Create comprehensive test suite for BratCommand base class.
