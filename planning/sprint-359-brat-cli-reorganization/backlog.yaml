# Story Points: Fibonacci scale (1, 2, 3, 5, 8, 13)
# Status: not_started | in_progress | blocked | completed | deferred

metadata:
  sprint: 359
  title: "Brat CLI Reorganization - oclif Migration Foundation"
  start_date: null
  end_date: null
  goal: "Establish oclif foundation with working PoC of 5 commands, preserving critical patterns"
  scope:
    in_scope: ["Infrastructure setup", "Base command pattern", "5 PoC commands", "Backward compatibility"]
    out_of_scope: ["Full migration of 30+ commands", "Plugin system", "Cloud deployment"]

# ============================================================================
# PHASE 0: INFRASTRUCTURE SETUP (Days 1-2)
# ============================================================================

tasks:
  - id: INFRA-001
    title: "Install oclif dependencies"
    description: |
      Install @oclif/core and @oclif/plugin-help as production dependencies.
      Install @oclif/test as devDependency.
    phase: 0
    priority: P0
    story_points: 1
    status: not_started
    dependencies: []
    assignee: null
    acceptance_criteria:
      - "@oclif/core added to package.json dependencies"
      - "@oclif/plugin-help added to package.json dependencies"
      - "@oclif/test added to package.json devDependencies"
      - "npm install succeeds without errors"
      - "package-lock.json updated"
    validation_commands:
      - "npm ls @oclif/core @oclif/plugin-help @oclif/test"
      - "npm audit | grep -i oclif"
    notes: "Version constraints: @oclif/core ^3.x, @oclif/plugin-help ^6.x"

  - id: INFRA-002
    title: "Create oclif command directory structure"
    description: |
      Create tools/brat/src/oclif-commands/ directory structure following oclif conventions.
      Establish namespace hierarchy: infra/, deploy/, data/, fleet/, dev/, context/.
    phase: 0
    priority: P0
    story_points: 1
    status: not_started
    dependencies: [INFRA-001]
    assignee: null
    acceptance_criteria:
      - "tools/brat/src/oclif-commands/ directory exists"
      - "Subdirectories created: infra/, deploy/, data/, fleet/, dev/, context/"
      - "Each subdirectory has index.ts exporting namespace"
      - "Directory structure documented in README.md"
    validation_commands:
      - "ls -la tools/brat/src/oclif-commands/"
      - "find tools/brat/src/oclif-commands -type d"
    notes: "Follow oclif topic pattern: tools/brat/src/oclif-commands/fleet/list.ts → `brat fleet list`"

  - id: INFRA-003
    title: "Update TypeScript configuration for oclif"
    description: |
      Update tsconfig.json to include oclif command paths.
      Ensure decorators are enabled for oclif metadata.
      Add path aliases for oclif commands if needed.
    phase: 0
    priority: P0
    story_points: 2
    status: not_started
    dependencies: [INFRA-002]
    assignee: null
    acceptance_criteria:
      - "tsconfig.json includes oclif-commands/** in paths"
      - "experimentalDecorators: true set"
      - "emitDecoratorMetadata: true set"
      - "npm run build succeeds"
      - "No TypeScript errors in oclif-commands/"
    validation_commands:
      - "npm run build"
      - "tsc --noEmit"
    notes: "May need separate tsconfig for oclif commands if conflicts with existing config"

  - id: INFRA-004
    title: "Configure oclif in package.json"
    description: |
      Add oclif configuration block to package.json.
      Set bin entry point, topic separator, plugin configuration.
      Configure help system and command discovery.
    phase: 0
    priority: P0
    story_points: 2
    status: not_started
    dependencies: [INFRA-001, INFRA-002]
    assignee: null
    acceptance_criteria:
      - "package.json has oclif configuration block"
      - "bin points to oclif entry point (dist/tools/brat/src/oclif-entry.js)"
      - "topics configured for namespace hierarchy"
      - "plugins array configured"
      - "topicSeparator set to space (default)"
      - "Configuration validated with oclif doctor command"
    validation_commands:
      - "npx oclif readme"
      - "node dist/tools/brat/src/oclif-entry.js --help"
    example_config: |
      "oclif": {
        "bin": "brat",
        "dirname": "brat",
        "commands": "./dist/tools/brat/src/oclif-commands",
        "plugins": ["@oclif/plugin-help"],
        "topicSeparator": " ",
        "topics": {
          "fleet": {"description": "Fleet management and MCP control plane"},
          "infra": {"description": "Infrastructure provisioning and management"},
          "deploy": {"description": "Service deployment"},
          "data": {"description": "Data operations (backup, restore, seed)"},
          "dev": {"description": "Development tooling"}
        }
      }

  - id: INFRA-005
    title: "Create oclif entry point (bin/run)"
    description: |
      Create tools/brat/src/oclif-entry.ts as the new oclif-based entry point.
      Configure oclif.run() with error handling and process.exit.
      Keep existing tools/brat/src/cli/index.ts as legacy fallback.
