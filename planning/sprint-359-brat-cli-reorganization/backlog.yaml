    priority: P0
    story_points: 2
    status: not_started
    dependencies: [INFRA-004]
    assignee: null
    acceptance_criteria:
      - "tools/brat/src/oclif-entry.ts created"
      - "Imports oclif.run() from @oclif/core"
      - "Error handling wraps oclif.run()"
      - "Process exits with correct codes (0 success, 1 error)"
      - "Builds to dist/tools/brat/src/oclif-entry.js"
      - "package.json bin points to compiled entry"
    validation_commands:
      - "npm run build"
      - "node dist/tools/brat/src/oclif-entry.js --version"
      - "node dist/tools/brat/src/oclif-entry.js --help"
    reference: "See oclif-migration-guide.md section 'Entry Point Pattern'"

