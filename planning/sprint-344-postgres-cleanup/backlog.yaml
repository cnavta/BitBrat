# =============================================================================
# Risk Mitigation
# =============================================================================
risks:
  - risk: "Personality data migration from Firestore not in scope"
    mitigation: "Create separate tooling task for bulk migration in future sprint"

  - risk: "Silent failures if documentStore unavailable"
    mitigation: "Add explicit logging and error handling for resource access"

  - risk: "Performance impact of PostgreSQL vs Firestore"
    mitigation: "Benchmark critical queries; optimize indexes if needed"

  - risk: "Existing personalities in Firestore not accessible"
    mitigation: "PersonalityStore abstraction supports both backends during transition"

# =============================================================================
# Post-Sprint Cleanup
# =============================================================================
cleanup:
  - "Archive Firestore personalities after migration confirmed"
  - "Deprecate Firestore backend in Sprint 350+"
  - "Remove Firestore dependencies from package.json"
  - "Update CI/CD to default to PostgreSQL"
  - "Create migration tooling for production Firestore → PostgreSQL"
