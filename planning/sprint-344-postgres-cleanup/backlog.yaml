# Sprint 344: PostgreSQL Migration Cleanup - Prioritized Backlog
#
# This backlog contains all trackable tasks for Sprint 344, organized by phase and priority.
# Tasks are marked with priority (P0=critical, P1=high, P2=medium, P3=low) and dependencies.

sprint:
  id: 344
  name: "PostgreSQL Migration Cleanup"
  status: planning
  created: 2026-07-18
  lead: "Claude Code"
  estimated_hours: 14

metadata:
  tags:
    - postgres
    - migration
    - cleanup
    - persistence
    - data-integrity
  objectives:
    - Fix missing personalities table in PostgreSQL schema
    - Resolve empty prompt_logs table issue
    - Establish PostgreSQL as default persistence driver
    - Remove Firestore hardcoding from codebase

# =============================================================================
# PHASE 1: Schema & Migration (Personalities Table)
# =============================================================================
phase_1:
  name: "Schema & Migration"
  estimated_hours: 2
  dependencies: []

  tasks:
    - id: P1-T1
      title: "Create migration 009-add-personalities-table.sql"
      priority: P0
      type: schema
      estimated_minutes: 30
      acceptance_criteria:
        - Migration SQL file created in infrastructure/postgres/migrations/
        - Table definition includes id, data (JSONB), created_at, updated_at columns
        - Index on (data->>'name') for name lookups
        - Index on (data->>'status') for status filtering
        - Index on (data->>'version') for version sorting
        - Composite index on ((data->>'name'), (data->>'status'), (data->>'version') DESC)
        - Migration includes rollback SQL
        - Migration tested on local PostgreSQL instance
      files:
        - infrastructure/postgres/migrations/009-add-personalities-table.sql
      validation:
        - Migration runs without errors
        - psql \\d personalities shows all indexes

    - id: P1-T2
      title: "Add personalities table to 02-create-tables.sql"
      priority: P0
      type: schema
      estimated_minutes: 20
      depends_on: [P1-T1]
      acceptance_criteria:
        - Table definition appended to init script
        - Comment header explains purpose and Firestore mapping
        - Indexes match migration exactly
        - Table numbered as "23. Personalities collection"
        - Success message added at end
      files:
        - infrastructure/postgres/init/02-create-tables.sql
      validation:
        - Fresh database init creates personalities table
        - Table structure matches migration output

    - id: P1-T3
      title: "Document personality schema (personality.v1.json)"
      priority: P1
      type: documentation
      estimated_minutes: 30
      depends_on: [P1-T1]
      acceptance_criteria:
        - JSON Schema created following envelope.v1.json format
        - Required fields: name, text, status
        - Optional fields: version, tags, createdAt, updatedAt, platform, model
        - Enum for status: [active, inactive, archived]
        - Schema validated with example personality document
      files:
        - documentation/schemas/personality.v1.json
      validation:
        - Schema validates example personality JSON
        - Referenced in architecture.yaml schemas section

    - id: P1-T4
      title: "Test personality table migration locally"
      priority: P0
      type: testing
      estimated_minutes: 40
      depends_on: [P1-T1, P1-T2]
      acceptance_criteria:
        - Migration runs successfully on local PostgreSQL
        - Can INSERT personality document into table
        - Can query by name, status, version
        - Indexes are used in query plans (EXPLAIN)
        - No errors in PostgreSQL logs
      validation:
        - psql query returns inserted personality
        - EXPLAIN shows index usage

# =============================================================================
# PHASE 2: Persistence Abstraction (Document Store)
# =============================================================================
phase_2:
  name: "Persistence Abstraction"
  estimated_hours: 4
  dependencies: [phase_1]

  tasks:
    - id: P2-T1
      title: "Create PersonalityStore abstraction interface"
      priority: P0
      type: feature
      estimated_minutes: 45
      acceptance_criteria:
        - Interface defined in src/services/llm-bot/personality-store.ts
        - Method: getByName(name: string) => Promise<PersonalityDoc | undefined>
        - Method: getActive(name: string) => Promise<PersonalityDoc | undefined>
        - Method: list(filters?: {status?: string}) => Promise<PersonalityDoc[]>
        - Interface exported and documented
      files:
        - src/services/llm-bot/personality-store.ts
      validation:
        - TypeScript compiles without errors
        - Interface properly exported

    - id: P2-T2
      title: "Implement FirestorePersonalityStore"
      priority: P0
      type: feature
      estimated_minutes: 60
      depends_on: [P2-T1]
      acceptance_criteria:
        - Class implements IPersonalityStore interface
        - Uses Firestore collection() API
        - getByName queries collection with where clauses
        - Handles missing documents gracefully
        - Returns PersonalityDoc matching schema
        - Logs access with correlationId if available
      files:
        - src/services/llm-bot/personality-store.ts
      validation:
        - Unit tests pass for Firestore implementation
        - Mock Firestore queries return expected data

    - id: P2-T3
      title: "Implement DocumentStorePersonalityStore"
      priority: P0
      type: feature
      estimated_minutes: 60
      depends_on: [P2-T1]
      acceptance_criteria:
        - Class implements IPersonalityStore interface
        - Uses IDocumentStore.query() API
        - Filters by name, status, version using JSONB operators
        - Returns latest version when multiple matches
        - Handles PostgreSQL-specific errors gracefully
        - Logs access with correlationId if available
      files:
        - src/services/llm-bot/personality-store.ts
      validation:
        - Unit tests pass for PostgreSQL implementation
        - Mock DocumentStore queries return expected data

    - id: P2-T4
      title: "Create PersonalityStore factory function"
      priority: P0
      type: feature
      estimated_minutes: 30
      depends_on: [P2-T2, P2-T3]
      acceptance_criteria:
        - Function signature: createPersonalityStore(dbOrStore: any) => IPersonalityStore
        - Detects Firestore via .collection() method
        - Detects IDocumentStore via .query() method
        - Falls back to PERSISTENCE_DRIVER env var
        - Throws clear error if no valid backend
        - JSDoc explains usage and parameters
      files:
        - src/services/llm-bot/personality-store.ts
      validation:
        - Factory returns correct implementation based on input
        - Error thrown for invalid inputs

    - id: P2-T5
      title: "Refactor llm-bot processor to use PersonalityStore"
      priority: P0
      type: refactor
      estimated_minutes: 75
      depends_on: [P2-T4]
      acceptance_criteria:
        - Remove direct getFirestore() call on line 627
        - Accept PersonalityStore via dependencies injection
        - Use store.getActive(name) instead of Firestore query
        - Maintain existing caching behavior
        - Preserve personality resolution metrics
        - Update tests to inject mock PersonalityStore
      files:
        - src/services/llm-bot/processor.ts
        - src/services/llm-bot/processor.test.ts
      validation:
        - All tests pass with mocked PersonalityStore
        - No Firestore imports in processor.ts

    - id: P2-T6
      title: "Update llm-bot-service to inject PersonalityStore"
      priority: P0
      type: feature
      estimated_minutes: 30
      depends_on: [P2-T5]
      acceptance_criteria:
        - Create PersonalityStore in service constructor
        - Use getResource('documentStore') or getResource('firestore')
        - Pass store to processor via dependencies
        - Log warning if no backend available
        - Handle both PostgreSQL and Firestore modes
      files:
        - src/apps/llm-bot-service.ts
      validation:
        - Service starts successfully with PostgreSQL
        - Service starts successfully with Firestore
        - Warning logged if neither backend available

# =============================================================================
# PHASE 3: Prompt Logging Fix
# =============================================================================
phase_3:
  name: "Prompt Logging Fix"
  estimated_hours: 3
  dependencies: [phase_2]

  tasks:
    - id: P3-T1
      title: "Register documentStore resource in Bit base class"
      priority: P0
      type: feature
      estimated_minutes: 45
      acceptance_criteria:
        - Update src/common/base-server.ts initializeResources()
        - Call createDocumentStore() based on PERSISTENCE_DRIVER
        - Register as this.resources.documentStore
        - Ensure available before service setup() called
        - Log which backend selected (postgres/firestore)
        - Handle initialization errors gracefully
      files:
        - src/common/base-server.ts
      validation:
        - getResource('documentStore') returns valid store
        - Both PostgreSQL and Firestore modes work
        - Error handling prevents crashes

    - id: P3-T2
      title: "Fix llm-bot prompt log resource access"
      priority: P0
      type: bugfix
      estimated_minutes: 30
      depends_on: [P3-T1]
      acceptance_criteria:
        - Change line 743 to use getResource('documentStore') only
        - Remove || getResource('firestore') fallback
        - Add fallback to createDocumentStore() if resource missing
        - Log warning if documentStore unavailable
        - Handle errors from promptLogStore.log()
        - Ensure fire-and-forget behavior preserved
      files:
        - src/services/llm-bot/processor.ts
      validation:
        - Prompt logs written to PostgreSQL prompt_logs table
        - No errors logged during prompt logging
        - Feature flag controls logging behavior

    - id: P3-T3
      title: "Fix query-analyzer prompt log resource access"
      priority: P0
      type: bugfix
      estimated_minutes: 30
      depends_on: [P3-T1]
      acceptance_criteria:
        - Ensure options.documentStore is always provided
        - Add validation/error handling if missing
        - Update caller to pass documentStore from resources
        - Log clear error if logging fails
        - Fire-and-forget error handling
      files:
        - src/services/query-analyzer/llm-provider.ts
        - src/apps/query-analyzer-service.ts
      validation:
        - Prompt logs written to PostgreSQL
        - Errors logged clearly
        - Service doesn't crash on logging failure

    - id: P3-T4
      title: "Create integration test for prompt logging"
      priority: P1
      type: testing
      estimated_minutes: 60
      depends_on: [P3-T2, P3-T3]
      acceptance_criteria:
        - Test file: test/integration/prompt-logging.spec.ts
        - Test validates llm-bot writes to prompt_logs
        - Test validates query-analyzer writes to prompt_logs
        - Test verifies log structure matches schema
        - Test runs against real PostgreSQL instance
        - Test cleanup deletes test records
      files:
        - test/integration/prompt-logging.spec.ts
      validation:
        - npm test passes
        - Logs appear in prompt_logs table
        - No test data leaked

    - id: P3-T5
      title: "Verify prompt logging with FF_LLM_PROMPT_LOGGING"
      priority: P1
      type: testing
      estimated_minutes: 15
      depends_on: [P3-T4]
      acceptance_criteria:
        - Test with FF_LLM_PROMPT_LOGGING=true writes logs
        - Test with FF_LLM_PROMPT_LOGGING=false skips logging
        - Test with flag unset uses default behavior
        - Feature flag respected in both services
      validation:
        - Logs only appear when flag enabled
        - No errors when flag disabled

# =============================================================================
