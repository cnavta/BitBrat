sprint:
  id: sprint-338-rag-context-provisioning
  start: 2026-07-11
  end: 2026-08-08  # 4 weeks from start
  wip_limit: 3
  goal: >
    Implement P4 RAG Scale-Out for Just-in-Time Context Provisioning: extend the
    P0-P3 foundation (sprint-328) with retrieval-augmented generation via Firestore
    Vector Search + OpenAI embeddings. Context packs are persisted with vector
    embeddings, semantically searchable, and injected just-in-time alongside static
    bindings (de-duplicated). Feature-flagged rollout (RAG_CONTEXT_ENABLED) with
    p95 latency < 200ms SLO and 80% relevance precision target.
  source_design: planning/sprint-338-rag-context-provisioning/technical-architecture.md
  references:
    - documentation/architecture/tool-context-provisioning.md  # ADR (P0-P4 scope)
    - planning/sprint-338-rag-context-provisioning/p0-p3-verification-report.md  # baseline
    - architecture.yaml                          # canonical source of truth
    - src/common/context/                        # P0-P3 foundation (types, resolver, provider, packs)
    - src/apps/tool-gateway.ts                   # central resolution point
    - src/apps/llm-bot-service.ts                # caller (will pass semanticQuery)
    - documentation/mcp-evolution-roadmap.md     # Phase 2 substrate reuse

