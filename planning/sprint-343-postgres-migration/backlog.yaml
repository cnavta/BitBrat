# ============================================================================
# SUMMARY
# ============================================================================

summary:
  total_tasks: 58 (51 required, 7 cleanup)
  total_effort: 180 hours (~4-5 weeks)
  phase_breakdown:
    phase_0_foundation: 16 tasks, 60 hours (Week 1)
    phase_1_migration: 35 tasks, 105 hours (Weeks 2-3)
    phase_2_cleanup: 7 tasks, 15 hours (Week 4)
    phase_3_gcp: ~12 tasks, ~40 hours (Optional future)

  key_simplifications:
    - NO dual-write complexity (just migrate, flip switch)
    - NO gradual rollout (no sensitive prod data yet)
    - Docker-first (local + remote Docker primary targets)
    - GCP optional (Cloud SQL for future production)

  migration_flow: |
    Week 1: Foundation
      - Build abstractions, PostgreSQL implementation, Docker setup
      - Migration tooling (migrate, backup, restore, validate)
      - Test locally with sample data

    Weeks 2-3: Full Migration
      - Create all 13 PostgreSQL schemas
      - Refactor all services to use IDocumentStore
      - Migrate all data: npm run brat -- migrate all
      - Deploy to remote Docker (staging)
      - Set PERSISTENCE_DRIVER=postgres
      - Verify zero Firestore reads

    Week 4: Cleanup
      - Remove Firestore dependencies
      - Update documentation
      - Archive deprecated code

    Future (Optional): GCP Cloud SQL
      - Terraform provisioning
      - Cloud Run integration
      - Production deployment
