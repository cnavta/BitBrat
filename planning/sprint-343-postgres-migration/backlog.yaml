sprint:
  id: sprint-343
  name: PostgreSQL Migration
  goal: Replace Firestore with PostgreSQL for Docker-first deployment portability
  decision_gates:
    - gate: DOCKER_LOCAL_VALIDATED
      timing: End of Week 1
      criteria: Local Docker stack works with PostgreSQL, migration tooling validated
    - gate: REMOTE_DOCKER_MIGRATED
      timing: End of Week 3
      criteria: All services migrated to PostgreSQL on remote Docker (staging)

# ============================================================================
# PHASE 0: Foundation (Week 1) - Docker-First PostgreSQL
# ============================================================================

phase_0_foundation:
  name: Foundation - Docker-First PostgreSQL
  goal: Get local and remote Docker working with PostgreSQL
  duration: 1 week
  tasks: 16
  effort: 60 hours
  deliverables:
    - IDocumentStore abstraction
    - PostgreSQL implementation
    - Docker Compose PostgreSQL service (local + remote)
    - Migration CLI (migrate, backup, restore, validate)
    - Validated on local Docker with sample data

items:
  # --- Persistence Abstractions ---
  - id: FND-001
    title: Create persistence abstraction interfaces
    description: |
      Define vendor-neutral IDocumentStore and IKVStore interfaces.
      Simple abstractions - no complex dual-write patterns.
    status: done
    priority: P0
    effort: 4h
    completed: 2026-07-15
    acceptance_criteria:
      - IDocumentStore interface defined with CRUD + query + transaction methods
      - IKVStore interface defined for key-value operations
      - QueryOptions and SetOptions types defined
      - TypeScript strict mode passes
    files:
      - src/common/persistence/interfaces.ts
    dependencies: []

  - id: FND-002
    title: Install PostgreSQL dependencies
    description: Install pg and @types/pg npm packages
    status: done
    priority: P0
    effort: 0.5h
    completed: 2026-07-15
    acceptance_criteria:
      - pg@^8.11.0 in package.json
      - "@types/pg@^8.10.0" in package.json
      - npm install succeeds
    dependencies: []

  - id: FND-003
    title: Create PostgreSQL schema for all collections
    description: |
      Create schema SQL for all 13 collections with JSONB storage.
      Include indexes, constraints, and pgvector support for context_packs.
    status: done
    priority: P0
    effort: 3h
    completed: 2026-07-15
    acceptance_criteria:
      - events table with all required columns
      - event_snapshots table with FK to events
      - Indexes on correlation_id, idempotency_key, expire_at
      - update_updated_at_column() trigger function
      - cleanup_expired_events() function for TTL
    files:
      - infrastructure/postgres/schema/001_events.sql
    dependencies:
      - FND-001

  - id: FND-004
    title: Implement PostgresDocumentStore
    description: |
      Implement IDocumentStore interface using node-postgres (pg).
      Support get, set, update, delete, query, transaction, watch (polling).
    status: done
    priority: P0
    effort: 8h
    completed: 2026-07-15
    acceptance_criteria:
      - PostgresDocumentStore class implements IDocumentStore
      - Connection pooling configured
      - All CRUD operations work
      - Transaction support with BEGIN/COMMIT/ROLLBACK
      - Query with WHERE clauses, ORDER BY, LIMIT, OFFSET
      - Watch method uses polling (default 5s interval)
    files:
      - src/common/persistence/postgres-store.ts
    dependencies:
      - FND-001
      - FND-002
      - FND-003

  - id: FND-005
    title: Create simple factory for persistence driver selection
    description: |
      Simple factory pattern to select PostgreSQL or Firestore backend.
      NO dual-write complexity - just a switch.
    status: done
    priority: P0
    effort: 1h
    completed: 2026-07-15
    acceptance_criteria:
      - Factory reads PERSISTENCE_DRIVER env var
      - Returns PostgresDocumentStore if "postgres"
      - Returns Firestore instance if "firestore" (legacy)
      - Simple conditional, no complex abstraction
    files:
      - src/common/persistence/factory.ts
    dependencies:
      - FND-001
      - FND-004

  - id: FND-006
    title: Implement RedisKVStore (optional)
    description: |
      Implement IKVStore interface using ioredis.
      Support get, set, delete, mget, exists with TTL.
    status: todo
    priority: P2
    effort: 4h
    acceptance_criteria:
      - RedisKVStore class implements IKVStore
      - get/set/delete/mget/exists all work
      - TTL support via SETEX
      - Connection pooling configured
    files:
      - src/common/persistence/redis-store.ts
    dependencies:
      - FND-001

  - id: FND-007
    title: Add Docker Compose PostgreSQL service
    description: |
      Add postgres:15-alpine service to docker-compose.local.yaml.
      Include volume for data persistence and health check.
    status: done
    priority: P0
    effort: 1h
    completed: 2026-07-15
    acceptance_criteria:
      - postgres service in docker-compose.local.yaml
      - Environment vars for POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
      - Volume mounted for /var/lib/postgresql/data
      - Health check configured
      - Port 5432 exposed
    files:
      - infrastructure/docker-compose/docker-compose.local.yaml
    dependencies: []

  # --- Migration Tooling ---
  - id: FND-008
    title: Create firestore-to-postgres migration script
    description: |
      Create brat CLI command to migrate collections from Firestore to PostgreSQL.
      Support all collections, dry-run, batch processing, and progress tracking.
    status: done
    priority: P0
    effort: 8h
    completed: 2026-07-15
    acceptance_criteria:
      - "npm run brat -- migrate collection events --from firestore --to postgres --dry-run"
      - "npm run brat -- migrate all --from firestore --to postgres"
      - Batch processing (1000 docs at a time)
      - Progress bar showing migration status (n/total docs)
      - Validation of migrated data (checksum comparison)
      - Collection mapping (Firestore schema → PostgreSQL schema)
      - Support for subcollections (event_snapshots)
    files:
      - tools/brat/src/commands/migrate.ts
      - tools/brat/src/migration/collection-mapper.ts
    dependencies:
      - FND-004

  - id: FND-009
    title: Create brat backup command for PostgreSQL
    description: |
      Add "brat pg:backup" command to create PostgreSQL backups.
      Export to JSON or SQL format.
    status: done
    priority: P1
    effort: 4h
    completed: 2026-07-15
    acceptance_criteria:
      - "npm run brat -- backup --env staging --output backup.json"
      - "npm run brat -- backup --env staging --format sql --output backup.sql"
      - Supports incremental backups (--since timestamp)
      - Compression support (gzip)
      - Backup metadata (timestamp, size, collections)
    files:
      - tools/brat/src/commands/backup.ts
    dependencies:
      - FND-004

  - id: FND-010
    title: Create brat restore command for PostgreSQL
    description: |
      Add "brat pg:restore" command to restore PostgreSQL backups.
    status: done
    priority: P1
    effort: 4h
    completed: 2026-07-15
    acceptance_criteria:
      - "npm run brat -- restore --env staging --input backup.json"
      - "npm run brat -- restore --env staging --format sql --input backup.sql"
      - Dry-run mode (--dry-run)
      - Validation before restore
      - Rollback on error
    files:
      - tools/brat/src/commands/restore.ts
    dependencies:
      - FND-009

  - id: FND-011
    title: Create brat db:validate command
    description: |
      Add "brat db:validate" command to validate data consistency.
      Compare Firestore vs PostgreSQL data.
    status: done
    priority: P0
    effort: 5h
    completed: 2026-07-15
    acceptance_criteria:
      - "npm run brat -- db:validate --collection events"
      - "npm run brat -- db:validate --all"
      - Compare record counts (Firestore vs Postgres)
      - Compare checksums for sample of records
      - Report differences with drill-down details
      - Exit code 0 if consistent, 1 if differences found
    files:
      - tools/brat/src/commands/db-validate.ts
    dependencies:
      - FND-004

  # --- Refactor Persistence Service ---
  - id: FND-012
    title: Refactor PersistenceStore to use IDocumentStore
    description: |
      Update src/services/persistence/store.ts to use IDocumentStore interface
      instead of direct Firestore calls.
    status: todo
    priority: P0
    effort: 8h
    acceptance_criteria:
      - PersistenceStore constructor takes IDocumentStore
      - All Firestore direct calls replaced with IDocumentStore methods
      - upsertIngressEvent() uses store.transaction()
      - applySnapshot() uses store.set()
      - Works with both Firestore and PostgreSQL via factory
    files:
      - src/services/persistence/store.ts
    dependencies:
      - FND-004
      - FND-005

  - id: FND-013
    title: Write unit tests for PostgresDocumentStore
    description: |
      Comprehensive unit tests for PostgreSQL implementation.
    status: done
    priority: P0
    effort: 6h
    completed: 2026-07-15
    acceptance_criteria:
      - Test connection pooling
      - Test CRUD operations
      - Test queries with filters, ordering, pagination
      - Test transactions (commit, rollback)
      - Test watch() polling mechanism
      - All tests pass
    files:
      - src/common/persistence/__tests__/postgres-store.test.ts
    dependencies:
      - FND-004

  # --- POC Validation ---
  - id: FND-014
    title: Run migration on test dataset (10k events)
    description: |
      Migrate 10k events from Firestore to PostgreSQL in local Docker.
      Measure time, verify data integrity, check for errors.
    status: todo
    priority: P0
    effort: 3h
    acceptance_criteria:
      - 10k events migrated successfully
      - Zero data loss (checksums match)
      - Migration completes in <5 minutes
      - No errors in logs
      - Validation script confirms integrity
    dependencies:
      - FND-008
      - FND-011

  - id: FND-015
    title: Performance benchmarks (Firestore vs PostgreSQL)
    description: |
      Benchmark key operations: get event, create event, query events.
      Compare latency and throughput between Firestore and PostgreSQL.
    status: todo
    priority: P0
    effort: 4h
    acceptance_criteria:
      - Benchmark get event (avg latency)
      - Benchmark create event (avg latency)
      - Benchmark query 100 events (avg latency)
      - Throughput test (events/second)
      - PostgreSQL within 20% of Firestore performance
      - Results documented
    files:
      - tools/benchmark/persistence-benchmark.ts
    dependencies:
      - FND-014

  - id: FND-016
    title: Test local Docker stack with PostgreSQL
    description: |
      Bring up local Docker stack with PostgreSQL, migrate test data, verify all services work.
    status: todo
    priority: P0
    effort: 3h
    acceptance_criteria:
      - docker-compose up succeeds with postgres service
      - Set PERSISTENCE_DRIVER=postgres in .env
      - Migrate 1000 test events using "brat migrate"
      - Event-router, tool-gateway, auth all connect to PostgreSQL
      - Full message flow works end-to-end
      - Performance acceptable (<5ms queries)
    dependencies:
      - FND-015
      - FND-012

# ============================================================================
# PHASE 1: Full Migration (Weeks 2-3) - All Collections
# ============================================================================

phase_1_migration:
  name: Full Migration - All Collections to PostgreSQL
  goal: Migrate all 13 Firestore collections, refactor all services, deploy to remote Docker
  duration: 2 weeks
  tasks: 35
  effort: 105 hours
  prerequisites:
    - Docker local validated (FND-016)
  deliverables:
    - All 13 PostgreSQL schemas
    - All services refactored to use IDocumentStore
    - All data migrated
    - Deployed to remote Docker (staging)
    - Firestore dependencies removed

