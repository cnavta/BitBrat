goal: "Add prompt logging to the image-gen-mcp service, following the same structure and patterns already in place for llm-bot and query-analyzer (feature-flag-gated, fire-and-forget writes to a service-specific Firestore sub-collection with redaction)."
owner: "Junie (Architect)"
createdAt: "2026-06-23T16:23:00Z"
status: "complete"
links:
