risks:
  high:
    - name: "Breaking existing contexts"
      mitigation: "Test on agent-dev first, keep backward compatibility"
      tasks_affected: ["T1.4", "T4.1"]
    - name: "NATS stream timing issues"
      mitigation: "Add retries, document manual fallback"
      tasks_affected: ["T2.3"]
  medium:
    - name: "Incomplete service audit"
      mitigation: "Automated scanning, thorough testing"
      tasks_affected: ["T1.1", "T1.2"]
    - name: "Validation too strict"
      mitigation: "Warnings vs errors, --no-validate flag"
      tasks_affected: ["T3.2", "T3.4"]
