notes: |
  Role: Lead Implementor (AGENTS.md §10) — produce execution plan + trackable
  prioritized backlog first; implement only after explicit approval.

  Source design (owner-attached): documentation/architecture/tool-context-provisioning.md
  (ADR / Proposal). Phased plan §6: P0 quick win → P1 convention → P2 JIT assembly →
  P3 generated + drift-guarded → P4 RAG scale-out.

  Canonical building blocks verified in-repo (the ADR's file citations predate the
  Bit rename in sprint-324):
    - MCP registration primitives (registerTool/registerResource/registerPrompt) live on
      the Bit base abstraction: src/common/base-server.ts (registerResource @ ~1258);
      tool-registry contract in src/types/tools.ts (IToolRegistry / BitBratResource).
      The ADR cites "src/common/mcp-server.ts" — mcp-server.ts is now a thin compat shim.
    - Canonical schema: src/types/events.ts (InternalEventV2, AnnotationV1, AnnotationKindV1);
      MCP registration event INTERNAL_MCP_REGISTRATION_V1 = 'internal.mcp.registration.v1'
      (events.ts:317) is the channel to advertise packs/bindings (P2).
    - Prompt assembly: src/common/prompt-assembly/{types.ts,assemble.ts} — Priority (1..5),
      NamedContext, TaskAnnotation, priority-ordered render/truncate (the JIT render target).
    - JsonLogic context + custom ops: src/services/router/jsonlogic-evaluator.ts —
      buildContext(evt) (EvalContext keys) + ops ci_eq, re_test, slip_complete, has_role,
      has_annotation, has_candidate, text_contains (single source for the router pack, P3).
    - Tool aggregation / gating point: src/common/mcp/ (bridge.ts, client-manager.ts,
      registry-watcher.ts) + src/apps/tool-gateway.ts (central pack resolution/de-dup, P2).
    - No src/common/context/ exists yet — greenfield convention (P1).

  Constraints:
    - architecture.yaml is canonical (Law #2). Any registration-event / topic changes for
      pack advertisement (P2) must be additive and version-respecting (envelope/topic rules).
    - Schema/JsonLogic packs MUST be generated from source of truth + drift-guarded (G2/G6, P3);
      no hand-copied schema in production paths.
    - Relevance-gated + token-aware (G1/G3): bind narrowly; de-dupe shared packs; rely on the
      assembler's priority truncation.
    - Backlog WIP limit = 3. Planning gate: implementation does not begin until owner approval
      + "Start sprint" (Rule S1).
    - P4 (Firestore persistence + embedding retrieval) is deferred/design-only by default;
      reuses the mcp-evolution-roadmap.md Phase 2 substrate rather than a competing mechanism.
