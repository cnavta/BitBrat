id: sprint-328-c4312d
title: "Just-in-Time Context Provisioning for MCP Tools & Tasks (Context Packs)"
goal: >
  Implement the MCP tool-context improvements from
  documentation/architecture/tool-context-provisioning.md: a single, consistent
  Context Pack / Context Provider / binding convention (src/common/context/) that
  surfaces relevant, versioned schema/usage context to LLM agents only when the
  related MCP tool, task/stage, or event type is in play. Render packs just-in-time
  through the existing prompt-assembly layer (NamedContext, priority-ordered,
  de-duplicated), expose them as MCP Resources for tool turns, and generate the
  shared schema/JsonLogic packs from the source of truth (src/types/events.ts,
  src/services/router/jsonlogic-evaluator.ts) with drift-guard tests. Scope follows
  the ADR phases P0–P4; P4 (Firestore/RAG scale-out) is design-only/deferred unless
  the owner pulls it in.
owner: "Lead Implementor"
