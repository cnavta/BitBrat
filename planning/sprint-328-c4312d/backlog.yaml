sprint:
  id: sprint-328-c4312d
  start: 2026-06-28
  end: 2026-07-12
  wip_limit: 3
  goal: >
    Implement Just-in-Time Context Provisioning (Context Packs): a Context Pack /
    Context Provider / binding convention (src/common/context/) that surfaces relevant,
    versioned schema/usage context to LLM agents only when the related MCP tool, task,
    or event type is active; rendered just-in-time via prompt-assembly NamedContext
    (priority-ordered, de-duped), exposed as MCP Resources, and generated from the source
    of truth (events.ts / jsonlogic-evaluator.ts) with drift-guard tests. ADR phases P0–P4;
    P4 (Firestore/RAG) deferred/design-only by default.
  source_design: documentation/architecture/tool-context-provisioning.md
  references:
    - architecture.yaml          # canonical source of truth (Law #2)
    - src/types/events.ts        # InternalEventV2 / AnnotationV1 / AnnotationKindV1 / INTERNAL_MCP_REGISTRATION_V1
    - src/common/base-server.ts  # the Bit: registerTool/registerResource/registerPrompt
    - src/types/tools.ts         # IToolRegistry / BitBratResource contract
    - src/common/prompt-assembly/types.ts  # Priority / NamedContext / TaskAnnotation
    - src/services/router/jsonlogic-evaluator.ts  # buildContext + custom ops
    - src/apps/tool-gateway.ts   # central pack resolution / de-dup point
    - documentation/mcp-evolution-roadmap.md  # P4 RAG substrate (reuse)

